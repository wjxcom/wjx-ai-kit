var DOCS = {"00-overview":"# wjx-ai-kit：用 AI 重新定义问卷调研\r\n\r\n> 问卷星官方开源 · TypeScript SDK + MCP Server + CLI 三合一工具包\r\n\r\n---\r\n\r\n## 一句话说清楚\r\n\r\n**wjx-ai-kit** 是问卷星官方开源的 AI 开发工具包。它让你用自然语言创建问卷、用对话分析数据、用命令行自动化一切——把原来需要反复点击网页的问卷操作，变成 AI 可以直接完成的事。\r\n\r\n---\r\n\r\n## 为什么做这件事\r\n\r\n问卷调研正在发生两个变化：\r\n\r\n**第一，AI 正在重塑工作方式。** 当你可以对 Claude 说\"帮我做一份员工满意度调查，包含 NPS 评分和 5 个维度的量表题\"，它就能在 30 秒内创建一份专业问卷——没有人愿意再回到逐题拖拽的时代。\r\n\r\n**第二，数据驱动需要 API 化。** 企业用户的问卷系统需要和 CRM、HRM、BI 打通，研究人员需要批量创建实验问卷、自动化数据回收。这些场景靠网页操作做不到，需要一套可编程的接口。\r\n\r\nwjx-ai-kit 就是为这两个变化而生的：\r\n\r\n```\r\n你的 AI 助手 / 代码 / 脚本\r\n        ↓\r\n   wjx-ai-kit（SDK / MCP / CLI）\r\n        ↓\r\n    问卷星 OpenAPI\r\n        ↓\r\n  2.6 亿用户的调研平台\r\n```\r\n\r\n---\r\n\r\n## 三个工具，一个目标\r\n\r\nwjx-ai-kit 包含三个包，覆盖从 AI 对话到底层编程的全部场景：\r\n\r\n### 🔌 MCP Server — 让 AI 直接操作问卷星\r\n\r\n> \"帮我创建一份 NPS 调查问卷，发布后统计结果\"\r\n\r\nMCP (Model Context Protocol) 是 Anthropic 提出的 AI 工具调用协议。wjx-mcp-server 实现了 **56 个工具**，让 Claude、Cursor、Windsurf 等 AI 客户端可以直接操作问卷星。\r\n\r\n- **56 个 Tools**：创建问卷、查询答卷、管理通讯录、生成 SSO 链接、本地数据分析\r\n- **8 个 Resources**：题型编码、DSL 语法、分析方法等参考资料，AI 随时查阅\r\n- **19 个 Prompts**：NPS 分析、满意度调查、考试出题、异常检测等预设工作流\r\n- **开箱即用**：配置 API Key，接入 Claude Desktop / Cursor / Claude Code 即可使用\r\n\r\n**适合谁：** 使用 AI 编程工具的开发者、想用自然语言管理问卷的企业用户\r\n\r\n### ⌨️ CLI — AI Agent 原生命令行\r\n\r\n> `wjx survey create-by-text --file survey.txt --publish`\r\n\r\nwjx-cli 是为 AI Agent 设计的命令行工具。69 个子命令覆盖问卷星全部 API 能力，输出结构化 JSON，天然适配 AI Agent 工作流和自动化脚本。\r\n\r\n- **69 个子命令**：问卷、答卷、通讯录、部门、管理员、标签、用户体系、子账号、SSO、数据分析\r\n- **AI Agent 友好**：JSON 输出 + 管道输入 + 结构化错误 + Shell 补全\r\n- **Claude Code 技能**：`wjx skill install` 一键安装 AI Agent 技能包\r\n- **Dry-Run 预览**：`--dry-run` 看到完整请求但不实际发送\r\n- **9 个离线命令**：NPS、CSAT、异常检测等分析命令不需要 API Key\r\n\r\n**适合谁：** AI Agent 开发者、自动化脚本编写者、命令行爱好者\r\n\r\n### 📦 SDK — 零依赖 TypeScript 基础层\r\n\r\n> `await createSurveyByText({ text: \"满意度调查\\n\\n1. 评分[量表题]\\n1~10\" })`\r\n\r\nwjx-api-sdk 是零运行时依赖的 TypeScript SDK，提供 60+ 类型安全的函数，覆盖问卷星 OpenAPI 全部能力。\r\n\r\n- **零依赖**：只用 Node.js 内置 API（fetch + crypto），无第三方包\r\n- **60+ 函数**：8 大模块完整覆盖（问卷、答卷、通讯录、用户体系、子账号、SSO、分析、DSL 转换）\r\n- **DSL 双向转换**：纯文本 ↔ 问卷结构体，支持 27 种题型标签\r\n- **本地分析引擎**：NPS/CSAT 计算、异常检测、数据解码，无需网络\r\n- **可测试设计**：fetch 注入 + 凭据提供者模式，623 个测试零网络依赖\r\n\r\n**适合谁：** 构建调研 SaaS 的开发者、需要集成问卷能力的系统、学术研究自动化\r\n\r\n---\r\n\r\n## 选择你的工具\r\n\r\n不确定该用哪个？按你的使用方式选择：\r\n\r\n```\r\n你想怎么用问卷星？\r\n│\r\n├─ 在 AI 对话中操作 ──→ 选择你的 AI 工具（见下方配置指南）\r\n│   │\r\n│   ├─ Claude Code ──→ ⭐ 推荐：MCP + Agent + Skill（最佳体验）\r\n│   ├─ Claude Desktop / Cursor / Windsurf / Cline / Trae / Copilot ...\r\n│   │   └──→ MCP Server + Agent + Skill + CLI（四层能力全覆盖）\r\n│   ├─ OpenClaw / KimiClaw / QClaw / LinClaw 等国产 Claw 工具\r\n│   │   └──→ MCP Server + Agent + Skill + CLI（四层能力全覆盖）\r\n│   ├─ Manus / WorkBuddy / QoderWork 等 AI 工作台\r\n│   │   └──→ MCP Server + Agent + Skill + CLI（四层能力全覆盖）\r\n│   │\r\n│   └─ 不确定？先试 Claude Desktop，配置最简单\r\n│\r\n├─ 下载 Skill 包安装 ──→ Skill 包（适合不想配 MCP 的用户）\r\n│   └─ 下载 zip → bash setup.sh -y → 对 AI 说话即可\r\n│\r\n├─ 命令行 / 自动化脚本 ──→ CLI\r\n│   └─ wjx skill install 一键安装 Agent 技能包\r\n│\r\n└─ 构建应用 / 系统集成 ──→ SDK\r\n```\r\n\r\n### 三层能力递进\r\n\r\nwjx-ai-kit 不只是 MCP Server——它还提供 **Agent 定义** 和 **Skill 参考文档**，让 AI 从\"能用工具\"进化到\"懂业务流程\"：\r\n\r\n| 层级 | 能力 | 说明 |\r\n|------|------|------|\r\n| **MCP 工具层** | 56 个 Tools + 8 Resources + 19 Prompts | 所有 MCP 客户端通用，AI 直接调用 |\r\n| **Agent 层** | 2 个专家 Agent（MCP 专家 / CLI 专家） | 内置工作流和安全规范，自动编排多步操作 |\r\n| **Skill 层** | 2 套渐进式参考文档 | Agent 按需读取参数细节，无需预加载全部知识 |\r\n\r\n> **对比**：同类产品（如金数据 MCP）只有工具层。问卷星的 Agent + Skill 体系让 AI 不只是机械地执行命令，而是像一个问卷星专家一样主动规划工作流。\r\n\r\n### Skill 市场\r\n\r\nwjx-ai-kit 的 Skill 已上架主流 AI Skill 市场，你可以直接从市场安装：\r\n\r\n| 市场 | 地址 | 安装方式 |\r\n|------|------|----------|\r\n| **Vercel Agent Skills** | [skills.sh/wjxcom/wjx-ai-kit](https://skills.sh/wjxcom/wjx-ai-kit) | `npx skills add wjxcom/wjx-ai-kit` |\r\n| **ClawHub** | [clawhub.ai/skills](https://clawhub.ai/skills?q=wjx) | 在 ClawHub 搜索 \"wjx\" 安装 |\r\n\r\n包含 2 个 Skill：**wjx-cli-use**（CLI 命令专家技能）和 **wjx-mcp-use**（MCP 工具专家技能）。\r\n\r\n---\r\n\r\n## AI 工具配置指南\r\n\r\n在你常用的 AI 工具中接入问卷星。点击对应指南，5 分钟内完成配置。\r\n\r\n| AI 工具 | 一句话说明 | 配置指南 |\r\n|---------|----------|---------|\r\n| **Claude Code** | Agent + Skill 完整支持，终端内完成一切 | [配置指南](./setup-claude-code.md) |\r\n| **Claude Desktop** | 最简单的入门方式，对话即操作 | [配置指南](./setup-claude-desktop.md) |\r\n| **Cursor** | AI 编程 + 问卷管理一体化 | [配置指南](./setup-cursor.md) |\r\n| **Windsurf** | Cascade AI + 问卷星工具链 | [配置指南](./setup-windsurf.md) |\r\n| **Cline** | VS Code 中的 AI Agent，自主完成问卷任务 | [配置指南](./setup-cline.md) |\r\n| **GitHub Copilot** | Agent 模式下调用问卷星 MCP | [配置指南](./setup-copilot.md) |\r\n| **Trae** | 字节跳动 AI IDE，中文体验友好 | [配置指南](./setup-trae.md) |\r\n| **Gemini** | Google AI 生态接入 | [配置指南](./setup-gemini.md) |\r\n| **Qoder** | 阿里巴巴 Agentic 编程平台 | [配置指南](./setup-qoder.md) |\r\n| **OpenClaw** | 开源 AI 编程助手，Skills 系统 | [配置指南](./setup-openclaw.md) |\r\n| **国产 Claw 系列** | KimiClaw、QClaw、LinClaw、MaxClaw、EasyClaw 等 | [配置指南](./setup-claw.md) |\r\n| **AI 工作台** | Manus、WorkBuddy、QoderWork | [配置指南](./setup-workbench.md) |\r\n\r\n---\r\n\r\n## 快速体验\r\n\r\n### 30 秒：用 AI 创建问卷\r\n\r\n如果你用 Claude Desktop 或 Cursor：\r\n\r\n```bash\r\nnpm install -g wjx-mcp-server\r\n```\r\n\r\n在 Claude Desktop 配置中添加：\r\n\r\n```json\r\n{\r\n  \"mcpServers\": {\r\n    \"wjx\": {\r\n      \"command\": \"npx\",\r\n      \"args\": [\"wjx-mcp-server\"],\r\n      \"env\": { \"WJX_API_KEY\": \"你的API Key\" }\r\n    }\r\n  }\r\n}\r\n```\r\n\r\n然后对 Claude 说：\r\n\r\n> \"帮我创建一份客户满意度调查，包含 NPS 评分题、5 个维度的量表题、和一个开放建议题\"\r\n\r\nClaude 会自动调用 MCP 工具创建问卷、设置问卷、返回预览链接。\r\n\r\n### 1 分钟：用命令行创建问卷\r\n\r\n```bash\r\n# 安装\r\nnpm install -g wjx-cli\r\n\r\n# 配置（交互式或参数模式）\r\nwjx init\r\n# 或 wjx init --api-key 你的APIKey\r\n\r\n# 环境检查\r\nwjx doctor\r\n\r\n# 用 DSL 文本创建问卷\r\nwjx survey create-by-text --text \"\r\n客户满意度调查\r\n\r\n1. 您愿意向朋友推荐我们吗？[量表题]\r\n0~10\r\n\r\n2. 请评价以下方面 [矩阵量表题]\r\n行：\r\n- 产品质量\r\n- 服务态度\r\n- 响应速度\r\n列：\r\n- 非常不满意\r\n- 不满意\r\n- 一般\r\n- 满意\r\n- 非常满意\r\n\r\n3. 您有什么建议？[填空题]\r\n\"\r\n```\r\n\r\n### 5 分钟：用 SDK 构建自动化\r\n\r\n```typescript\r\nimport {\r\n  createSurveyByText,\r\n  queryResponses,\r\n  calculateNps,\r\n  decodeResponses,\r\n} from \"wjx-api-sdk\";\r\n\r\n// 1. 用自然语言 DSL 创建问卷\r\nconst survey = await createSurveyByText({\r\n  text: \"NPS 调查\\n\\n1. 推荐意愿[量表题]\\n0~10\",\r\n});\r\nconsole.log(`问卷已创建: ${survey.data.vid}`);\r\n\r\n// 2. 查询答卷数据\r\nconst responses = await queryResponses({\r\n  vid: survey.data.vid,\r\n  page_size: 100,\r\n});\r\n\r\n// 3. 解码并分析\r\nfor (const r of responses.data.list) {\r\n  const decoded = decodeResponses(r.submitdata);\r\n  console.log(decoded);\r\n}\r\n\r\n// 4. 计算 NPS\r\nconst nps = calculateNps([9, 10, 7, 3, 8, 10, 9, 6, 10, 8]);\r\nconsole.log(`NPS: ${nps.score} (${nps.rating})`);\r\n// NPS: 20 (一般)\r\n```\r\n\r\n---\r\n\r\n## 能力全景\r\n\r\n| 能力 | SDK | MCP Server | CLI |\r\n|------|:---:|:----------:|:---:|\r\n| 问卷创建/编辑/删除 | ✅ | ✅ | ✅ |\r\n| DSL 文本创建问卷 | ✅ | ✅ | ✅ |\r\n| 答卷查询/下载/提交 | ✅ | ✅ | ✅ |\r\n| 统计报告 | ✅ | ✅ | ✅ |\r\n| 通讯录管理 | ✅ | ✅ | ✅ |\r\n| 部门/标签管理 | ✅ | ✅ | ✅ |\r\n| 用户体系/参与者 | ✅ | ✅ | ✅ |\r\n| 子账号管理 | ✅ | ✅ | ✅ |\r\n| SSO 单点登录 | ✅ | ✅ | ✅ |\r\n| NPS/CSAT 计算 | ✅ | ✅ | ✅ |\r\n| 异常检测 | ✅ | ✅ | ✅ |\r\n| Webhook 解密 | ✅ | ✅ | ✅ |\r\n| AI Prompt 模板 | - | ✅ 19个 | - |\r\n| AI 参考资源 | - | ✅ 8个 | - |\r\n| Claude Code 技能 | - | - | ✅ |\r\n| Shell 补全 | - | - | ✅ |\r\n| Docker 部署 | - | ✅ | - |\r\n\r\n---\r\n\r\n## 技术亮点\r\n\r\n### DSL：用纯文本定义问卷\r\n\r\n不用写 JSON，不用拖拽控件。用一种直觉的文本格式描述问卷，支持 27 种题型：\r\n\r\n```\r\n员工满意度调查\r\n这是一份关于工作体验的匿名调查\r\n===\r\n\r\n1. 您的部门 [下拉框]\r\n技术部\r\n产品部\r\n市场部\r\n运营部\r\n\r\n2. 整体满意度 [量表题]\r\n1~10\r\n\r\n3. 请评价以下方面 [矩阵量表题]\r\n行：\r\n- 工作环境\r\n- 团队协作\r\n- 职业发展\r\n- 薪酬福利\r\n列：\r\n- 非常不满意\r\n- 不满意\r\n- 一般\r\n- 满意\r\n- 非常满意\r\n\r\n4. 改进建议 [填空题]\r\n```\r\n\r\nSDK 的 `textToSurvey()` 解析这段文本，`parsedQuestionsToWire()` 转为 API 格式，`createSurvey()` 提交到问卷星。三步合一就是 `createSurveyByText()` —— 一个函数搞定。\r\n\r\n### 本地分析引擎：不上传数据也能分析\r\n\r\n6 个分析函数完全在本地运行，数据不出你的机器：\r\n\r\n- **NPS 计算**：自动分类推荐者/中立者/贬损者，给出评级（优秀/良好/一般/较差）\r\n- **CSAT 计算**：支持 5 级和 7 级量表\r\n- **异常检测**：识别秒答（<30% 中位时长）、直线作答、IP+内容重复\r\n- **数据解码**：解析问卷星的 `submitdata` 编码格式\r\n- **指标对比**：A/B 组差异分析，>10% 标记显著\r\n- **Push 解密**：AES-128-CBC 回调数据解密 + SHA1 签名验证\r\n\r\n### 零依赖 SDK\r\n\r\n`package.json` 的 `dependencies` 是空的。整个 SDK 只用 Node.js 内置的 `fetch`（Node 20+）和 `crypto` 模块。这意味着：\r\n\r\n- 没有供应链风险\r\n- 安装速度极快\r\n- 可以嵌入任何项目而不担心依赖冲突\r\n- 623 个测试全部通过 fetch 注入模式运行，零网络调用\r\n\r\n### 1000+ 测试\r\n\r\n| 包 | 测试数 | 说明 |\r\n|----|--------|------|\r\n| wjx-api-sdk | ~623 | 全部通过 mock fetch，零网络依赖 |\r\n| wjx-mcp-server | ~280 | 单元 + 集成测试 |\r\n| wjx-cli | ~133 | 端到端测试 |\r\n| **合计** | **~1036** | |\r\n\r\n---\r\n\r\n## 场景速览\r\n\r\n### 场景 1：AI 自动创建调研问卷\r\n\r\n> 你：\"帮我做一份关于远程办公体验的调查，15 个题，包含单选、量表和开放题\"\r\n\r\nClaude 通过 MCP Server 自动完成：拟定题目 → 生成 DSL → 调用 `create_survey_by_text` → 返回预览链接。全程 30 秒。\r\n\r\n### 场景 2：自动化数据分析流水线\r\n\r\n```bash\r\n# 查询最新 100 条答卷 → 解码 → 统计 NPS\r\nVID=12345\r\nwjx response query --vid $VID --page_size 100 \\\r\n  | jq -r '.data.list[].submitdata' \\\r\n  | wjx analytics decode --submitdata - \\\r\n  | wjx analytics nps --scores -\r\n```\r\n\r\n### 场景 3：批量创建实验问卷\r\n\r\n研究人员需要创建 20 个版本的问卷（不同题目顺序做 A/B 测试）：\r\n\r\n```typescript\r\nimport { createSurveyByText } from \"wjx-api-sdk\";\r\n\r\nfor (const [i, variant] of variants.entries()) {\r\n  const result = await createSurveyByText({\r\n    text: variant,\r\n    title: `实验组 ${i + 1}`,\r\n  });\r\n  console.log(`变体 ${i + 1}: vid=${result.data.vid}`);\r\n}\r\n```\r\n\r\n### 场景 4：CRM 集成\r\n\r\nSaaS 平台在用户完成购买后自动推送满意度调查：\r\n\r\n```typescript\r\nimport { createSurveyByText, buildPreviewUrl, submitResponse } from \"wjx-api-sdk\";\r\n\r\n// 创建问卷（一次性）\r\nconst survey = await createSurveyByText({ text: npsTemplate });\r\n\r\n// 生成调查链接\r\nconst url = buildPreviewUrl({ vid: survey.data.vid, source: \"crm\" });\r\n\r\n// 或直接代填提交\r\nawait submitResponse({\r\n  vid: survey.data.vid,\r\n  submitdata: \"1$9\",\r\n  inputcosttime: 60,\r\n});\r\n```\r\n\r\n### 场景 5：Webhook 实时回调\r\n\r\n问卷提交后实时处理数据：\r\n\r\n```typescript\r\nimport { decodePushPayload, calculateNps } from \"wjx-api-sdk\";\r\n\r\napp.post(\"/webhook\", (req, res) => {\r\n  const { decrypted, signatureValid } = decodePushPayload(\r\n    req.body.encrypt,\r\n    process.env.WJX_API_KEY,\r\n    req.headers[\"x-wjx-signature\"],\r\n    req.body,\r\n  );\r\n\r\n  if (signatureValid) {\r\n    // 实时处理新答卷\r\n    processNewResponse(decrypted);\r\n  }\r\n});\r\n```\r\n\r\n---\r\n\r\n## 开始使用\r\n\r\n| 你的角色 | 推荐起点 | 文档 |\r\n|---------|----------|------|\r\n| 用 Claude Code 的开发者 | MCP + Agent + Skill | [Claude Code 配置指南](./setup-claude-code.md) |\r\n| 用 Claude Desktop 的用户 | MCP Server | [Claude Desktop 配置指南](./setup-claude-desktop.md) |\r\n| 用 Cursor / Windsurf 的开发者 | MCP Server | [Cursor](./setup-cursor.md) / [Windsurf](./setup-windsurf.md) 配置指南 |\r\n| 用其他 AI 工具 | MCP Server | 见上方 [AI 工具配置指南](#ai-工具配置指南) |\r\n| 想用命令行自动化的用户 | CLI | [CLI 入门指南](./cli-getting-started.md) |\r\n| 构建 SaaS / 做系统集成 | SDK | [SDK 入门指南](./sdk-getting-started.md) |\r\n| 做学术调研的研究人员 | CLI + SDK | [CLI 入门指南](./cli-getting-started.md) |\r\n| 企业 IT / 远程部署 | MCP HTTP 模式 | [MCP 进阶指南](./mcp-advanced.md) |\r\n\r\n---\r\n\r\n## 参与贡献\r\n\r\nwjx-ai-kit 是问卷星官方开源项目，采用 MIT 协议，欢迎社区贡献。\r\n\r\n```bash\r\ngit clone https://github.com/wjxcom/wjx-ai-kit.git\r\ncd wjx-ai-kit\r\nnpm install\r\nnpm run build --workspace=wjx-api-sdk\r\nnpm test --workspace=wjx-api-sdk  # 623 tests ✓\r\n```\r\n\r\n- GitHub: [github.com/wjxcom/wjx-ai-kit](https://github.com/wjxcom/wjx-ai-kit)\r\n- Issues: [提交反馈](https://github.com/wjxcom/wjx-ai-kit/issues)\r\n- npm: [wjx-api-sdk](https://www.npmjs.com/package/wjx-api-sdk) · [wjx-mcp-server](https://www.npmjs.com/package/wjx-mcp-server) · [wjx-cli](https://www.npmjs.com/package/wjx-cli)\r\n- Skill 市场: [Vercel Agent Skills](https://skills.sh/wjxcom/wjx-ai-kit) · [ClawHub](https://clawhub.ai/skills?q=wjx)\r\n\r\n---\r\n\r\n## 深入了解\r\n\r\n### 入门指南\r\n\r\n- [MCP Server 入门指南](./mcp-getting-started.md) — 5 分钟接入 Claude/Cursor\r\n- [CLI 入门指南](./cli-getting-started.md) — 命令行快速上手\r\n- [SDK 入门指南](./sdk-getting-started.md) — TypeScript 开发快速上手\r\n- [Skill 包入门指南](./skill-getting-started.md) — 下载安装 Skill 包，最简单的上手方式\r\n\r\n### AI 工具配置指南\r\n\r\n- [Claude Code](./setup-claude-code.md) ⭐ — Agent + Skill 完整体验\r\n- [Claude Desktop](./setup-claude-desktop.md) · [Cursor](./setup-cursor.md) · [Windsurf](./setup-windsurf.md) · [Cline](./setup-cline.md)\r\n- [GitHub Copilot](./setup-copilot.md) · [Trae](./setup-trae.md) · [Gemini](./setup-gemini.md) · [Qoder](./setup-qoder.md)\r\n- [OpenClaw](./setup-openclaw.md) · [国产 Claw 系列](./setup-claw.md)（KimiClaw、QClaw、LinClaw、MaxClaw、EasyClaw 等）\r\n- [AI 工作台](./setup-workbench.md)（Manus、WorkBuddy、QoderWork）\r\n\r\n### 进阶指南\r\n\r\n- [MCP Server 进阶指南](./mcp-advanced.md) — 56 个工具深度用法、HTTP 部署、Docker\r\n- [CLI 进阶指南](./cli-advanced.md) — 69 个命令完全攻略、Skill 系统\r\n- [SDK 进阶指南](./sdk-advanced.md) — DSL 引擎、分析函数、Webhook 解密\r\n","cli-advanced":"# CLI 进阶指南：69 个命令完全攻略\r\n\r\n> 管道组合、自动化脚本、DSL 高级用法、AI Skill 系统\r\n\r\n---\r\n\r\n## DSL 高级用法\r\n\r\n### 完整题型示例\r\n\r\n```\r\n企业年度员工满意度调查\r\n本问卷匿名填写，调查结果仅用于管理改进\r\n===\r\n\r\n1. 您所在的部门 [下拉框]\r\n技术部\r\n产品部\r\n市场部\r\n运营部\r\n人力资源部\r\n财务部\r\n\r\n2. 您的工作年限 [单选题]\r\n1 年以下\r\n1-3 年\r\n3-5 年\r\n5-10 年\r\n10 年以上\r\n\r\n3. 整体工作满意度 [量表题]\r\n1~10\r\n\r\n4. 请评价以下方面 [矩阵量表题]\r\n行：\r\n- 工作环境\r\n- 团队协作\r\n- 职业发展机会\r\n- 薪酬福利\r\n- 工作生活平衡\r\n- 直属上级管理\r\n列：\r\n- 非常不满意\r\n- 不满意\r\n- 一般\r\n- 满意\r\n- 非常满意\r\n\r\n5. 你认为公司最需要改进的方面 [多选题]\r\n沟通机制\r\n培训发展\r\n办公环境\r\n薪酬体系\r\n晋升通道\r\n企业文化\r\n\r\n6. 以下因素对你留任的影响程度 [比重题]\r\n薪酬福利\r\n职业发展\r\n工作氛围\r\n公司前景\r\n\r\n7. 请为公司提供具体建议 [填空题]\r\n```\r\n\r\n保存为 `satisfaction.txt`，创建并发布：\r\n\r\n```bash\r\nwjx survey create-by-text --file satisfaction.txt --publish\r\n```\r\n\r\n### 考试问卷\r\n\r\n```bash\r\nwjx survey create-by-text --file exam.txt --type 6 --publish\r\n```\r\n\r\n`--type 6` 指定为考试类型。考试题使用和普通题相同的 DSL 标签，区别在问卷级别。\r\n\r\n### 从已有问卷导出再编辑\r\n\r\n```bash\r\n# 导出为 DSL 文本\r\nwjx survey export-text --vid 12345 --raw > my-survey.txt\r\n\r\n# 编辑 my-survey.txt（修改题目、新增选项等）\r\n\r\n# 用修改后的文本创建新问卷\r\nwjx survey create-by-text --file my-survey.txt\r\n```\r\n\r\n这是一个强大的\"复制-修改\"工作流，适合基于模板批量创建变体问卷。\r\n\r\n---\r\n\r\n## 管道和组合技\r\n\r\n### stdin 管道输入\r\n\r\n`--stdin` 从管道读取 JSON 参数，CLI 显式参数优先级更高：\r\n\r\n```bash\r\n# 基本用法\r\necho '{\"vid\": 12345}' | wjx --stdin survey get\r\n\r\n# 参数覆盖：--page_size 覆盖 stdin 中的同名字段\r\necho '{\"vid\": 12345, \"page_size\": 10}' | wjx --stdin response query --page_size 50\r\n```\r\n\r\n### jq 组合\r\n\r\n```bash\r\n# 获取第一个问卷的 vid\r\nVID=$(wjx survey list | jq -r '.data.activitys | to_entries[0].value.vid')\r\n\r\n# 查看该问卷的答卷数\r\nwjx response count --vid $VID | jq '.data.total'\r\n\r\n# 获取所有答卷的 submitdata\r\nwjx response query --vid $VID --page_size 100 \\\r\n  | jq -r '.data.list[].submitdata'\r\n\r\n# 提取所有问卷名和 ID 为 CSV\r\nwjx survey list --page_size 100 \\\r\n  | jq -r '.data.activitys | to_entries[] | [.value.vid, .value.aname] | @csv'\r\n```\r\n\r\n### 批量操作脚本\r\n\r\n```bash\r\n#!/bin/bash\r\n# 暂停所有收集中的问卷\r\n\r\nwjx survey list --page_size 100 --status 1 \\\r\n  | jq -r '.data.activitys | to_entries[].value.vid' \\\r\n  | while read vid; do\r\n      echo \"暂停问卷 $vid...\"\r\n      wjx survey status --vid \"$vid\" --state 2\r\n    done\r\n```\r\n\r\n### A/B 测试批量创建\r\n\r\n```bash\r\n#!/bin/bash\r\n# 从模板创建多个变体\r\n\r\nfor i in 1 2 3 4 5; do\r\n  sed \"s/{{variant}}/$i/g\" template.txt \\\r\n    | wjx --stdin survey create-by-text --publish\r\n  echo \"变体 $i 创建完成\"\r\ndone\r\n```\r\n\r\n---\r\n\r\n## 69 个命令完整参考\r\n\r\n### 问卷管理 (14)\r\n\r\n| 命令 | 说明 | 关键参数 |\r\n|------|------|----------|\r\n| `survey list` | 列表查询 | `--name_like` `--status` `--atype` `--page_size` |\r\n| `survey get` | 获取详情 | `--vid` |\r\n| `survey create` | JSON 创建 | `--title` `--questions` `--source_vid` |\r\n| `survey create-by-text` | DSL 创建 | `--text` `--file` `--type` `--publish` |\r\n| `survey delete` | 删除 | `--vid` `--permanent` |\r\n| `survey status` | 修改状态 | `--vid` `--state (1=发布/2=暂停/3=删除)` |\r\n| `survey settings` | 获取设置 | `--vid` |\r\n| `survey update-settings` | 修改设置 | `--vid` + 设置字段 |\r\n| `survey tags` | 获取标签 | - |\r\n| `survey tag-details` | 标签详情 | `--tag_id` |\r\n| `survey clear-bin` | 清空回收站 | `--vid`（可选，不指定则清空全部） |\r\n| `survey upload` | 上传文件 | `--base64` `--filename` |\r\n| `survey export-text` | 导出文本 | `--vid` `--raw` |\r\n| `survey url` | 生成 URL | `--mode (create/edit)` `--activity` |\r\n\r\n### 答卷管理 (10)\r\n\r\n| 命令 | 说明 | 关键参数 |\r\n|------|------|----------|\r\n| `response count` | 答卷计数 | `--vid` |\r\n| `response query` | 分页查询 | `--vid` `--page_size` `--start_date` `--conditions` |\r\n| `response realtime` | 实时查询 | `--vid` |\r\n| `response download` | 批量下载 | `--vid` `--format (csv/sav/word)` |\r\n| `response submit` | 代填提交 | `--vid` `--submitdata` `--inputcosttime` |\r\n| `response modify` | 修改答卷 | `--vid` `--response_id` |\r\n| `response clear` | 清空答卷 | `--vid`（不可逆） |\r\n| `response report` | 统计报告 | `--vid` |\r\n| `response winners` | 抽奖结果 | `--vid` |\r\n| `response 360-report` | 360 报告 | `--vid` |\r\n\r\n### 通讯录 (3)\r\n\r\n| 命令 | 说明 | 关键参数 |\r\n|------|------|----------|\r\n| `contacts query` | 查询联系人 | `--uid` |\r\n| `contacts add` | 添加联系人 | `--data '[{name, mobile, ...}]'` |\r\n| `contacts delete` | 删除联系人 | `--uids '[\"uid1\",\"uid2\"]'` |\r\n\r\n### 部门 (4)\r\n\r\n| 命令 | 说明 | 关键参数 |\r\n|------|------|----------|\r\n| `department list` | 列出部门 | - |\r\n| `department add` | 添加部门 | `--data '[{\"dpath\":\"研发部/后端\"}]'` |\r\n| `department modify` | 修改部门 | `--data '[{...}]'` |\r\n| `department delete` | 删除部门 | `--data '[{...}]'` `--include_children` |\r\n\r\n### 管理员 (3)\r\n\r\n| 命令 | 说明 | 关键参数 |\r\n|------|------|----------|\r\n| `admin add` | 添加管理员 | `--data '[{\"uid\":\"...\",\"role\":1}]'` |\r\n| `admin delete` | 删除管理员 | `--uids '[\"uid1\"]'` |\r\n| `admin restore` | 恢复管理员 | `--uids '[\"uid1\"]'` |\r\n\r\n### 标签 (4)\r\n\r\n| 命令 | 说明 | 关键参数 |\r\n|------|------|----------|\r\n| `tag list` | 列出标签 | - |\r\n| `tag add` | 添加标签 | `--group_name` `--data '[\"标签1\"]'` |\r\n| `tag modify` | 修改标签 | `--tag_group_id` |\r\n| `tag delete` | 删除标签 | `--data '[{...}]'` |\r\n\r\n### 用户体系 (6)\r\n\r\n| 命令 | 说明 | 关键参数 |\r\n|------|------|----------|\r\n| `user-system add-participants` | 添加参与者 | `--system_id` `--data` |\r\n| `user-system modify-participants` | 修改参与者 | `--system_id` `--data` |\r\n| `user-system delete-participants` | 删除参与者 | `--system_id` `--uids` |\r\n| `user-system bind` | 绑定问卷 | `--system_id` `--vid` |\r\n| `user-system query-binding` | 查询绑定 | `--system_id` `--vid` |\r\n| `user-system query-surveys` | 查询用户问卷 | `--system_id` `--uid` |\r\n\r\n### 子账号 (5)\r\n\r\n| 命令 | 说明 | 关键参数 |\r\n|------|------|----------|\r\n| `account list` | 列出子账号 | `--mobile` |\r\n| `account add` | 添加子账号 | `--username` `--password` `--role` |\r\n| `account modify` | 修改子账号 | `--username` + 修改字段 |\r\n| `account delete` | 删除子账号 | `--username` |\r\n| `account restore` | 恢复子账号 | `--username` |\r\n\r\n### SSO（不需要 API Key）(3)\r\n\r\n| 命令 | 说明 | 关键参数 |\r\n|------|------|----------|\r\n| `sso subaccount-url` | 子账号 SSO | `--subuser` |\r\n| `sso user-system-url` | 用户体系 SSO | `--u` `--system_id` `--uid` |\r\n| `sso partner-url` | 合作伙伴 SSO | `--partnerid` |\r\n\r\n### 数据分析（不需要 API Key）(6)\r\n\r\n| 命令 | 说明 | 关键参数 |\r\n|------|------|----------|\r\n| `analytics decode` | 解码答卷 | `--submitdata` |\r\n| `analytics nps` | NPS 计算 | `--scores '[9,10,7,3]'` |\r\n| `analytics csat` | CSAT 计算 | `--scores` `--scale` |\r\n| `analytics anomalies` | 异常检测 | `--responses` |\r\n| `analytics compare` | 指标对比 | `--set_a` `--set_b` |\r\n| `analytics decode-push` | 解密推送 | `--encrypted` `--app_key` |\r\n\r\n### 系统命令 (11)\r\n\r\n| 命令 | 说明 |\r\n|------|------|\r\n| `init` | 配置向导 |\r\n| `whoami` | 验证身份 |\r\n| `doctor` | 环境诊断 |\r\n| `reference <topic>` | 查看参考文档 |\r\n| `completion bash/zsh/fish` | 生成补全脚本 |\r\n| `completion install` | 安装补全 |\r\n| `skill install` | 安装 Claude Code 技能 |\r\n| `skill update` | 更新技能 |\r\n| `update` | 自我更新 |\r\n\r\n---\r\n\r\n## AI Skill 系统深度解析\r\n\r\n### 安装结构\r\n\r\n`wjx skill install` 安装以下文件到当前项目（也可从 [Vercel Agent Skills](https://skills.sh/wjxcom/wjx-ai-kit) 或 [ClawHub](https://clawhub.ai/skills?q=wjx) 市场安装）：\r\n\r\n```\r\n项目根目录/\r\n├── .claude/agents/\r\n│   └── wjx-cli-expert.md      # Claude Code Agent 定义\r\n└── wjx-skills/wjx-cli-use/\r\n    ├── SKILL.md                # 技能主文档（命令概览 + 核心工作流）\r\n    └── references/\r\n        ├── dsl-syntax.md       # DSL 语法参考\r\n        ├── survey-commands.md  # 问卷命令参数\r\n        ├── response-commands.md # 答卷命令参数\r\n        ├── contacts-commands.md # 通讯录/账号命令参数\r\n        ├── analytics-commands.md # 分析命令参考\r\n        └── question-types.md   # 题型编码表\r\n```\r\n\r\n### 三层渐进式架构\r\n\r\nAI Agent 不会一次加载所有文档。它按需读取：\r\n\r\n1. **Agent 定义**（~80 行）：职责范围、安全规则、工作原则\r\n2. **SKILL.md**（~110 行）：命令总览、核心工作流、枚举值\r\n3. **References**（按需加载）：只在需要具体参数细节时才读取对应文件\r\n\r\n这样设计最大化利用了 AI 的上下文窗口——大部分任务只需要前两层就够了。\r\n\r\n### 使用场景\r\n\r\n安装技能后，在 Claude Code 中可以这样用：\r\n\r\n```\r\n\"帮我创建一份 NPS 调查问卷\"\r\n→ Claude Code 自动识别需要使用 wjx-cli-expert\r\n→ 读取 SKILL.md 了解可用命令\r\n→ 选择 wjx survey create-by-text\r\n→ 需要 DSL 语法细节时读取 references/dsl-syntax.md\r\n→ 生成 DSL 文本并执行命令\r\n→ 返回问卷 ID 和预览链接\r\n```\r\n\r\n---\r\n\r\n## 错误处理\r\n\r\n### 结构化错误\r\n\r\n所有错误输出到 stderr，格式统一：\r\n\r\n```json\r\n{\r\n  \"error\": true,\r\n  \"message\": \"API Key is required\",\r\n  \"code\": \"AUTH_ERROR\",\r\n  \"exitCode\": 1\r\n}\r\n```\r\n\r\n| 退出码 | 错误码 | 含义 |\r\n|--------|--------|------|\r\n| 0 | - | 成功 |\r\n| 1 | `API_ERROR` / `AUTH_ERROR` | API 调用失败或认证错误 |\r\n| 2 | `INPUT_ERROR` | 参数格式错误 |\r\n\r\n### 在脚本中处理错误\r\n\r\n```bash\r\nif wjx survey get --vid 12345 > /tmp/survey.json 2>/tmp/error.json; then\r\n  echo \"成功: $(jq -r '.data.aname' /tmp/survey.json)\"\r\nelse\r\n  echo \"失败: $(jq -r '.message' /tmp/error.json)\"\r\nfi\r\n```\r\n\r\n---\r\n\r\n## 实战案例\r\n\r\n### 案例 1：每日答卷监控脚本\r\n\r\n```bash\r\n#!/bin/bash\r\n# daily-monitor.sh - 每天检查答卷增量\r\n\r\nVID=12345\r\nTODAY=$(date +%Y-%m-%d)\r\nYESTERDAY=$(date -d \"yesterday\" +%Y-%m-%d)\r\n\r\n# 获取今日答卷数\r\nCOUNT=$(wjx response query --vid $VID --start_date $YESTERDAY --end_date $TODAY \\\r\n  | jq '.data.total')\r\n\r\necho \"[$TODAY] 问卷 $VID 新增答卷: $COUNT 份\"\r\n\r\n# 超过 100 份时运行异常检测\r\nif [ \"$COUNT\" -gt 100 ]; then\r\n  RESPONSES=$(wjx response query --vid $VID --start_date $YESTERDAY --page_size 100)\r\n  echo \"$RESPONSES\" | wjx --stdin analytics anomalies\r\nfi\r\n```\r\n\r\n### 案例 2：通讯录批量导入\r\n\r\n```bash\r\n# 从 CSV 转 JSON 后导入\r\ncat employees.csv | python3 -c \"\r\nimport csv, json, sys\r\nreader = csv.DictReader(sys.stdin)\r\ncontacts = [{'name': r['姓名'], 'mobile': r['手机'], 'dpath': r['部门']} for r in reader]\r\nprint(json.dumps(contacts))\r\n\" | wjx --stdin contacts add\r\n```\r\n\r\n### 案例 3：CI/CD 中的问卷测试\r\n\r\n```yaml\r\n# GitHub Actions\r\n- name: 验证问卷创建\r\n  run: |\r\n    wjx init --api-key ${{ secrets.WJX_API_KEY }} --no-install-skill\r\n    wjx survey create-by-text --text \"CI测试\\n\\n1. 测试题[单选题]\\nA\\nB\" --dry-run\r\n    wjx doctor\r\n```\r\n\r\n---\r\n\r\n## 下一步\r\n\r\n- [CLI 入门指南](./cli-getting-started.md) — 快速上手\r\n- [MCP 入门指南](./mcp-getting-started.md) — AI 对话操作\r\n- [SDK 入门指南](./sdk-getting-started.md) — TypeScript 编程\r\n- [总纲](./00-overview.md) — 全景概览\r\n","cli-getting-started":"# CLI 入门指南：命令行操作问卷星\r\n\r\n> 安装 → 配置 → 第一个问卷，5 分钟上手\r\n\r\n---\r\n\r\n## 什么是 wjx-cli\r\n\r\nwjx-cli 是问卷星的命令行工具，69 个子命令覆盖问卷星全部 API 能力。它有两个特点：\r\n\r\n1. **AI Agent 原生**：默认输出 JSON，支持管道输入，结构化错误码。Claude Code、Cursor 等 AI 工具可以直接调用。\r\n2. **人类也好用**：`--table` 格式化输出、Shell 补全、`--dry-run` 预览、交互式配置向导。\r\n\r\n---\r\n\r\n## 安装\r\n\r\n```bash\r\nnpm install -g wjx-cli\r\n```\r\n\r\n验证安装：\r\n\r\n```bash\r\nwjx --version\r\n# wjx-cli/0.1.12\r\n```\r\n\r\n需要 Node.js >= 20。如果版本不够，运行 `wjx doctor` 会提示。\r\n\r\n---\r\n\r\n## 配置\r\n\r\n### 方式 1：交互式配置（推荐新用户）\r\n\r\n```bash\r\nwjx init\r\n```\r\n\r\n按提示输入：\r\n- **API Key**（必填）：微信扫码登录 [API Key 获取页](https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1) 获取\r\n- **Base URL**（可选）：默认 `https://www.wjx.cn`\r\n- **Corp ID**（可选）：企业通讯录 ID\r\n\r\n配置保存到 `~/.wjxrc`。最后会询问是否安装 Claude Code 技能包。\r\n\r\n### 方式 2：参数模式（适合 AI Agent 和 CI）\r\n\r\n```bash\r\nwjx init --api-key 你的APIKey\r\nwjx init --api-key 你的APIKey --base-url https://your.domain.com --corp-id org001\r\n```\r\n\r\n不弹交互，直接保存。`--no-install-skill` 跳过技能安装。\r\n\r\n### 方式 3：环境变量\r\n\r\n```bash\r\nexport WJX_API_KEY=你的APIKey\r\n```\r\n\r\n### 认证优先级\r\n\r\n`--api-key` 参数 > 环境变量 `WJX_API_KEY` > 配置文件 `~/.wjxrc`\r\n\r\n---\r\n\r\n## 环境检查\r\n\r\n```bash\r\nwjx doctor\r\n```\r\n\r\n输出示例：\r\n\r\n```\r\n✓ Node.js v22.0.0 (>= 20 required)\r\n✓ Config file: ~/.wjxrc\r\n✓ API Key: sk-****...****\r\n✓ API connectivity: OK (12 surveys found)\r\n✓ SDK version: wjx-api-sdk@0.1.5\r\n```\r\n\r\n---\r\n\r\n## 第一个问卷\r\n\r\n### 用 DSL 文本创建\r\n\r\n```bash\r\nwjx survey create-by-text --text \"\r\n客户满意度调查\r\n\r\n1. 您愿意向朋友推荐我们吗？[量表题]\r\n0~10\r\n\r\n2. 您对以下方面的满意程度 [矩阵量表题]\r\n行：\r\n- 产品质量\r\n- 服务态度\r\n- 响应速度\r\n列：\r\n- 非常不满意\r\n- 不满意\r\n- 一般\r\n- 满意\r\n- 非常满意\r\n\r\n3. 您有什么建议？[填空题]\r\n\"\r\n```\r\n\r\n也可以从文件创建：\r\n\r\n```bash\r\nwjx survey create-by-text --file survey.txt --publish\r\n```\r\n\r\n`--publish` 会在创建后自动发布问卷。\r\n\r\n### 查看结果\r\n\r\n```bash\r\n# 列出问卷\r\nwjx survey list\r\n\r\n# 表格格式，人类友好\r\nwjx --table survey list\r\n\r\n# 获取问卷详情\r\nwjx survey get --vid 12345\r\n\r\n# 导出为纯文本\r\nwjx survey export-text --vid 12345\r\n```\r\n\r\n---\r\n\r\n## 常用命令速查\r\n\r\n### 问卷生命周期\r\n\r\n```bash\r\n# 创建\r\nwjx survey create-by-text --text \"...\" --publish\r\nwjx survey create --title \"新问卷\" --questions '[...]'\r\n\r\n# 查看\r\nwjx survey list --name_like \"满意度\"\r\nwjx survey get --vid 12345\r\nwjx survey settings --vid 12345\r\n\r\n# 管理\r\nwjx survey status --vid 12345 --state 1    # 发布\r\nwjx survey status --vid 12345 --state 2    # 暂停\r\nwjx survey delete --vid 12345              # 删除\r\n\r\n# 链接\r\nwjx survey url --mode edit --activity 12345    # 编辑链接\r\n```\r\n\r\n### 答卷操作\r\n\r\n```bash\r\n# 统计\r\nwjx response count --vid 12345\r\nwjx response report --vid 12345\r\n\r\n# 查询\r\nwjx response query --vid 12345 --page_size 50\r\nwjx response query --vid 12345 --start_date 2026-04-01\r\n\r\n# 下载\r\nwjx response download --vid 12345\r\n\r\n# 代填提交\r\nwjx response submit --vid 12345 --inputcosttime 60 --submitdata \"1\\$9\"\r\n```\r\n\r\n### 本地分析（不需要 API Key）\r\n\r\n```bash\r\n# NPS 计算\r\nwjx analytics nps --scores \"[9,10,7,3,8,10,9]\"\r\n\r\n# CSAT 计算\r\nwjx analytics csat --scores \"[4,5,3,5,2]\"\r\nwjx analytics csat --scores \"[5,6,7,4,5]\" --scale 7-point\r\n\r\n# 解码答卷数据\r\nwjx analytics decode --submitdata \"1\\$2}2\\$hello world\"\r\n\r\n# 异常检测\r\nwjx analytics anomalies --responses '[{\"duration\":5,\"answers\":\"1,1,1,1\"},{\"duration\":120,\"answers\":\"3,2,4,1\"}]'\r\n```\r\n\r\n### 通讯录和账号\r\n\r\n```bash\r\n# 通讯录\r\nwjx contacts query --uid user001\r\nwjx contacts add --data '[{\"name\":\"张三\",\"mobile\":\"13800138000\"}]'\r\n\r\n# 部门\r\nwjx department list\r\nwjx department add --data '[{\"dpath\":\"研发部/后端组\"}]'\r\n\r\n# 子账号\r\nwjx account list\r\nwjx account add --username test1 --password Pass123 --role 2\r\n\r\n# SSO（不需要 API Key）\r\nwjx sso subaccount-url --subuser test1\r\n```\r\n\r\n---\r\n\r\n## 全局选项\r\n\r\n每个命令都支持以下选项：\r\n\r\n| 选项 | 说明 |\r\n|------|------|\r\n| `--api-key <key>` | 临时指定 API Key |\r\n| `--table` | 表格格式输出（默认 JSON） |\r\n| `--dry-run` | 预览请求但不发送 |\r\n| `--stdin` | 从管道读取 JSON 参数 |\r\n| `--json` | 强制 JSON 输出 |\r\n| `--version` | 显示版本号 |\r\n| `--help` | 显示帮助 |\r\n\r\n### Dry-Run 示例\r\n\r\n```bash\r\nwjx survey list --dry-run\r\n```\r\n\r\n输出：\r\n```\r\n[DRY-RUN] POST https://www.wjx.cn/openapi/survey/list\r\nHeaders: { authorization: \"Bearer sk-****\" }\r\nBody: { \"page_index\": 1, \"page_size\": 10 }\r\n```\r\n\r\n看到完整请求但不实际发送，适合调试和学习 API。\r\n\r\n---\r\n\r\n## Shell 补全\r\n\r\n### 一键安装\r\n\r\n```bash\r\nwjx completion install\r\n```\r\n\r\n自动检测你的 shell（bash/zsh/fish），写入对应配置文件。重新打开终端后，输入 `wjx` 按 Tab 即可补全命令和选项。\r\n\r\n### 手动安装\r\n\r\n```bash\r\n# Bash\r\nwjx completion bash >> ~/.bashrc\r\n\r\n# Zsh\r\nwjx completion zsh >> ~/.zshrc\r\n\r\n# Fish\r\nwjx completion fish > ~/.config/fish/completions/wjx.fish\r\n```\r\n\r\n---\r\n\r\n## AI Agent 集成\r\n\r\n### Claude Code 技能安装\r\n\r\n```bash\r\nwjx skill install\r\n```\r\n\r\n> 也可从 [Vercel Agent Skills](https://skills.sh/wjxcom/wjx-ai-kit) 安装：`npx skills add wjxcom/wjx-ai-kit`，或在 [ClawHub](https://clawhub.ai/skills?q=wjx) 市场搜索 \"wjx\" 安装。\r\n\r\n安装后，Claude Code 会获得一个 `wjx-cli-expert` Agent，能够：\r\n- 理解你的自然语言需求\r\n- 自动选择正确的 wjx 命令\r\n- 执行命令并解读结果\r\n- 处理错误和重试\r\n\r\n### 在 AI Agent 中使用\r\n\r\nwjx-cli 的设计让 AI Agent 可以直接解析输出：\r\n\r\n```python\r\nimport subprocess, json\r\n\r\nresult = subprocess.run(\r\n    [\"wjx\", \"survey\", \"list\"],\r\n    capture_output=True, text=True\r\n)\r\n\r\nif result.returncode == 0:\r\n    data = json.loads(result.stdout)\r\n    surveys = data[\"data\"][\"activitys\"]\r\nelse:\r\n    error = json.loads(result.stderr)\r\n    print(f\"错误: {error['message']}\")\r\n```\r\n\r\n退出码约定：\r\n- `0` — 成功\r\n- `1` — API/认证错误\r\n- `2` — 输入参数错误\r\n\r\n---\r\n\r\n## 内置参考文档\r\n\r\n不用翻网页，直接查看参考资料：\r\n\r\n```bash\r\nwjx reference dsl              # DSL 文本格式语法\r\nwjx reference question-types   # 题型编码表\r\nwjx reference survey           # 问卷命令参考\r\nwjx reference response         # 答卷命令参考\r\nwjx reference analytics        # 分析命令参考\r\n```\r\n\r\n---\r\n\r\n## 自我更新\r\n\r\n```bash\r\nwjx update\r\n```\r\n\r\n检查 npm 上的最新版本，有更新则自动安装。更新后会询问是否同步更新技能包。\r\n\r\n---\r\n\r\n## 常见问题\r\n\r\n**Q: 命令报 \"API Key is required\"**\r\n\r\n运行 `wjx doctor` 检查配置。确保已执行 `wjx init` 或设置了 `WJX_API_KEY` 环境变量。\r\n\r\n**Q: 创建问卷时 DSL 格式报错**\r\n\r\n用 `wjx reference dsl` 查看语法参考。常见问题：\r\n- 量表题用 `1~10`（波浪号），不是 `1-10`\r\n- 矩阵题的行和列需要 `行：` 和 `列：` 前缀\r\n- 多项填空题的标题中需要包含 `{_}` 占位符\r\n\r\n**Q: 如何批量操作**\r\n\r\n用管道和 jq 组合：\r\n\r\n```bash\r\n# 列出所有问卷的 vid\r\nwjx survey list --page_size 100 | jq -r '.data.activitys | to_entries[].value.vid'\r\n\r\n# 批量暂停\r\nfor vid in $(wjx survey list | jq -r '.data.activitys | to_entries[].value.vid'); do\r\n  wjx survey status --vid $vid --state 2\r\ndone\r\n```\r\n\r\n---\r\n\r\n## 下一步\r\n\r\n- [CLI 进阶指南](./cli-advanced.md) — 管道组合、自动化脚本、技能系统深度用法\r\n- [MCP 入门指南](./mcp-getting-started.md) — 用 AI 对话操作问卷星\r\n- [SDK 入门指南](./sdk-getting-started.md) — TypeScript 编程接入\r\n- [总纲](./00-overview.md) — 全景概览\r\n","mcp-advanced":"# MCP Server 进阶指南：56 个工具完全攻略\n\n> HTTP 部署、Docker、多租户、自动化工作流、全部工具深度用法\n\n---\n\n## HTTP 模式部署\n\n默认的 stdio 模式适合本地 AI 客户端。如果你需要团队共享或远程访问，可以启用 HTTP 模式。\n\n### 启动 HTTP 服务\n\n```bash\n# 环境变量方式\nMCP_TRANSPORT=http PORT=3000 MCP_AUTH_TOKEN=your_secret npx wjx-mcp-server\n\n# 或命令行参数\nnpx wjx-mcp-server --http\n```\n\n### 端点说明\n\n| 端点 | 方法 | 说明 |\n|------|------|------|\n| `/mcp` | POST | MCP 消息端点（需要 Bearer Token） |\n| `/health` | GET | 健康检查（公开，返回 `{\"status\":\"ok\"}`） |\n\n### 认证\n\n设置 `MCP_AUTH_TOKEN` 后，所有 `/mcp` 请求需要携带 Bearer Token：\n\n```\nAuthorization: Bearer your_secret\n```\n\n### 多租户模式\n\nHTTP 模式天然支持多租户。每个请求的 Bearer Token 会被用作该请求的问卷星 API Key。不同客户端可以用各自的 API Key 访问同一个 MCP Server。\n\n服务端通过 Node.js AsyncLocalStorage 将每个请求的凭据穿透到所有 SDK 调用，互不干扰。\n\n```\n客户端 A（API Key A）──→ POST /mcp ──→ MCP Server ──→ 用 Key A 调用问卷星\n客户端 B（API Key B）──→ POST /mcp ──→ MCP Server ──→ 用 Key B 调用问卷星\n```\n\n---\n\n## Docker 部署\n\n### 构建镜像\n\n需要从 monorepo 根目录构建（因为 SDK 是 workspace 依赖）：\n\n```bash\ngit clone https://github.com/wjxcom/wjx-ai-kit.git\ncd wjx-ai-kit\ndocker build -f wjx-mcp-server/Dockerfile -t wjx-mcp-server .\n```\n\n### 运行\n\n```bash\ndocker run -d \\\n  --name wjx-mcp \\\n  -p 3000:3000 \\\n  -e WJX_API_KEY=your_api_key \\\n  -e MCP_AUTH_TOKEN=your_secret \\\n  wjx-mcp-server\n```\n\n内置健康检查（每 30 秒探测 `/health`），适合 Kubernetes 和 Docker Compose。\n\n### Docker Compose 示例\n\n```yaml\nservices:\n  wjx-mcp:\n    build:\n      context: .\n      dockerfile: wjx-mcp-server/Dockerfile\n    ports:\n      - \"3000:3000\"\n    environment:\n      - WJX_API_KEY=${WJX_API_KEY}\n      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}\n    restart: unless-stopped\n    healthcheck:\n      test: [\"CMD\", \"wget\", \"-q\", \"--spider\", \"http://localhost:3000/health\"]\n      interval: 30s\n      timeout: 5s\n      retries: 3\n```\n\n---\n\n## 全部工具详解\n\n### 问卷管理（12 个工具）\n\n#### `create_survey` — 创建问卷（JSON 模式）\n\n用结构化 JSON 创建问卷。适合精确控制题目结构的场景。\n\n```\n参数：\n- aname (string, 必填): 问卷标题\n- questions (array): 题目 JSON 数组\n- source_vid (number): 从已有问卷复制\n- atype (number): 问卷类型（1=调查 3=投票 6=考试 7=表单）\n- adesc (string): 问卷描述\n- publish (boolean): 创建后自动发布\n```\n\n#### `create_survey_by_text` — 创建问卷（DSL 文本模式）\n\n**推荐使用。** 用人类可读的 DSL 文本创建问卷，支持 27 种题型标签。\n\n```\n参数：\n- text (string, 必填): DSL 格式的问卷文本\n- atype (number): 问卷类型\n- publish (boolean): 创建后自动发布\n```\n\nDSL 支持的题型标签：\n\n| 类别 | 标签 |\n|------|------|\n| 选择题 | `[单选题]` `[多选题]` `[下拉框]` `[判断题]` |\n| 评分题 | `[量表题]` `[评分单选]` `[评分多选]` `[滑动条]` |\n| 矩阵题 | `[矩阵量表题]` `[矩阵单选题]` `[矩阵多选题]` `[矩阵填空题]` |\n| 填空题 | `[填空题]` `[简答题]` `[多项填空题]` |\n| 特殊题 | `[排序题]` `[比重题]` `[文件上传]` `[绘图题]` |\n| 考试题 | `[考试多项填空]` `[考试完形填空]` `[情景题]` |\n| 结构 | `[多级下拉题]` `[商品题]` |\n\n#### `get_survey` — 获取问卷详情\n\n```\n参数：\n- vid (number, 必填): 问卷 ID\n- format (string): 输出格式，\"json\"（默认）或 \"dsl\"（纯文本格式）\n```\n\n`format=dsl` 返回人类可读的文本格式，适合 AI 理解问卷内容。\n\n#### `list_surveys` — 获取问卷列表\n\n```\n参数：\n- page_index (number): 页码（默认 1）\n- page_size (number): 每页数量（默认 10，最大 100）\n- status (number): 状态过滤（0=未发布 1=收集中 2=已暂停 3=已删除）\n- atype (number): 类型过滤\n- name_like (string): 名称模糊搜索\n- start_date / end_date (string): 时间范围\n- folder_id (number): 文件夹 ID\n- sort_by / sort_order: 排序\n```\n\n#### `update_survey_status` — 修改问卷状态\n\n```\n参数：\n- vid (number, 必填): 问卷 ID\n- state (number, 必填): 目标状态（1=发布 2=暂停 3=删除）\n```\n\n#### 其他问卷工具\n\n- `get_survey_settings` / `update_survey_settings` — 获取/修改问卷设置\n- `delete_survey` — 删除问卷（可选永久删除）\n- `get_question_tags` / `get_tag_details` — 题目标签管理\n- `clear_recycle_bin` — 清空回收站\n- `upload_file` — 上传图片文件（Base64）\n\n### 答卷管理（9 个工具）\n\n#### `query_responses` — 查询答卷\n\n最常用的答卷工具，支持丰富的过滤条件。\n\n```\n参数：\n- vid (number, 必填): 问卷 ID\n- page_index / page_size: 分页\n- start_date / end_date: 时间范围\n- conditions (string): 条件筛选（如 \"Q1=选项A\"）\n- dedup (boolean): 去重\n- order_by (string): 排序\n```\n\n#### `get_report` — 统计报告\n\n返回每道题的频率分布、平均分、标准差等统计数据。\n\n```\n参数：\n- vid (number, 必填): 问卷 ID\n```\n\n#### `download_responses` — 批量下载\n\n```\n参数：\n- vid (number, 必填): 问卷 ID\n- format (string): 格式（csv/sav/word）\n```\n\n超过 3000 条自动切换为异步下载模式（120 秒超时）。\n\n#### 其他答卷工具\n\n- `query_responses_realtime` — 实时增量查询（消费式，需白名单）\n- `submit_response` — 代填提交答卷\n- `get_winners` — 抽奖中奖者查询\n- `modify_response` — 修改答卷（如调整考试主观题分数）\n- `get_360_report` — 360 度评估报告（异步任务）\n- `clear_responses` — 清空全部答卷（不可逆）\n\n### 通讯录管理（14 个工具）\n\n企业通讯录的完整 CRUD，覆盖联系人、部门、管理员、标签四个维度。需要设置 `WJX_CORP_ID`。\n\n| 维度 | 工具 |\n|------|------|\n| 联系人 | `query_contacts` `add_contacts` `delete_contacts` |\n| 管理员 | `add_admin` `delete_admin` `restore_admin` |\n| 部门 | `list_departments` `add_department` `modify_department` `delete_department` |\n| 标签 | `list_tags` `add_tag` `modify_tag` `delete_tag` |\n\n### SSO 单点登录（5 个工具）\n\n生成免密登录 URL，纯本地计算，无需 API 调用。\n\n| 工具 | 用途 |\n|------|------|\n| `sso_subaccount_url` | 子账号 SSO 登录（自动创建或登录已有账号） |\n| `sso_user_system_url` | 用户体系参与者 SSO 登录 |\n| `sso_partner_url` | 合作伙伴/代理商 SSO 登录 |\n| `build_survey_url` | 生成问卷创建或编辑页面 URL |\n| `build_preview_url` | 生成答卷填写页面 URL |\n\n### 数据分析（5 个工具）\n\n**全部在本地运行，数据不离开你的机器。** 无需 API Key。\n\n#### `calculate_nps` — NPS 计算\n\n```\n输入: scores (number[]): 0-10 评分数组\n输出: score (-100~100), rating (优秀/良好/一般/较差),\n      promoters/passives/detractors 各组 {count, ratio}\n```\n\n行业基准：\n\n| 评级 | 分值 | 含义 |\n|------|------|------|\n| 优秀 | > 70 | 用户强烈推荐 |\n| 良好 | 50-70 | 用户倾向推荐 |\n| 一般 | 0-50 | 有改进空间 |\n| 较差 | < 0 | 需要紧急改进 |\n\n#### `calculate_csat` — CSAT 计算\n\n```\n输入: scores (number[]): 评分数组\n      scaleType (\"5-point\" | \"7-point\"): 量表类型\n输出: csat (0-1 比率), satisfiedCount, total, distribution\n```\n\n#### `detect_anomalies` — 异常检测\n\n三种检测策略：\n1. **直线作答**：连续选择相同答案（如全选 A）\n2. **秒答检测**：答题时间 < 中位时长的 30%\n3. **重复检测**：相同 IP + 相似答案内容\n\n#### `decode_responses` — 答卷解码\n\n解析问卷星的 submitdata 编码格式（`题号$答案}题号$答案`）为结构化数据。\n\n#### `compare_metrics` — 指标对比\n\nA/B 组或时间段对比，差异 >10% 标记为显著。\n\n---\n\n## 自动化工作流示例\n\n### 工作流 1：每周 NPS 监控\n\n对 Claude 说：\n\n> \"帮我分析问卷 12345 最近 7 天的 NPS 数据。\n> 1. 先查询本周的答卷\n> 2. 提取所有 NPS 评分题的分数\n> 3. 计算 NPS 得分\n> 4. 和上周数据做对比\n> 5. 如果下降超过 10 分，找出贬损者的开放题反馈\"\n\nClaude 会自动调用 `query_responses` → `decode_responses` → `calculate_nps` → `compare_metrics` → `query_responses`（筛选贬损者），输出完整分析报告。\n\n### 工作流 2：从文档出考试题\n\n> \"用这份《信息安全管理制度》出一套考试题：\n> - 10 道单选题\n> - 5 道多选题\n> - 5 道判断题\n> 创建为考试类型问卷，发布后给我链接\"\n\nClaude 使用 `generate-exam-from-document` prompt → 生成 DSL 文本 → `create_survey_by_text`（atype=6）→ `update_survey_status`（发布）→ `build_preview_url`（生成链接）。\n\n### 工作流 3：批量创建 + SSO 分发\n\n> \"帮我做以下事情：\n> 1. 创建一份客户满意度调查\n> 2. 给子账号 sales01 生成 SSO 登录链接\n> 3. 查看通讯录里市场部的联系人\"\n\nClaude 分步调用多个工具完成跨模块操作。\n\n### 工作流 4：问卷质量诊断\n\n> \"对问卷 12345 做一次完整的质量检查\"\n\n使用 `survey-health-check` prompt，Claude 自动执行：\n1. 获取问卷结构 → 检查题目设计质量\n2. 获取统计报告 → 分析完成率和弃答率\n3. 查询答卷样本 → 运行异常检测\n4. 输出 0-100 健康分 + 具体改进建议\n\n---\n\n## 高级配置\n\n### 自定义 API 端点\n\n私有部署或测试环境可以覆盖任意 URL：\n\n```bash\n# 全局覆盖\nWJX_BASE_URL=https://your-private-wjx.com\n\n# 单个端点覆盖\nWJX_API_URL=https://custom-api.example.com/openapi\nWJX_CONTACTS_API_URL=https://custom-contacts.example.com\n```\n\n### 会话管理\n\nHTTP 模式默认有状态（`MCP_SESSION=stateful`），通过 `mcp-session-id` 头维护会话。\n\n设置 `MCP_SESSION=stateless` 可关闭会话跟踪，适合无状态负载均衡部署。\n\n### .env 文件\n\nMCP Server 有内置的 .env 解析器（不依赖 dotenv），按以下顺序查找：\n\n1. 当前工作目录下的 `.env`\n2. wjx-mcp-server 包目录下的 `.env`\n\n环境变量优先于 .env 文件。\n\n---\n\n## API 核心机制\n\n### 请求签名\n\n所有 API 请求自动进行 SHA1 签名：\n1. 将参数 key 按字母排序\n2. 拼接非空 value\n3. 末尾追加 API Key\n4. SHA1 哈希生成签名\n\n签名时间窗口 30 秒，服务端自动校验。\n\n### 重试策略\n\n| 操作类型 | 重试次数 | 说明 |\n|----------|---------|------|\n| 读取操作 | 最多 2 次 | 429/5xx 触发重试，指数退避 + 随机抖动 |\n| 写入操作 | 0 次 | 防止重复创建/删除 |\n\n### 超时设置\n\n| 操作 | 超时 |\n|------|------|\n| 常规请求 | 15 秒 |\n| 批量下载 / 360 报告 | 120 秒 |\n\n### 请求追踪\n\n每个请求自动生成 UUID traceID，附加在 URL 查询参数中，用于问题排查。\n\n---\n\n## 下一步\n\n- [MCP 入门指南](./mcp-getting-started.md) — 5 分钟快速接入\n- [CLI 入门指南](./cli-getting-started.md) — 命令行工具\n- [SDK 进阶指南](./sdk-advanced.md) — 底层 SDK 高级用法\n- [总纲](./00-overview.md) — 全景概览\n","mcp-getting-started":"# MCP Server 入门指南：让 AI 直接操作问卷星\n\n> 5 分钟配置，用自然语言创建问卷、查询数据、分析结果\n\n---\n\n## 什么是 MCP Server\n\nMCP (Model Context Protocol) 是 AI 工具调用的标准协议。wjx-mcp-server 让 Claude、Cursor、Windsurf 等 AI 客户端可以直接操作你的问卷星账户——创建问卷、查看答卷、做数据分析，全部用自然语言完成。\n\n打个比方：如果问卷星是一栋大楼，MCP Server 就是给 AI 配了一把钥匙和一份楼层指南。AI 知道每个房间在哪、能做什么，你只需要说目的地。\n\n---\n\n## 准备工作\n\n### 1. 获取问卷星 API Key\n\n微信扫码登录 [API Key 获取页](https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1)，登录后页面直接显示 API Key。\n\n> 企业用户如需管理通讯录，还需要获取 Corp ID（企业通讯录 ID）。\n\n### 2. 确认 Node.js 版本\n\n```bash\nnode --version\n# 需要 v20 或更高版本\n```\n\n如果版本低于 20，请前往 [nodejs.org](https://nodejs.org) 下载安装最新 LTS 版本。\n\n---\n\n## 接入 Claude Desktop\n\n### 安装\n\n```bash\nnpm install -g wjx-mcp-server\n```\n\n### 配置\n\n找到 Claude Desktop 配置文件：\n- **macOS**: `~/Library/Application Support/Claude/claude_desktop_config.json`\n- **Windows**: `%APPDATA%\\Claude\\claude_desktop_config.json`\n\n添加以下内容：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"command\": \"npx\",\n      \"args\": [\"wjx-mcp-server\"],\n      \"env\": {\n        \"WJX_API_KEY\": \"替换为你的API Key\"\n      }\n    }\n  }\n}\n```\n\n保存后重启 Claude Desktop。在输入框旁边会看到工具图标，点击可以看到 56 个问卷星工具已就绪。\n\n> 更详细的配置说明请参阅 [Claude Desktop 配置指南](./setup-claude-desktop.md)。\n\n### 验证\n\n对 Claude 说：\n\n> \"列出我的问卷\"\n\nClaude 会调用 `list_surveys` 工具，返回你账户下的问卷列表。如果看到问卷数据，说明配置成功。\n\n---\n\n## 接入 Cursor\n\n在项目根目录创建 `.cursor/mcp.json`：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"command\": \"npx\",\n      \"args\": [\"wjx-mcp-server\"],\n      \"env\": {\n        \"WJX_API_KEY\": \"替换为你的API Key\"\n      }\n    }\n  }\n}\n```\n\n重启 Cursor，在 AI 对话中即可使用问卷星工具。\n\n> 更详细的配置说明请参阅 [Cursor 配置指南](./setup-cursor.md)。\n\n---\n\n## 接入 Claude Code\n\n```bash\nclaude mcp add wjx -- npx wjx-mcp-server\n```\n\n需要设置环境变量：\n\n```bash\nexport WJX_API_KEY=\"替换为你的API Key\"\n```\n\n> Claude Code 支持完整的 Agent + Skill 体验，详见 [Claude Code 配置指南](./setup-claude-code.md)。\n\n---\n\n## 第一个任务：创建问卷\n\n接入完成后，试试对 AI 说：\n\n> \"帮我创建一份客户满意度调查，包含：\n> 1. NPS 推荐意愿评分（0-10）\n> 2. 5 个维度的量表评分（产品质量、服务态度、响应速度、性价比、整体体验）\n> 3. 一个开放建议题\"\n\nAI 会：\n1. 设计问卷结构\n2. 生成 DSL 文本（一种直觉的纯文本问卷格式）\n3. 调用 `create_survey_by_text` 工具创建问卷\n4. 返回问卷 ID 和预览链接\n\n整个过程不到 1 分钟。\n\n---\n\n## 常用对话示例\n\n### 问卷管理\n\n```\n\"列出我最近创建的 5 份问卷\"\n\"获取问卷 12345 的详细信息\"\n\"把问卷 12345 发布上线\"\n\"暂停问卷 12345 的收集\"\n\"删除草稿问卷 12345\"\n```\n\n### 答卷查询\n\n```\n\"问卷 12345 收到了多少份答卷？\"\n\"查询问卷 12345 最近 7 天的答卷数据\"\n\"下载问卷 12345 的全部答卷为 CSV\"\n\"查看问卷 12345 的统计报告\"\n```\n\n### 数据分析\n\n```\n\"分析问卷 12345 的 NPS 得分\"\n\"帮我做问卷 12345 的满意度分析\"\n\"检测问卷 12345 的异常答卷（刷题、秒答等）\"\n\"对比问卷 12345 和 67890 的关键指标\"\n```\n\n### 问卷创建\n\n```\n\"创建一份员工敬业度调查\"\n\"帮我出一套高中物理力学考试题，20 题\"\n\"做一份 360 度评估问卷，包含领导力、协作、创新三个维度\"\n\"创建一份产品 NPS 调查，中英双语\"\n```\n\n---\n\n## 工具分类速览\n\nMCP Server 提供 56 个工具，分为 7 个模块：\n\n| 模块 | 工具数 | 用途 | 示例 |\n|------|--------|------|------|\n| **问卷管理** | 12 | 创建、查看、修改、删除问卷 | `create_survey_by_text` |\n| **答卷管理** | 9 | 查询、下载、提交答卷 | `query_responses` |\n| **通讯录** | 14 | 联系人、部门、管理员、标签 | `add_contacts` |\n| **SSO** | 5 | 生成单点登录链接 | `sso_subaccount_url` |\n| **用户体系** | 6 | 参与者管理和问卷绑定 | `bind_activity` |\n| **子账号** | 5 | 多用户账号管理 | `add_sub_account` |\n| **数据分析** | 5 | NPS/CSAT/异常检测（本地计算） | `calculate_nps` |\n\n### 内置参考资源\n\nAI 可以随时查阅 8 个参考资源，不需要你提供文档：\n\n| 资源 | 内容 |\n|------|------|\n| `wjx://reference/question-types` | 全部题型编码表（单选、多选、量表、矩阵等） |\n| `wjx://reference/survey-types` | 问卷类型（调查、考试、投票、表单等） |\n| `wjx://reference/dsl-syntax` | DSL 文本格式语法参考 |\n| `wjx://reference/response-format` | 答卷数据编码格式说明 |\n| `wjx://reference/analysis-methods` | NPS/CSAT 计算方法和行业基准 |\n| `wjx://reference/survey-statuses` | 问卷状态码和合法状态转换 |\n| `wjx://reference/user-roles` | 子账号角色权限说明 |\n| `wjx://reference/push-format` | Webhook 推送数据加密格式 |\n\n### 预设 Prompt 模板\n\n19 个预设 Prompt 提供标准化工作流：\n\n**调研分析类：**\n- `nps-analysis` — 完整 NPS 分析流程\n- `csat-analysis` — 满意度分析 + 驱动因素识别\n- `cross-tabulation` — 交叉分析\n- `sentiment-analysis` — 开放题情感分析\n- `survey-health-check` — 问卷质量诊断（0-100 健康分）\n- `comparative-analysis` — 多问卷对比分析\n\n**问卷生成类：**\n- `generate-survey` — 通用问卷生成\n- `generate-nps-survey` — NPS 调查生成\n- `generate-satisfaction-survey` — 满意度调查生成\n- `generate-engagement-survey` — 员工敬业度调查生成\n- `generate-360-evaluation` — 360 度评估生成\n- `generate-exam-from-document` — 从文档出考试题\n- `generate-exam-from-knowledge` — 从知识领域出考试题\n\n**运维操作类：**\n- `design-survey` — 引导式问卷设计\n- `analyze-results` — 数据分析工作流\n- `create-nps-survey` — 一键创建标准 NPS 问卷\n- `configure-webhook` — Webhook 配置向导\n- `anomaly-detection` — 异常答卷检测\n- `user-system-workflow` — 用户体系端到端指南\n\n---\n\n## 环境变量参考\n\n| 变量 | 必填 | 默认值 | 说明 |\n|------|:----:|--------|------|\n| `WJX_API_KEY` | 是 | - | 问卷星 API Key |\n| `WJX_CORP_ID` | 否 | - | 企业通讯录 ID |\n| `WJX_BASE_URL` | 否 | `https://www.wjx.cn` | API 基础地址 |\n| `MCP_TRANSPORT` | 否 | `stdio` | 传输模式（stdio / http） |\n| `PORT` | 否 | `3000` | HTTP 模式端口 |\n| `MCP_AUTH_TOKEN` | 否 | - | HTTP 模式认证令牌 |\n\n---\n\n## 常见问题\n\n**Q: 我看不到工具图标 / AI 说找不到问卷星工具**\n\n检查：\n1. 配置文件路径是否正确\n2. API Key 是否已填入\n3. 是否重启了 Claude Desktop / Cursor\n4. 运行 `npx wjx-mcp-server` 看是否有报错\n\n**Q: AI 创建问卷失败，说认证错误**\n\n确认 API Key 是否有效。可以在终端测试：\n\n```bash\nWJX_API_KEY=你的Key npx wjx-mcp-server\n```\n\n然后在 Claude 中重试。\n\n**Q: 可以在团队中共享使用吗？**\n\n可以。有两种方式：\n1. **每人独立配置**：每个团队成员用自己的 API Key 配置本地 MCP Server\n2. **HTTP 模式共享**：部署一个 HTTP 模式的 MCP Server，团队共用（详见[进阶指南](./mcp-advanced.md)）\n\n**Q: 支持哪些 AI 客户端？**\n\n任何支持 MCP 协议的客户端都可以接入。已验证的包括：\n- Claude Desktop\n- Claude Code\n- Cursor\n- Windsurf\n- Continue.dev\n\n---\n\n## 下一步\n\n- [MCP Server 进阶指南](./mcp-advanced.md) — HTTP 部署、Docker、多租户、自动化工作流\n- [CLI 入门指南](./cli-getting-started.md) — 命令行工具快速上手\n- [总纲](./00-overview.md) — wjx-ai-kit 全景概览\n","sdk-advanced":"# SDK 进阶指南：高级特性与最佳实践\n\n> DSL 双向转换、本地分析引擎、fetch 注入测试、多租户架构、Webhook 解密\n\n---\n\n## DSL 双向转换\n\nSDK 内置了一套完整的问卷 DSL（领域特定语言），支持纯文本和 API 结构体之间的双向转换。\n\n### 文本 → 问卷（textToSurvey）\n\n```typescript\nimport { textToSurvey } from \"wjx-api-sdk\";\n\nconst text = `\n员工满意度调查\n这是一份匿名调查\n===\n\n1. 您的部门 [下拉框]\n技术部\n产品部\n市场部\n\n2. 整体满意度 [量表题]\n1~10\n\n3. 请评价以下方面 [矩阵量表题]\n行：\n- 工作环境\n- 团队协作\n- 薪酬福利\n列：\n- 非常不满意\n- 不满意\n- 一般\n- 满意\n- 非常满意\n\n4. 改进建议 [填空题]\n`;\n\nconst parsed = textToSurvey(text);\n// parsed.title === \"员工满意度调查\"\n// parsed.description === \"这是一份匿名调查\"\n// parsed.questions[0].type === \"dropdown\"\n// parsed.questions[1].type === \"scale\"\n// parsed.questions[2].type === \"matrix-scale\"\n```\n\n### 问卷 → 文本（surveyToText）\n\n```typescript\nimport { getSurvey, surveyToText } from \"wjx-api-sdk\";\n\nconst survey = await getSurvey({ vid: 12345 });\nconst text = surveyToText(survey.data);\nconsole.log(text);\n// 输出人类可读的 DSL 文本，可以编辑后重新创建\n```\n\n### 结构 → API 格式（parsedQuestionsToWire）\n\n```typescript\nimport { textToSurvey, parsedQuestionsToWire, createSurvey } from \"wjx-api-sdk\";\n\nconst parsed = textToSurvey(dslText);\nconst { questions: wireQuestions } = parsedQuestionsToWire(parsed.questions);\n// wireQuestions 是 API 需要的 { q_title, q_type, q_subtype, items, ... } 格式\n\nawait createSurvey({\n  title: parsed.title,\n  description: parsed.description ?? \"\",\n  type: 1,\n  questions: JSON.stringify(wireQuestions),\n});\n```\n\n`createSurveyByText()` 是以上三步的封装——解析、转换、创建一步完成。\n\n### 支持的 27 种题型标签\n\n| 类别 | 标签 | 内部类型 |\n|------|------|----------|\n| 单选 | `[单选题]` `[下拉框]` `[量表题]` `[评分单选]` `[情景题]` `[判断题]` | q_type=3 |\n| 多选 | `[多选题]` `[评分多选]` `[排序题]` `[商品题]` | q_type=4 |\n| 填空 | `[填空题]` `[简答题]` `[多级下拉题]` | q_type=5 |\n| 多项填空 | `[多项填空题]` `[考试多项填空]` `[考试完形填空]` | q_type=6 |\n| 矩阵 | `[矩阵题]` `[矩阵量表题]` `[矩阵单选题]` `[矩阵多选题]` `[矩阵填空题]` | q_type=7 |\n| 文件 | `[文件上传]` `[绘图题]` | q_type=8 |\n| 特殊 | `[比重题]` `[滑动条]` | q_type=9/10 |\n\n方括号 `[]`、中括号 `【】`、圆括号 `()` `（）` 都可以识别。\n\n---\n\n## 本地分析引擎\n\n6 个分析函数完全在本地运行，不需要网络，不需要 API Key。\n\n### NPS 计算\n\n```typescript\nimport { calculateNps } from \"wjx-api-sdk\";\n\nconst result = calculateNps([10, 9, 10, 8, 7, 6, 5, 4, 3, 2]);\n\nconsole.log(result);\n// {\n//   score: -20,                          // NPS 得分 (-100 ~ 100)\n//   rating: \"较差\",                       // 评级\n//   total: 10,\n//   promoters: { count: 3, ratio: 0.3 },  // 推荐者 (9-10分)\n//   passives: { count: 2, ratio: 0.2 },   // 中立者 (7-8分)\n//   detractors: { count: 5, ratio: 0.5 }, // 贬损者 (0-6分)\n// }\n```\n\n评级标准：\n| 分值 | 评级 | 含义 |\n|------|------|------|\n| > 70 | 优秀 | 强烈推荐 |\n| 50-70 | 良好 | 倾向推荐 |\n| 0-50 | 一般 | 有改进空间 |\n| < 0 | 较差 | 需紧急改进 |\n\n### CSAT 计算\n\n```typescript\nimport { calculateCsat } from \"wjx-api-sdk\";\n\n// 5 级量表（默认，满意 = 4 和 5）\nconst csat5 = calculateCsat([5, 4, 3, 5, 4]);\n// { csat: 0.8, satisfiedCount: 4, total: 5, distribution: {\"3\":1,\"4\":2,\"5\":2} }\n\n// 7 级量表（满意 = 5、6 和 7）\nconst csat7 = calculateCsat([6, 7, 5, 6, 7], \"7-point\");\n// { csat: 1.0, satisfiedCount: 5, total: 5, distribution: {\"5\":1,\"6\":2,\"7\":2} }\n```\n\n### 异常检测\n\n```typescript\nimport { detectAnomalies } from \"wjx-api-sdk\";\n\nconst result = detectAnomalies([\n  { id: \"r1\", duration_seconds: 5, answers: [1, 1, 1, 1, 1], ip: \"1.2.3.4\" },\n  { id: \"r2\", duration_seconds: 120, answers: [3, 2, 4, 1, 5], ip: \"5.6.7.8\" },\n  { id: \"r3\", duration_seconds: 8, answers: [1, 1, 1, 1, 1], ip: \"1.2.3.4\" },\n]);\n\n// result: {\n//   flagged: [\n//     { responseId: \"r1\", reasons: [\"straight-lining\", \"speed-anomaly\"] },\n//     { responseId: \"r3\", reasons: [\"straight-lining\", \"speed-anomaly\", \"ip-content-duplicate\"] },\n//   ],\n//   totalChecked: 3,\n// }\n```\n\n三种检测策略：\n- **秒答检测**：答题时间 < 中位时长的 30%\n- **直线作答**：所有答案完全相同\n- **重复检测**：相同 IP + 相似答案内容\n\n### 答卷数据解码\n\n```typescript\nimport { decodeResponses } from \"wjx-api-sdk\";\n\nconst decoded = decodeResponses(\"1$2}2$hello world}3$1|3|5\");\n// {\n//   answers: [\n//     { questionIndex: 1, type: \"single\", value: \"2\" },\n//     { questionIndex: 2, type: \"fill\", value: \"hello world\" },\n//     { questionIndex: 3, type: \"multi\", value: [\"1\", \"3\", \"5\"] },\n//   ],\n//   count: 3,\n// }\n```\n\n问卷星的 submitdata 使用 `题号$答案}题号$答案` 格式，`decodeResponses` 将其转换为结构化对象。\n\n### 指标对比\n\n```typescript\nimport { compareMetrics } from \"wjx-api-sdk\";\n\nconst result = compareMetrics(\n  { nps: 45, csat: 78, completion: 85 },  // A 组\n  { nps: 52, csat: 72, completion: 90 },  // B 组\n);\n\n// result.comparisons: [\n//   { metric: \"nps\", valueA: 45, valueB: 52, delta: 7, changeRate: 0.1556, significant: true },\n//   { metric: \"csat\", valueA: 78, valueB: 72, delta: -6, changeRate: -0.0769, significant: false },\n//   { metric: \"completion\", valueA: 85, valueB: 90, delta: 5, changeRate: 0.0588, significant: false },\n// ]\n```\n\n差异超过 10% 标记为 `significant: true`。\n\n---\n\n## Webhook 推送解密\n\n问卷星的 Webhook 推送使用 AES-128-CBC 加密。SDK 提供完整的解密和签名验证：\n\n```typescript\nimport { decodePushPayload } from \"wjx-api-sdk\";\n\n// Express 中间件示例\napp.post(\"/webhook\", (req, res) => {\n  const { decrypted, signatureValid } = decodePushPayload(\n    req.body.encrypt,                    // 加密数据\n    process.env.WJX_API_KEY,             // API Key（用于派生 AES 密钥）\n    req.headers[\"x-wjx-signature\"],      // 可选：签名\n    JSON.stringify(req.body),            // 可选：原始请求体\n  );\n\n  if (signatureValid) {\n    // decrypted 是解密后的 JSON 对象\n    console.log(\"新答卷:\", decrypted);\n    res.json({ success: true });\n  } else {\n    res.status(403).json({ error: \"签名验证失败\" });\n  }\n});\n```\n\n解密流程：\n1. MD5(API Key) 取前 16 字节作为 AES 密钥\n2. 密文前 16 字节为 IV\n3. AES-128-CBC + PKCS7 解密\n4. 可选：SHA1 签名验证（timing-safe 比较，防时序攻击）\n\n---\n\n## fetch 注入测试\n\nSDK 的每个函数都接受可选的 `fetchImpl` 参数，让你无需任何 HTTP mocking 库就能编写测试：\n\n```typescript\nimport { createSurvey, type FetchLike } from \"wjx-api-sdk\";\n\nfunction mockFetch(responseBody: unknown, status = 200): FetchLike {\n  let capturedUrl: string;\n  let capturedInit: RequestInit;\n\n  const fn = async (input: string | URL, init?: RequestInit) => {\n    capturedUrl = String(input);\n    capturedInit = init!;\n    return new Response(JSON.stringify(responseBody), {\n      status,\n      headers: { \"Content-Type\": \"application/json\" },\n    });\n  };\n\n  // 附加捕获器\n  (fn as any).captured = () => ({ url: capturedUrl, init: capturedInit });\n  return fn as FetchLike;\n}\n\n// 测试\ntest(\"创建问卷发送正确请求\", async () => {\n  const fetch = mockFetch({ result: true, data: { vid: 999 } });\n\n  const result = await createSurvey(\n    { title: \"测试问卷\", type: 1, description: \"\", questions: \"[]\" },\n    { apiKey: \"test-key\" },\n    fetch,\n  );\n\n  assert.strictEqual(result.data.vid, 999);\n\n  // 验证请求内容\n  const { url, init } = (fetch as any).captured();\n  assert(url.includes(\"/openapi/survey/create\"));\n  assert.strictEqual(init.method, \"POST\");\n  const body = JSON.parse(init.body);\n  assert.strictEqual(body.title, \"测试问卷\");\n});\n```\n\n**623 个测试全部使用这种模式**，零网络调用，运行速度极快。\n\n---\n\n## 多租户架构\n\n### 凭据提供者模式\n\n`setCredentialProvider()` 配合 Node.js AsyncLocalStorage 实现请求级别的凭据隔离：\n\n```typescript\nimport { AsyncLocalStorage } from \"node:async_hooks\";\nimport { setCredentialProvider, listSurveys } from \"wjx-api-sdk\";\n\nconst store = new AsyncLocalStorage<{ apiKey: string }>();\n\n// 注册提供者\nsetCredentialProvider(() => {\n  const ctx = store.getStore();\n  return ctx ? { apiKey: ctx.apiKey } : undefined;\n});\n\n// HTTP 请求处理\napp.get(\"/api/surveys\", (req, res) => {\n  const apiKey = req.headers[\"x-api-key\"] as string;\n\n  store.run({ apiKey }, async () => {\n    // 自动使用当前请求的 API Key\n    const surveys = await listSurveys({ page_index: 1 });\n    res.json(surveys);\n  });\n});\n```\n\n每个请求在自己的 AsyncLocalStorage context 中运行，凭据互不干扰。这正是 wjx-mcp-server HTTP 模式的实现方式。\n\n### 凭据优先级\n\n1. 函数参数中直接传入的 `credentials`\n2. `setCredentialProvider()` 注册的提供者\n3. `process.env.WJX_API_KEY` 环境变量\n\n提供者可以返回 `undefined` 来跳过，让系统 fallback 到环境变量。\n\n---\n\n## 自定义 API 端点\n\n私有部署或测试环境可以覆盖 API 基础地址：\n\n```bash\n# 全局覆盖\nexport WJX_BASE_URL=https://your-private-instance.com\n\n# 单个端点覆盖\nexport WJX_API_URL=https://custom-api.example.com/openapi\nexport WJX_CONTACTS_API_URL=https://custom-contacts.example.com\n```\n\nURL 解析优先级：显式端点环境变量 > BASE_URL + 路径 > 硬编码默认值\n\n---\n\n## API 核心机制\n\n### 请求签名算法\n\n所有 API 请求自动签名，无需手动处理：\n\n```\n1. 收集所有参数（包括 timestamp）\n2. 按 key 字母排序\n3. 拼接所有非空 value\n4. 末尾追加 API Key\n5. SHA1 哈希 → sign 参数\n```\n\n时间窗口 30 秒，SDK 自动生成 timestamp。\n\n### 重试与超时\n\n| 操作类型 | 重试次数 | 超时 | 说明 |\n|----------|---------|------|------|\n| 读取操作 | 最多 2 次 | 15s | 429/5xx 触发，指数退避 + 随机抖动 |\n| 写入操作 | 0 次 | 15s | 防止重复创建/删除 |\n| 批量下载 | 最多 2 次 | 120s | 大数据量场景 |\n| 360 报告 | 最多 2 次 | 120s | 异步任务轮询 |\n\n### TraceID\n\n每个请求自动生成 UUID traceID（32 字符），附加在 URL 查询参数中。出现问题时可以提供 traceID 给问卷星技术支持快速定位。\n\n---\n\n## 底层 API 调用\n\n如果需要调用 SDK 尚未封装的 API，可以直接使用底层调用器：\n\n```typescript\nimport { callWjxApi, Action } from \"wjx-api-sdk\";\n\nconst result = await callWjxApi(\n  // 第一个参数：请求参数（包含 action）\n  { action: Action.GET_SURVEY, vid: 12345 },\n  // 第二个参数：可选配置\n  {\n    credentials: { apiKey: \"你的Key\" },\n    // fetchImpl: customFetch,  // 可选\n    // maxRetries: 0,           // 可选\n    // timeoutMs: 30000,        // 可选\n  },\n);\n```\n\n四个底层调用器对应不同的 API 端点：\n- `callWjxApi()` — 主 API\n- `callWjxContactsApi()` — 通讯录 API\n- `callWjxUserSystemApi()` — 用户体系 API\n- `callWjxSubuserApi()` — 子账号 API\n\n---\n\n## TypeScript 类型系统\n\n所有输入输出都有完整的类型定义：\n\n```typescript\nimport type {\n  // 输入类型\n  CreateSurveyInput,\n  ListSurveysInput,\n  QueryResponsesInput,\n\n  // 输出类型\n  WjxApiResponse,\n  SurveyDetail,\n\n  // 核心类型\n  WjxCredentials,\n  FetchLike,\n\n  // DSL 类型\n  ParsedSurvey,\n  ParsedQuestion,\n  WireQuestion,\n  WireConversionResult,\n} from \"wjx-api-sdk\";\n```\n\n---\n\n## 下一步\n\n- [SDK 入门指南](./sdk-getting-started.md) — 快速上手\n- [MCP 进阶指南](./mcp-advanced.md) — MCP Server 深度用法\n- [CLI 进阶指南](./cli-advanced.md) — 命令行高级技巧\n- [总纲](./00-overview.md) — 全景概览\n","sdk-getting-started":"# SDK 入门指南：TypeScript 开发快速上手\n\n> 零依赖、类型安全、60+ 函数，5 分钟集成问卷能力\n\n---\n\n## 什么是 wjx-api-sdk\n\nwjx-api-sdk 是问卷星 OpenAPI 的 TypeScript SDK。它的特点是：\n\n- **零运行时依赖**：只用 Node.js 内置 API（fetch + crypto），无第三方包\n- **完整类型系统**：70+ TypeScript 类型定义，全程类型安全\n- **60+ 函数**：8 个模块覆盖问卷星全部 API 能力\n- **可测试设计**：fetch 注入 + 凭据提供者模式，623 个测试零网络调用\n\n---\n\n## 安装\n\n```bash\nnpm install wjx-api-sdk\n```\n\n或从源码安装：\n\n```bash\ngit clone https://github.com/wjxcom/wjx-ai-kit.git\ncd wjx-ai-kit\nnpm install\nnpm run build --workspace=wjx-api-sdk\n```\n\n需要 Node.js >= 20（使用内置 fetch）。\n\n---\n\n## 认证配置\n\n三种方式，按优先级排列：\n\n### 1. 直接传参\n\n```typescript\nimport { listSurveys } from \"wjx-api-sdk\";\n\nconst result = await listSurveys(\n  { page_index: 1 },\n  { apiKey: \"你的API Key\" }\n);\n```\n\n### 2. 环境变量\n\n```bash\nexport WJX_API_KEY=你的APIKey\n```\n\n```typescript\n// 不传 credentials，自动从 process.env.WJX_API_KEY 读取\nconst result = await listSurveys({ page_index: 1 });\n```\n\n### 3. 凭据提供者（多租户场景）\n\n```typescript\nimport { setCredentialProvider, listSurveys } from \"wjx-api-sdk\";\n\n// 注册提供者，适合 AsyncLocalStorage 多租户架构\nsetCredentialProvider(() => ({\n  apiKey: getCurrentTenantApiKey()\n}));\n\nconst result = await listSurveys({ page_index: 1 });\n```\n\n优先级：直接传参 > 凭据提供者 > 环境变量\n\n---\n\n## 第一个 API 调用\n\n```typescript\nimport { listSurveys, getSurvey, createSurveyByText } from \"wjx-api-sdk\";\n\n// 列出问卷\nconst list = await listSurveys({ page_index: 1, page_size: 10 });\nconsole.log(`共 ${list.data.total} 份问卷`);\n\n// 获取问卷详情\nconst survey = await getSurvey({ vid: 12345 });\nconsole.log(survey.data.aname); // 问卷标题\n\n// 用 DSL 文本创建问卷\nconst created = await createSurveyByText({\n  text: `客户满意度调查\n\n1. 推荐意愿 [量表题]\n0~10\n\n2. 改进建议 [填空题]`,\n});\nconsole.log(`新问卷 ID: ${created.data.vid}`);\n```\n\n---\n\n## 统一函数签名\n\n所有 SDK 函数遵循相同的 3 参数模式：\n\n```typescript\nasync function doSomething(\n  input: DoSomethingInput,     // 业务参数（类型安全）\n  credentials?: WjxCredentials, // 可选，默认从环境读取\n  fetchImpl?: FetchLike,       // 可选，默认用内置 fetch\n): Promise<WjxApiResponse<T>>\n```\n\n这意味着：\n- 你永远知道函数长什么样\n- 测试时注入 mock fetch，不需要任何 HTTP mocking 库\n- 多租户时注入不同的 credentials\n\n---\n\n## 模块速查\n\n### 问卷管理（13 函数）\n\n```typescript\nimport {\n  createSurvey,           // 创建问卷（JSON）\n  createSurveyByText,     // 创建问卷（DSL 文本）\n  getSurvey,              // 获取详情\n  listSurveys,            // 列表查询\n  updateSurveyStatus,     // 修改状态（发布/暂停/删除）\n  getSurveySettings,      // 获取设置\n  updateSurveySettings,   // 修改设置\n  deleteSurvey,           // 删除问卷\n  getQuestionTags,        // 获取标签\n  getTagDetails,          // 标签详情\n  clearRecycleBin,        // 清空回收站\n  uploadFile,             // 上传文件\n  validateQuestionsJson,  // 验证题目 JSON\n} from \"wjx-api-sdk\";\n```\n\n### 答卷管理（10 函数）\n\n```typescript\nimport {\n  queryResponses,          // 分页查询\n  queryResponsesRealtime,  // 实时查询\n  downloadResponses,       // 批量下载\n  getReport,               // 统计报告\n  submitResponse,          // 代填提交\n  getFileLinks,            // 文件下载链接\n  getWinners,              // 抽奖中奖者\n  modifyResponse,          // 修改答卷\n  get360Report,            // 360 报告\n  clearResponses,          // 清空答卷\n} from \"wjx-api-sdk\";\n```\n\n### 通讯录管理（14 函数）\n\n```typescript\nimport {\n  queryContacts, addContacts, deleteContacts,     // 联系人\n  addAdmin, deleteAdmin, restoreAdmin,            // 管理员\n  listDepartments, addDepartment, modifyDepartment, deleteDepartment, // 部门\n  listTags, addTag, modifyTag, deleteTag,         // 标签\n} from \"wjx-api-sdk\";\n```\n\n### SSO 单点登录（5 函数）\n\n```typescript\nimport {\n  buildSsoSubaccountUrl,   // 子账号 SSO\n  buildSsoUserSystemUrl,   // 用户体系 SSO\n  buildSsoPartnerUrl,      // 合作伙伴 SSO\n  buildSurveyUrl,          // 问卷创建/编辑 URL\n  buildPreviewUrl,         // 问卷填写 URL\n} from \"wjx-api-sdk\";\n```\n\n### 数据分析（6 函数，纯本地计算）\n\n```typescript\nimport {\n  decodeResponses,     // 解码答卷数据\n  calculateNps,        // NPS 计算\n  calculateCsat,       // CSAT 计算\n  detectAnomalies,     // 异常检测\n  compareMetrics,      // 指标对比\n  decodePushPayload,   // Webhook 解密\n} from \"wjx-api-sdk\";\n```\n\n### DSL 文本转换（6 函数）\n\n```typescript\nimport {\n  textToSurvey,            // 文本 → 问卷结构\n  surveyToText,            // 问卷结构 → 文本\n  parsedQuestionsToWire,   // 解析结构 → API 格式\n  typeToLabel,             // 题型代码 → 中文标签\n  LABEL_TO_TYPE,           // 27 个标签映射表\n  TYPE_MAP,                // 24 个类型映射表\n} from \"wjx-api-sdk\";\n```\n\n### 其他模块\n\n```typescript\n// 用户体系（6 函数）\nimport { addParticipants, modifyParticipants, deleteParticipants,\n         bindActivity, querySurveyBinding, queryUserSurveys } from \"wjx-api-sdk\";\n\n// 子账号（5 函数）\nimport { addSubAccount, modifySubAccount, deleteSubAccount,\n         restoreSubAccount, querySubAccounts } from \"wjx-api-sdk\";\n```\n\n---\n\n## 常用场景\n\n### 查询并分析答卷\n\n```typescript\nimport { queryResponses, decodeResponses, calculateNps } from \"wjx-api-sdk\";\n\n// 查询全部答卷\nconst responses = await queryResponses({\n  vid: 12345,\n  page_size: 100,\n});\n\n// 解码每份答卷\nconst allScores: number[] = [];\nfor (const r of responses.data.list) {\n  const decoded = decodeResponses(r.submitdata);\n  // decoded.answers 是 DecodedAnswer[] 数组\n  // 假设第 1 题是 NPS 题，找到对应答案\n  const npsAnswer = decoded.answers.find((a) => a.questionIndex === 1);\n  if (npsAnswer) {\n    const npsScore = Number(npsAnswer.value);\n    if (!isNaN(npsScore)) allScores.push(npsScore);\n  }\n}\n\n// 计算 NPS\nconst nps = calculateNps(allScores);\nconsole.log(`NPS: ${nps.score} (${nps.rating})`);\nconsole.log(`推荐者: ${(nps.promoters.ratio * 100).toFixed(0)}%`);\nconsole.log(`贬损者: ${(nps.detractors.ratio * 100).toFixed(0)}%`);\n```\n\n### 生成 SSO 链接\n\n```typescript\nimport { buildSsoSubaccountUrl, buildPreviewUrl } from \"wjx-api-sdk\";\n\n// 子账号免密登录\nconst ssoUrl = buildSsoSubaccountUrl({\n  subuser: \"sales01\",\n  apiKey: \"你的API Key\",\n});\nconsole.log(ssoUrl); // https://www.wjx.cn/...&sign=...\n\n// 问卷填写链接\nconst previewUrl = buildPreviewUrl({\n  vid: 12345,\n  source: \"crm\",\n});\nconsole.log(previewUrl); // https://www.wjx.cn/vm/12345.aspx?source=crm\n```\n\n### 错误处理\n\n```typescript\nimport { listSurveys } from \"wjx-api-sdk\";\n\ntry {\n  const result = await listSurveys({ page_index: 1 });\n  if (result.result === false) {\n    // API 返回了业务错误\n    console.error(\"业务错误:\", result.error);\n  } else {\n    console.log(\"成功:\", result.data);\n  }\n} catch (error) {\n  // 网络错误、超时等\n  console.error(\"请求失败:\", error.message);\n}\n```\n\n---\n\n## 环境变量\n\n| 变量 | 必填 | 默认值 | 说明 |\n|------|:----:|--------|------|\n| `WJX_API_KEY` | 是 | - | 问卷星 API Key |\n| `WJX_CORP_ID` | 否 | - | 企业通讯录 ID |\n| `WJX_BASE_URL` | 否 | `https://www.wjx.cn` | API 基础地址 |\n\n---\n\n## 下一步\n\n- [SDK 进阶指南](./sdk-advanced.md) — DSL 双向转换、本地分析引擎、测试模式、多租户\n- [MCP 入门指南](./mcp-getting-started.md) — 用 AI 操作问卷星\n- [CLI 入门指南](./cli-getting-started.md) — 命令行工具\n- [总纲](./00-overview.md) — 全景概览\n","setup-claude-code":"# 在 Claude Code 中使用问卷星\n\n> 在 Claude Code 中用自然语言创建问卷、分析数据、管理通讯录——支持 MCP + Agent + Skill 三层架构，释放 AI 问卷调研的全部能力\n\n---\n\n## 为什么 Claude Code 是最佳选择\n\nwjx-ai-kit 提供三层 AI 能力，而 Claude Code 是唯一能发挥全部三层能力的工具：\n\n| 层级 | 能力 | 说明 |\n|------|------|------|\n| **MCP Server** | 56 个工具 + 8 个资源 + 19 个提示 | 所有 MCP 客户端都支持 |\n| **Agent** | 2 个专家 Agent（wjx-mcp-expert、wjx-cli-expert） | Claude Code 独占，内置完整工作流 |\n| **Skill** | 渐进式参考文档，Agent 按需加载 | Claude Code 独占，DSL 语法、分析方法等领域知识 |\n\n竞品（如金数据）只有 MCP 一层。wjx-ai-kit 的 Agent + Skill 系统让 AI 不仅能调用工具，还理解问卷领域的专业知识，能自主完成复杂的多步骤任务。\n\n---\n\n## 准备工作\n\n1. **安装 Claude Code** — `npm install -g @anthropic-ai/claude-code`，然后运行 `claude` 完成认证\n2. **Node.js >= 20** — 运行 `node --version` 确认版本\n3. **获取问卷星 API Key** — 微信扫码登录 [API Key 获取页](https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1)，登录后页面直接显示 API Key\n\n---\n\n## 第一步：接入 MCP Server\n\n### 方式一：命令行添加（推荐）\n\n```bash\n# 基本配置\nclaude mcp add wjx --env WJX_API_KEY=你的APIKey -- npx wjx-mcp-server\n\n# 企业用户（需要通讯录功能）\nclaude mcp add wjx --env WJX_API_KEY=你的APIKey --env WJX_CORP_ID=你的企业ID -- npx wjx-mcp-server\n```\n\n### 方式二：手动编辑配置\n\n在项目目录下创建 `.claude/mcp.json`：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"command\": \"npx\",\n      \"args\": [\"wjx-mcp-server\"],\n      \"env\": {\n        \"WJX_API_KEY\": \"替换为你的 API Key\"\n      }\n    }\n  }\n}\n```\n\n### HTTP 远程模式\n\n团队部署了远程 MCP 服务时：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"url\": \"http://your-server:3000/mcp\",\n      \"headers\": {\n        \"Authorization\": \"Bearer your-token\"\n      }\n    }\n  }\n}\n```\n\n### 验证 MCP 连接\n\n```bash\nclaude mcp list\n# 应该看到 wjx 服务器及其工具列表\n```\n\n---\n\n## 第二步：部署 Agent（推荐）\n\nAgent 是 wjx-ai-kit 相比其他方案的核心优势。两个专家 Agent 内置了完整的问卷操作工作流：\n\n- **wjx-mcp-expert** — MCP 工具专家，擅长通过 MCP 协议操作问卷星\n- **wjx-cli-expert** — CLI 命令专家，擅长通过命令行批量操作\n\n### 方式一：使用 CLI 一键安装（推荐）\n\n```bash\nnpx wjx-cli skill install\n```\n\n这条命令会自动完成以下操作：\n- 创建 `.claude/agents/` 目录\n- 复制两个专家 Agent 配置文件\n- 复制 Skill 参考文档目录\n\n### 方式二：从 Skill 市场安装\n\nwjx-ai-kit 的 Skill 已上架 [Vercel Agent Skills](https://skills.sh/wjxcom/wjx-ai-kit) 和 [ClawHub](https://clawhub.ai/skills?q=wjx) 市场：\n\n```bash\n# 通过 Vercel Agent Skills 安装\nnpx skills add wjxcom/wjx-ai-kit\n```\n\n### 方式三：手动部署\n\n```bash\n# 创建 Agent 目录\nmkdir -p .claude/agents\n\n# 复制 Agent 配置\ncp wjx-agents/wjx-mcp-expert/wjx-mcp-expert.md .claude/agents/\ncp wjx-agents/wjx-cli-expert/wjx-cli-expert.md .claude/agents/\n\n# 复制 Skill 参考文档\ncp -r wjx-skills .\n```\n\n### 方式四：Skill zip 手动安装\n\n如果无法使用 npm，可下载 Skill 包手动安装：\n\n1. 下载 [wjx-cli-use-skill-latest.zip](https://pubdz.paperol.cn/wjx-ai-kit/skills/wjx-cli-use-skill-latest.zip)\n2. 解压到项目目录下的 `wjx-skills/` 中\n3. 安装 CLI 并配置 API Key：\n   ```bash\n   npm install -g wjx-cli\n   wjx init\n   ```\n\n详见 [Skill 包入门指南](./skill-getting-started.md)。\n\n### Agent 安装后的目录结构\n\n```\nyour-project/\n├── .claude/\n│   ├── mcp.json              # MCP Server 配置\n│   └── agents/\n│       ├── wjx-mcp-expert.md # MCP 工具专家 Agent\n│       └── wjx-cli-expert.md # CLI 命令专家 Agent\n├── wjx-skills/               # Skill 参考文档（Agent 按需加载）\n│   ├── wjx-mcp-use/          # MCP 使用技巧\n│   └── wjx-cli-use/          # CLI 使用技巧\n└── ...\n```\n\n---\n\n## 第三步：三种使用模式\n\n### 模式一：委托给 Agent（最强大）\n\n在 Claude Code 中使用 `/agent` 命令将任务委托给专家 Agent：\n\n```\n/agent wjx-mcp-expert 帮我创建一份员工满意度调查问卷，包含 NPS 评分题和 5 个维度的量表题\n```\n\nAgent 会自动：\n1. 加载相关 Skill 文档（DSL 语法、题型编码）\n2. 规划问卷结构\n3. 调用 MCP 工具创建问卷\n4. 返回结果并给出优化建议\n\n```\n/agent wjx-cli-expert 批量导出上个月所有问卷的答卷数据到 CSV\n```\n\nCLI Agent 会自动：\n1. 列出问卷列表\n2. 筛选时间范围\n3. 逐个导出答卷数据\n4. 汇总结果\n\n### 模式二：直接使用 MCP 工具\n\n不通过 Agent，直接在 Claude Code 对话中使用问卷星工具：\n\n> 帮我创建一份客户满意度调查问卷\n\nClaude 会直接调用 MCP 工具完成任务。这种方式更直接，适合简单的单步操作。\n\n### 模式三：团队协作\n\n将 `.claude/` 目录和 `wjx-skills/` 提交到 Git 仓库，团队成员 clone 后即可使用相同的 Agent + Skill 配置：\n\n```bash\n# 提交配置到仓库\ngit add .claude/ wjx-skills/\ngit commit -m \"feat: 添加问卷星 AI 工具配置\"\n```\n\n团队成员只需设置自己的 API Key：\n\n```bash\nclaude mcp add wjx --env WJX_API_KEY=自己的APIKey -- npx wjx-mcp-server\n```\n\n---\n\n## 第四步：验证\n\n### 验证 MCP\n\n在 Claude Code 对话中输入：\n\n> 帮我创建一份客户满意度调查问卷\n\n如果 MCP 配置正确，Claude 会调用问卷星工具创建问卷。\n\n### 验证 Agent\n\n```\n/agent wjx-mcp-expert 列出我的所有问卷\n```\n\n如果 Agent 部署正确，专家 Agent 会接管任务并调用相应工具。\n\n---\n\n## 典型场景\n\n### 场景 1: 创建调研问卷\n\n> 你：帮我创建一份员工满意度调查问卷，包含 NPS 评分题、工作环境满意度（5 级量表）和开放反馈\n>\n> Agent 自动：加载 DSL Skill → 读取题型编码 → 生成问卷结构 → 调用 create_survey_by_text → 返回编辑链接\n\n### 场景 2: 分析数据\n\n> 你：分析最近一次客户满意度调查的 NPS 得分，给出改进建议\n>\n> Agent 自动：加载分析 Skill → query_responses 获取数据 → calculate_nps 计算 → 生成推荐人/中立/贬损分布 → 给出针对性建议\n\n### 场景 3: 批量管理\n\n> 你：把这份 Excel 名单导入通讯录的\"市场部\"分组\n>\n> Agent 自动：读取文件 → add_contacts 批量导入 → query_contacts 验证 → 报告导入结果\n\n### 场景 4: 复杂工作流（Agent 独有）\n\n> 你：为下周的产品发布会准备一套完整的调研方案——会前期望调查、会中实时反馈、会后满意度评估\n>\n> Agent 自动：规划三份问卷 → 逐一创建 → 设置不同的发布时间 → 配置答卷通知 → 返回所有链接和操作说明\n\n---\n\n## CLAUDE.md 集成\n\n如果你的项目已经有 `CLAUDE.md` 文件，可以在其中添加问卷星相关上下文，让 Claude Code 在所有对话中都了解项目的问卷需求：\n\n```markdown\n## 问卷星集成\n\n本项目使用 wjx-ai-kit 管理问卷调研。常用操作：\n- 创建问卷：使用 MCP 工具 create_survey_by_text\n- 查询数据：使用 query_responses + calculate_nps\n- 管理通讯录：使用 add_contacts / query_contacts\n\n问卷命名规范：[项目代号]-[日期]-[类型]，如 \"PROD-20260406-NPS\"\n```\n\n---\n\n## 常见问题\n\n### MCP 工具没有出现？\n\n```bash\n# 检查 MCP 配置\nclaude mcp list\n\n# 重新添加\nclaude mcp remove wjx\nclaude mcp add wjx --env WJX_API_KEY=你的APIKey -- npx wjx-mcp-server\n```\n\n### Agent 命令无效？\n\n1. 确认 `.claude/agents/` 目录下有 Agent 配置文件\n2. 确认文件名正确：`wjx-mcp-expert.md` 和 `wjx-cli-expert.md`\n3. 重新运行 `npx wjx-cli skill install`\n\n### npx 首次运行很慢？\n\nnpx 需要下载包。你可以先全局安装：\n\n```bash\nnpm install -g wjx-mcp-server wjx-cli\n```\n\n### MCP 和 CLI Agent 该选哪个？\n\n- **MCP Agent（wjx-mcp-expert）**：适合交互式操作，如创建问卷、分析数据、实时查询\n- **CLI Agent（wjx-cli-expert）**：适合批量操作和自动化脚本，如批量导出、批量创建\n\n两个 Agent 可以配合使用——用 MCP Agent 做设计和分析，用 CLI Agent 做批量执行。\n\n---\n\n## 下一步\n\n- [MCP Server 入门指南](./mcp-getting-started.md) — 了解 56 个工具的完整能力\n- [wjx-ai-kit 总览](./00-overview.md) — 了解 SDK、MCP、CLI 三合一架构\n","setup-claude-desktop":"# 在 Claude Desktop 中使用问卷星\n\n> 在 Claude Desktop 中用自然语言创建问卷、分析数据、管理通讯录\n\n---\n\n## 准备工作\n\n1. **安装 Claude Desktop** — 前往 [claude.ai/download](https://claude.ai/download) 下载并安装\n2. **Node.js >= 20** — 运行 `node --version` 确认版本，低于 20 请前往 [nodejs.org](https://nodejs.org) 升级\n3. **获取问卷星 API Key** — 微信扫码登录 [API Key 获取页](https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1)，登录后页面直接显示 API Key\n\n---\n\n## 第一步：接入 MCP Server\n\n### 找到配置文件\n\n- **macOS**: `~/Library/Application Support/Claude/claude_desktop_config.json`\n- **Windows**: `%APPDATA%\\Claude\\claude_desktop_config.json`\n\n如果文件不存在，手动创建即可。\n\n### 添加配置\n\n将以下内容添加到配置文件中（如果已有其他 MCP 服务，在 `mcpServers` 对象中添加 `wjx` 条目即可）：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"command\": \"npx\",\n      \"args\": [\"wjx-mcp-server\"],\n      \"env\": {\n        \"WJX_API_KEY\": \"替换为你的 API Key\"\n      }\n    }\n  }\n}\n```\n\n> 企业用户如需管理通讯录，在 `env` 中额外添加 `\"WJX_CORP_ID\": \"你的企业通讯录 ID\"`。\n\n### 重启 Claude Desktop\n\n配置完成后，**必须完全退出并重新启动 Claude Desktop**（不是最小化，是退出）。成功后，你会在聊天输入框底部看到工具图标，表示 MCP 工具已加载。\n\n---\n\n## 第二步：部署 Agent + Skill（推荐）\n\nwjx-ai-kit 提供 2 个专家 Agent 和配套 Skill 参考文档，让 AI 理解问卷领域的专业知识。\n\n### 一键安装\n\n```bash\nnpx wjx-cli skill install\n```\n\n> 也可从 [Vercel Agent Skills](https://skills.sh/wjxcom/wjx-ai-kit) 安装：`npx skills add wjxcom/wjx-ai-kit`，或在 [ClawHub](https://clawhub.ai/skills?q=wjx) 市场搜索 \"wjx\" 安装。\n\n这条命令会自动完成：\n- 创建 `.claude/agents/` 目录，部署 2 个专家 Agent（wjx-mcp-expert、wjx-cli-expert）\n- 复制 `wjx-skills/` 参考文档目录（DSL 语法、题型编码、分析方法等）\n\n安装后的目录结构：\n\n```\nyour-project/\n├── .claude/agents/\n│   ├── wjx-mcp-expert.md    # MCP 工具专家\n│   └── wjx-cli-expert.md    # CLI 命令专家\n└── wjx-skills/\n    ├── wjx-mcp-use/          # MCP 使用技巧\n    │   ├── SKILL.md\n    │   └── references/\n    └── wjx-cli-use/          # CLI 使用技巧\n        ├── SKILL.md\n        └── references/\n```\n\n### 使用 MCP Prompts 工作流\n\nClaude Desktop 内置支持 MCP Prompts。wjx-mcp-server 提供了 19 个预设工作流模板（NPS 分析、满意度调查、考试出题、异常检测等），可直接在 Claude Desktop 对话中使用。\n\n此外，你可以将 `wjx-skills/` 中的参考文档内容作为对话上下文粘贴给 Claude，提升问卷操作的准确度。\n\n### Skill zip 手动安装\n\n如果无法使用 npm，可下载 Skill 包手动安装：\n\n1. 下载 [wjx-cli-use-skill-latest.zip](https://pubdz.paperol.cn/wjx-ai-kit/skills/wjx-cli-use-skill-latest.zip)\n2. 解压到 AI 工具的技能目录（或当前项目目录下）\n3. 安装 CLI 并配置 API Key：\n   ```bash\n   npm install -g wjx-cli\n   wjx init\n   ```\n\n详见 [Skill 包入门指南](./skill-getting-started.md)。\n\n---\n\n## 第三步：安装 CLI（可选）\n\nwjx-cli 提供 69 个子命令，适合批量操作和自动化脚本：\n\n```bash\n# 安装\nnpm install -g wjx-cli\n\n# 配置 API Key\nwjx init\n\n# 环境检查\nwjx doctor\n\n# 试试看\nwjx survey list\n```\n\nCLI 输出结构化 JSON，可与 AI 工具配合使用。例如：\n\n```bash\n# 查询答卷并分析 NPS\nwjx response query --vid 12345 --page_size 100\nwjx analytics nps --scores 9,10,7,3,8\n```\n\n---\n\n## 第四步：验证\n\n重启 Claude Desktop 后，在对话框中输入：\n\n> 帮我创建一份客户满意度调查问卷\n\n如果一切正常，Claude 会调用问卷星工具，自动创建问卷并返回编辑链接。\n\n---\n\n## 典型场景\n\n### 场景 1: 创建调研问卷\n\n> 你：帮我创建一份员工满意度调查问卷，包含 NPS 评分题、工作环境满意度（5 级量表）和开放反馈\n>\n> Claude 自动：读取 DSL 语法 → 生成问卷结构 → 调用 create_survey_by_text → 返回编辑链接\n\n### 场景 2: 分析数据\n\n> 你：分析最近一次客户满意度调查的 NPS 得分\n>\n> Claude 自动：query_responses 获取数据 → calculate_nps 计算 → 给出推荐人/中立/贬损分布\n\n### 场景 3: 批量管理\n\n> 你：把这份名单导入通讯录的\"市场部\"分组\n>\n> Claude 自动：读取数据 → add_contacts 批量导入 → query_contacts 验证\n\n---\n\n## 常见问题\n\n### 配置后看不到工具图标？\n\n1. 确认配置文件的 JSON 格式正确（没有尾逗号、引号匹配）\n2. 确认已**完全退出**并重新启动 Claude Desktop（仅最小化不会重新加载配置）\n3. 检查 Node.js 版本是否 >= 20：`node --version`\n\n### API Key 无效？\n\n确认 API Key 没有多余的空格或换行符。登录问卷星后台重新复制一次。\n\n### 工具调用超时？\n\nnpx 首次运行需要下载包，可能较慢。你也可以先全局安装：\n\n```bash\nnpm install -g wjx-mcp-server\n```\n\n然后将配置中的 `\"command\"` 改为 `\"wjx-mcp-server\"`，`\"args\"` 改为 `[]`。\n\n---\n\n## 下一步\n\n- [MCP Server 入门指南](./mcp-getting-started.md) — 了解 56 个工具的完整能力\n- [wjx-ai-kit 总览](./00-overview.md) — 了解 SDK、MCP、CLI 三合一架构\n","setup-claw":"# 在国产 Claw 工具中使用问卷星\n\n> Claw 家族 AI 编程工具的问卷星配置总览\n\n---\n\n## Claw 生态概览\n\nClaw 是国内 AI 编程工具的一个生态体系，多家厂商推出了各自的 Claw 工具，均支持 MCP 协议接入外部能力。\n\n| 工具 | 厂商 | 特点 | 配置指南 |\n|------|------|------|---------|\n| **OpenClaw** | 开源社区 | 开源、Skills 系统、VS Code 插件 + 独立应用 | [配置指南](./setup-openclaw.md) |\n| **KimiClaw** | 月之暗面 (Moonshot AI) | Kimi 大模型驱动，中文理解强 | 见下方通用配置 |\n| **QClaw** | 腾讯 | 微��生态直联，企业场景优化 | 见下方通用配置 |\n| **LinClaw** | 七牛云 | MIT 开源，支持 9 种 IDE 渠道，MCP 兼容 | 见下方通用配置 |\n| **MaxClaw** | MiniMax | 一键云部署 OpenClaw，AI Agent 平台 | 见下方通用配置 |\n| **EasyClaw** | 独立项目 | OpenClaw 托管部署，非技术用户友好 | 见下方通用配置 |\n| **ArkClaw** | 字节跳动 | 基于豆包大模型（预发布） | 见下方通用配置 |\n| **DuClaw** | 百度 | 基于文心大模型（预发布） | 见下方通用配置 |\n\n---\n\n## 准备工作\n\n1. **安装你选择的 Claw 工具**\n2. **Node.js >= 20**（OpenClaw 需要 >= 22）— 运行 `node --version` 确认版本\n3. **获取问卷星 API Key** — 微信扫码登录 [API Key 获取页](https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1)，登录后页面直接显示 API Key\n\n---\n\n## 第一步：接入 MCP Server\n\n### OpenClaw\n\n配置文件：`~/.openclaw/openclaw.json`\n\n```json\n{\n  \"acp\": {\n    \"mcpServers\": {\n      \"wjx\": {\n        \"command\": \"npx\",\n        \"args\": [\"wjx-mcp-server\"],\n        \"env\": {\n          \"WJX_API_KEY\": \"替换为你的 API Key\"\n        }\n      }\n    }\n  }\n}\n```\n\n> **注意**：OpenClaw 使用 `acp.mcpServers` 路径，与标准的 `mcpServers` 不同。详见 [OpenClaw 配置指南](./setup-openclaw.md)。\n\n### KimiClaw / QClaw / LinClaw / MaxClaw / EasyClaw / ArkClaw / DuClaw\n\n大多数 Claw 工具采用标准 MCP 配置格式。在工具的 MCP 设置中添加：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"command\": \"npx\",\n      \"args\": [\"wjx-mcp-server\"],\n      \"env\": {\n        \"WJX_API_KEY\": \"替换为你的 API Key\"\n      }\n    }\n  }\n}\n```\n\n> 各工具的 MCP 配置入口可能不同（设置面板、配置文件、命令行等），请参阅对应工具的官方文档。\n\n### 企业用户\n\n如需管理通讯录，在 `env` 中额外添加 `\"WJX_CORP_ID\": \"你的企业通讯录 ID\"`。\n\n### HTTP 远程模式\n\n团队部署了远程 MCP 服务时：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"url\": \"http://your-server:3000/mcp\",\n      \"headers\": {\n        \"Authorization\": \"Bearer your-token\"\n      }\n    }\n  }\n}\n```\n\n---\n\n## 第二步：部署 Agent + Skill（推荐）\n\nwjx-ai-kit 提供 2 个专家 Agent 和配套 Skill 参考文档，让 AI 理解问卷领域的专业知识。\n\n### 一键安装\n\n```bash\nnpx wjx-cli skill install\n```\n\n> 也可从 [Vercel Agent Skills](https://skills.sh/wjxcom/wjx-ai-kit) 安装：`npx skills add wjxcom/wjx-ai-kit`，或在 [ClawHub](https://clawhub.ai/skills?q=wjx) 市场搜索 \"wjx\" 安装。\n\n这条命令会自动完成：\n- 创建 `.claude/agents/` 目录，部署 2 个专家 Agent（wjx-mcp-expert、wjx-cli-expert）\n- 复制 `wjx-skills/` 参考文档目录（DSL 语法、题型编码、分析方法等）\n\n安装后的目录结构：\n\n```\nyour-project/\n├── .claude/agents/\n│   ├── wjx-mcp-expert.md    # MCP 工具专家\n│   └── wjx-cli-expert.md    # CLI 命令专家\n└── wjx-skills/\n    ├── wjx-mcp-use/          # MCP 使用技巧\n    │   ├── SKILL.md\n    │   └── references/\n    └── wjx-cli-use/          # CLI 使用技巧\n        ├── SKILL.md\n        └── references/\n```\n\n各 Claw 工具如果支持 Rules 或指令文件，可以将 `wjx-skills/` 中的关键内容写入，提升 AI 操作问卷星的准确度。\n\n### Skill zip 手动安装\n\n如果无法使用 npm，可下载 Skill 包手动安装：\n\n1. 下载 [wjx-cli-use-skill-latest.zip](https://pubdz.paperol.cn/wjx-ai-kit/skills/wjx-cli-use-skill-latest.zip)\n2. 解压到 AI 工具的技能目录（或当前项目目录下）\n3. 安装 CLI 并配置 API Key：\n   ```bash\n   npm install -g wjx-cli\n   wjx init\n   ```\n\n详见 [Skill 包入门指南](./skill-getting-started.md)。\n\n---\n\n## 第三步：安装 CLI（可选）\n\nwjx-cli 提供 69 个子命令，适合批量操作和自动化脚本：\n\n```bash\n# 安装\nnpm install -g wjx-cli\n\n# 配置 API Key\nwjx init\n\n# 环境检查\nwjx doctor\n\n# 试试看\nwjx survey list\n```\n\nCLI 输出结构化 JSON，可与 AI 工具配合使用。例如：\n\n```bash\n# 查询答卷并分析 NPS\nwjx response query --vid 12345 --page_size 100\nwjx analytics nps --scores 9,10,7,3,8\n```\n\n---\n\n## 第四步：验证\n\n在你的 Claw 工具中输入：\n\n> 帮我创建一份客户满意度调查问卷\n\n如果一切正常，AI 会调用问卷星 MCP 工具，自动创建问卷并返回编辑链接。\n\n---\n\n## 典型场景\n\n### 场景 1: 创建调研问卷\n\n> 你：帮我创建一份员工满意度调查问卷，包含 NPS 评分题、工作环境满意度（5 级量表）和开放反馈\n>\n> AI 自动：读取 DSL 语法 → 生成问卷结构 → 调用 create_survey_by_text → 返回编辑链接\n\n### 场景 2: 分析数据\n\n> 你：分析最近一次客户满意度调查的 NPS 得分\n>\n> AI 自动：query_responses 获取数据 → calculate_nps 计算 → 给出推荐人/中立/贬损分布\n\n### 场景 3: 批量管理\n\n> 你：把这份 Excel 名单导入通讯录的\"市场部\"分组\n>\n> AI 自动：读取文件 → add_contacts 批量导入 → query_contacts 验证\n\n---\n\n## 常见问题\n\n### 我用的 Claw 工具不在列表中？\n\n只要你的 Claw 工具支持 MCP 协议，就可以参照上方的标准配置接入问卷星。如遇到问题，请在 [GitHub Issues](https://github.com/wjxcom/wjx-ai-kit/issues) 反馈。\n\n### Claw 工具的 MCP 配置文件在哪？\n\n各工具不同，常见位置：\n- **OpenClaw**: `~/.openclaw/openclaw.json`（使用 `acp.mcpServers` 路径）\n- **KimiClaw**: 通常在设置面板的 MCP/工具 配置中\n- **MaxClaw**: MiniMax Agent 平台的工具/MCP 配置中\n- **EasyClaw**: 托管部署面板的工具配置中\n- **LinClaw**: 参考 [LinClaw GitHub](https://github.com/aspect-build/linclaw) 文档\n- 其他工具请查阅对应官方文档\n\n### 需要特定版本的 Node.js？\n\n大多数 Claw 工具需要 Node.js >= 20，OpenClaw 需要 >= 22。运行 `node --version` 检查。\n\n---\n\n## 下一步\n\n- [OpenClaw 详细配置指南](./setup-openclaw.md) — OpenClaw 专属配置和 Skills 系统\n- [MCP Server 入门指南](./mcp-getting-started.md) — 了解 56 个工具的完整能力\n- [wjx-ai-kit 总览](./00-overview.md) — 了解 SDK、MCP、CLI 三合一架构\n","setup-cline":"# 在 Cline 中使用问卷星\n\n> 在 VS Code 中通过 Cline 插件用自然语言创建问卷、分析数据、管理通讯录\n\n---\n\n## 准备工作\n\n1. **安装 Cline** — 在 VS Code 扩展市场搜索 \"Cline\" 并安装\n2. **Node.js >= 20** — 运行 `node --version` 确认版本，低于 20 请前往 [nodejs.org](https://nodejs.org) 升级\n3. **获取问卷星 API Key** — 微信扫码登录 [API Key 获取页](https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1)，登录后页面直接显示 API Key\n\n---\n\n## 第一步：接入 MCP Server\n\n### 方式一：通过 UI 配置（推荐）\n\n1. 打开 VS Code 侧边栏中的 **Cline** 面板\n2. 点击顶部 **Settings** 齿轮图标\n3. 找到 **MCP Servers** 部分\n4. 点击 **Add MCP Server**\n5. 填入以下信息：\n   - 名称：`wjx`\n   - 命令：`npx`\n   - 参数：`wjx-mcp-server`\n   - 环境变量：`WJX_API_KEY` = `你的 API Key`\n\n### 方式二：直接编辑配置文件\n\nCline 的 MCP 配置文件位于 VS Code 的 globalStorage 目录中：\n\n- **文件名**: `cline_mcp_settings.json`\n- **路径**: VS Code globalStorage 中 Cline 扩展的目录下\n\n配置内容：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"command\": \"npx\",\n      \"args\": [\"wjx-mcp-server\"],\n      \"env\": {\n        \"WJX_API_KEY\": \"替换为你的 API Key\"\n      }\n    }\n  }\n}\n```\n\n### 企业用户\n\n如需管理通讯录，在 `env` 中额外添加 `\"WJX_CORP_ID\": \"你的企业通讯录 ID\"`。\n\n### HTTP 远程模式\n\n团队部署了远程 MCP 服务时：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"url\": \"http://your-server:3000/mcp\",\n      \"headers\": {\n        \"Authorization\": \"Bearer your-token\"\n      }\n    }\n  }\n}\n```\n\n---\n\n## 第二步：部署 Agent + Skill（推荐）\n\nwjx-ai-kit 提供 2 个专家 Agent 和配套 Skill 参考文档，让 AI 理解问卷领域的专业知识。\n\n### 一键安装\n\n```bash\nnpx wjx-cli skill install\n```\n\n> 也可从 [Vercel Agent Skills](https://skills.sh/wjxcom/wjx-ai-kit) 安装：`npx skills add wjxcom/wjx-ai-kit`，或在 [ClawHub](https://clawhub.ai/skills?q=wjx) 市场搜索 \"wjx\" 安装。\n\n这条命令会自动完成：\n- 创建 `.claude/agents/` 目录，部署 2 个专家 Agent（wjx-mcp-expert、wjx-cli-expert）\n- 复制 `wjx-skills/` 参考文档目录（DSL 语法、题型编码、分析方法等）\n\n安装后的目录结构：\n\n```\nyour-project/\n├── .claude/agents/\n│   ├── wjx-mcp-expert.md    # MCP 工具专家\n│   └── wjx-cli-expert.md    # CLI 命令专家\n└── wjx-skills/\n    ├── wjx-mcp-use/          # MCP 使用技巧\n    │   ├── SKILL.md\n    │   └── references/\n    └── wjx-cli-use/          # CLI 使用技巧\n        ├── SKILL.md\n        └── references/\n```\n\n### Custom Instructions 增强\n\nCline 支持 Custom Instructions 功能。在 Cline Settings 的 Custom Instructions 区域添加 Skill 中的关键内容：\n\n```\n# 问卷星集成\n\n本项目使用 wjx-ai-kit 管理问卷调研。\n\n## MCP 工具使用规范\n- 创建问卷：优先使用 create_survey_by_text（DSL 文本模式）\n- 数据分析：先用 query_responses 获取数据，再用 calculate_nps / calculate_csat 分析\n- 通讯录操作：使用 add_contacts 批量导入，query_contacts 查询验证\n\n## DSL 语法要点\n- 第一行为问卷标题，=== 分隔描述\n- 题型标签：[单选题] [多选题] [填空题] [量表题] [矩阵量表题] [下拉框]\n- 量表范围：1~5 或 0~10\n```\n\n你也可以将 `wjx-skills/` 目录中更详细的参数参考文档内容加入 Custom Instructions。\n\n### Skill zip 手动安装\n\n如果无法使用 npm，可下载 Skill 包手动安装：\n\n1. 下载 [wjx-cli-use-skill-latest.zip](https://pubdz.paperol.cn/wjx-ai-kit/skills/wjx-cli-use-skill-latest.zip)\n2. 解压到 AI 工具的技能目录（或当前项目目录下）\n3. 安装 CLI 并配置 API Key：\n   ```bash\n   npm install -g wjx-cli\n   wjx init\n   ```\n\n详见 [Skill 包入门指南](./skill-getting-started.md)。\n\n---\n\n## 第三步：安装 CLI（可选）\n\nwjx-cli 提供 69 个子命令，适合批量操作和自动化脚本：\n\n```bash\n# 安装\nnpm install -g wjx-cli\n\n# 配置 API Key\nwjx init\n\n# 环境检查\nwjx doctor\n\n# 试试看\nwjx survey list\n```\n\nCLI 输出结构化 JSON，可与 AI 工具配合使用。例如：\n\n```bash\n# 查询答卷并分析 NPS\nwjx response query --vid 12345 --page_size 100\nwjx analytics nps --scores 9,10,7,3,8\n```\n\n---\n\n## 第四步：验证\n\n在 Cline 对话框中输入：\n\n> 帮我创建一份客户满意度调查问卷\n\n如果一切正常，Cline 会调用问卷星工具，自动创建问卷并返回编辑链接。\n\n---\n\n## 典型场景\n\n### 场景 1: 创建调研问卷\n\n> 你：帮我创建一份员工满意度调查问卷，包含 NPS 评分题、工作环境满意度（5 级量表）和开放反馈\n>\n> AI 自动：读取 DSL 语法 → 生成问卷结构 → 调用 create_survey_by_text → 返回编辑链接\n\n### 场景 2: 分析数据\n\n> 你：分析最近一次客户满意度调查的 NPS 得分\n>\n> AI 自动：query_responses 获取数据 → calculate_nps 计算 → 给出推荐人/中立/贬损分布\n\n### 场景 3: 批量管理\n\n> 你：把这份 Excel 名单导入通讯录的\"市场部\"分组\n>\n> AI 自动：读取文件 → add_contacts 批量导入 → query_contacts 验证\n\n---\n\n## 常见问题\n\n### 添加 MCP Server 后工具没有出现？\n\n1. 确认 Cline 已更新到最新版本（支持 MCP 的版本）\n2. 在 Cline Settings → MCP Servers 中检查连接状态\n3. 点击服务器旁边的刷新按钮重新连接\n\n### Cline 支持哪些模型？\n\nCline 支持 Claude、GPT、Gemini 等多种模型。使用 Claude 系列模型与 MCP 工具的兼容性最佳。\n\n### 工具调用时需要手动确认吗？\n\nCline 默认会在每次工具调用前请求用户确认。你可以在设置中调整自动批准策略，对信任的工具开启自动执行。\n\n---\n\n## 下一步\n\n- [MCP Server 入门指南](./mcp-getting-started.md) — 了解 56 个工具的完整能力\n- [wjx-ai-kit 总览](./00-overview.md) — 了解 SDK、MCP、CLI 三合一架构\n","setup-copilot":"# 在 GitHub Copilot 中使用问卷星\n\n> 在 VS Code / GitHub Copilot 中用自然语言创建问卷、分析数据、管理通讯录\n\n---\n\n## 准备工作\n\n1. **GitHub Copilot 订阅** — 需要 GitHub Copilot 个人版或企业版\n2. **VS Code** — 安装最新版 VS Code 并启
