oad Window）→ 在 Settings → Features → MCP 中确认状态。\r\n\r\n**项目级和全局配置的区别？** 项目级（`.cursor/mcp.json`）只在当前项目生效；全局级（`~/.cursor/mcp.json`）所有项目共享。\r\n\r\n### Windsurf\r\n\r\n**Cascade 中看不到工具？** 确认配置文件路径正确（全局 `~/.codeium/windsurf/mcp_config.json` 或项目级 `.windsurf/mcp.json`）→ 确认 JSON 格式正确 → 重启 Windsurf。\r\n\r\n### Cline\r\n\r\n**添加后工具没出现？** 确认 Cline 为最新版 → 在 Settings → MCP Servers 中检查连接状态 → 点击刷新按钮重新连接。\r\n\r\n**工具调用需要手动确认吗？** 默认需要确认。可在设置中对信任的工具开启自动执行。\r\n\r\n### GitHub Copilot\r\n\r\n**Chat 中没有 MCP 工具？** 确认已启用 Agent 模式 → 确认 Copilot 版本支持 MCP → 聊天面板切换到 Agent 模式（非普通 Chat）。\r\n\r\n### Trae\r\n\r\n**看不到 MCP 工具？** 确认已通过 AI 聊天面板中的 MCP 图标配置 → 确认 JSON 格式正确 → 重启 Trae。\r\n\r\n**Windows 下 npx 报错 \"cannot be loaded because running scripts is disabled\"？** 以管理员身份运行 PowerShell：`Set-ExecutionPolicy RemoteSigned -Scope CurrentUser`，设置后重启 Trae。\r\n\r\n### Gemini Code Assist\r\n\r\n**支持 MCP 吗？** 取决于具体版本，建议关注 [Google Cloud 官方文档](https://cloud.google.com/gemini/docs)。\r\n\r\n### Qoder\r\n\r\n**和通义灵码的区别？** 通义灵码面向国内，定位代码补全和问答。Qoder 面向海外，定位 Agentic 编程平台，支持更复杂的自主任务。两者都支持 MCP。\r\n\r\n### 通用问题\r\n\r\n**npx 首次运行很慢？** 需要下载包。可先全局安装：`npm install -g wjx-mcp-server wjx-cli`。\r\n\r\n**工具调用失败？** 确认 Node.js >= 20 → 确认 API Key 有效且无多余空格 → 确认插件为最新版本。\r\n\r\n---\r\n\r\n## 下一步\r\n\r\n- [MCP Server 入门指南](./mcp-getting-started.md) — 了解 58 个工具的完整能力\r\n- [wjx-ai-kit 总览](./00-overview.md) — 了解 SDK、MCP、CLI 三合一架构\r\n","setup-workbench":"# 在 AI 工作台中使用问卷星\r\n\r\n> AI 工作台的问卷星配置总览——Manus、WorkBuddy、QoderWork 等桌面智能体平台\r\n\r\n---\r\n\r\n## 工作台生态概览\r\n\r\nAI 工作台是一类桌面级智能体平台，能自主规划并执行多步骤任务。与 IDE 插件型工具不同，工作台更侧重任务交付而非代码编辑，适合非开发者使用。\r\n\r\n| 工具 | 厂商 | 特点 | 备注 |\r\n|------|------|------|------|\r\n| **Manus** | 蝴蝶效应 (Monica 团队) | 通用 AI Agent，自主交付复杂任务 | 支持 MCP 工具接入 |\r\n| **WorkBuddy** | 腾讯 | AI Agent 桌面工作台，CodeBuddy 生态 | 支持 MCP 协议 |\r\n| **QoderWork** | 阿里巴巴 | 桌面级通用智能体助手，Qoder 生态 | 支持 MCP 协议 |\r\n\r\n---\r\n\r\n## 准备工作\r\n\r\n1. **安装你选择的工作台工具** — 前往对应官网下载安装\r\n   - Manus: [manus.im](https://manus.im)\r\n   - WorkBuddy: [copilot.tencent.com/work](https://copilot.tencent.com/work)\r\n   - QoderWork: [qoder.com/zh/qoderwork](https://qoder.com/zh/qoderwork)\r\n2. **Node.js >= 20** — 运行 `node --version` 确认版本\r\n3. **获取问卷星 API Key** — 微信扫码登录 [API Key 获取页](https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1)，登录后页面直接显示 API Key\r\n\r\n---\r\n\r\n## 第一步：接入 MCP Server\r\n\r\n在工作台的 MCP / 工具配置中添加问卷星服务器：\r\n\r\n```json\r\n{\r\n  \"mcpServers\": {\r\n    \"wjx\": {\r\n      \"command\": \"npx\",\r\n      \"args\": [\"wjx-mcp-server\"],\r\n      \"env\": {\r\n        \"WJX_API_KEY\": \"替换为你的 API Key\"\r\n      }\r\n    }\r\n  }\r\n}\r\n```\r\n\r\n> 各工作台的 MCP 配置入口不同，请参阅对应工具的官方文档。\r\n\r\n### 各工具配置入口\r\n\r\n- **Manus**: 在 Agent Skills / Tools 设置中添加 MCP 服务器\r\n- **WorkBuddy**: 在工具/插件配置面板中添加 MCP 连接\r\n- **QoderWork**: 在设置 → MCP 配置中添加（与 Qoder IDE 插件共享配置）\r\n\r\n### 企业用户\r\n\r\n如需管理通讯录，在 `env` 中额外添加 `\"WJX_CORP_ID\": \"你的企业通讯录 ID\"`。\r\n\r\n### HTTP 远程模式\r\n\r\n团队部署了远程 MCP 服务时：\r\n\r\n```json\r\n{\r\n  \"mcpServers\": {\r\n    \"wjx\": {\r\n      \"url\": \"http://your-server:3000/mcp\",\r\n      \"headers\": {\r\n        \"Authorization\": \"Bearer your-token\"\r\n      }\r\n    }\r\n  }\r\n}\r\n```\r\n\r\n---\r\n\r\n## 第二步：部署 Agent + Skill（推荐）\r\n\r\nwjx-ai-kit 提供专家 Agent 和配套 Skill 参考文档，让 AI 理解问卷领域的专业知识。\r\n\r\n### 一键安装\r\n\r\n```bash\r\nnpx wjx-cli skill install\r\n```\r\n\r\n> 也可从 [Vercel Agent Skills](https://skills.sh/wjxcom/wjx-ai-kit) 安装：`npx skills add wjxcom/wjx-ai-kit`，或在 [ClawHub](https://clawhub.ai/skills?q=wjx) 市场搜索 \"wjx\" 安装。\r\n\r\n这条命令会自动完成：\r\n- 创建 `.claude/agents/` 目录，部署 wjx-cli-expert Agent（CLI 命令专家）\r\n- 复制 `skills/wjx-cli-use/` 参考文档（DSL 语法、题型编码、CLI 命令参数等）\r\n\r\n安装后的目录结构：\r\n\r\n```\r\nyour-project/\r\n├── .claude/agents/\r\n│   └── wjx-cli-expert.md    # CLI 命令专家 Agent\r\n└── skills/\r\n    └── wjx-cli-use/          # CLI 使用技巧\r\n        ├── SKILL.md\r\n        └── references/\r\n```\r\n\r\n如果你的工作台支持 Rules 或指令文件，可以将 `skills/` 中的关键内容写入，提升 AI 操作问卷星的准确度。\r\n\r\n### Skill zip 手动安装\r\n\r\n如果无法使用 npm，可下载 Skill 包手动安装：\r\n\r\n1. 下载 [wjx-cli-use-skill-latest.zip](https://pubdz.paperol.cn/wjx-ai-kit/skills/wjx-cli-use-skill-latest.zip)\r\n2. 解压并提取其中的 `wjx-cli-use` 目录到工作台的技能目录（或当前项目目录下）\r\n3. 安装 CLI 并配置 API Key：\r\n   ```bash\r\n   npm install -g wjx-cli\r\n   wjx init\r\n   ```\r\n\r\n详见 [Skill 包入门指南](./skill-getting-started.md)。\r\n\r\n---\r\n\r\n## 第三步：安装 CLI（可选）\r\n\r\n详见 [CLI 入门指南](./cli-getting-started.md)。CLI 提供 67 个子命令，适合批量操作和自动化脚本。\r\n\r\n---\r\n\r\n## 第四步：验证\r\n\r\n在你的工作台中输入：\r\n\r\n> 帮我创建一份客户满意度调查问卷\r\n\r\n如果一切正常，AI 会调用问卷星 MCP 工具，自动创建问卷并返回编辑链接。\r\n\r\n---\r\n\r\n## 常见问题\r\n\r\n### 我用的工作台工具不在列表中？\r\n\r\n只要你的工作台支持 MCP 协议，就可以参照上方的标准配置接入问卷星。如遇到问题，请在 [GitHub Issues](https://github.com/wjxcom/wjx-ai-kit/issues) 反馈。\r\n\r\n### 工作台和 IDE 插件有什么区别？\r\n\r\n- **工作台**（Manus、WorkBuddy、QoderWork）：侧重任务交付，AI 自主规划和执行，适合非开发者\r\n- **IDE 插件**（Cursor、Windsurf、Cline 等）：侧重代码编写，AI 辅助开发，适合开发者\r\n\r\n两者都支持 MCP，问卷星功能一致。\r\n\r\n### QoderWork 和 Qoder IDE 插件是什么关系？\r\n\r\nQoder IDE 插件面向开发者，嵌入 VS Code / JetBrains。QoderWork 是独立桌面应用，面向更广泛用户。两者同属 Qoder 生态，MCP 配置方式相同。详见 [IDE 插件配置指南](./setup-ide.md)。\r\n\r\n---\r\n\r\n## 下一步\r\n\r\n- [MCP Server 入门指南](./mcp-getting-started.md) — 了解 58 个工具的完整能力\r\n- [wjx-ai-kit 总览](./00-overview.md) — 了解 SDK、MCP、CLI 三合一架构\r\n","skill-getting-started":"# Skill 包入门指南\r\n\r\n> 几条命令，你的 AI 助手就能操作问卷星了。\r\n\r\n---\r\n\r\n## 什么是问卷星 Skill\r\n\r\nSkill 是一种让 AI 助手获得特定能力的方式。问卷星 Skill 包含：\r\n\r\n- **SKILL.md** — AI 读取的使用指南，告诉它怎么操作问卷星\r\n- **references/** — 详细参考文档，AI 按需查阅\r\n\r\n安装后，你对 AI 说 \"帮我创建一份问卷\"，它就知道该怎么做了。\r\n\r\n---\r\n\r\n## 三种接入方式对比\r\n\r\n| | MCP Server | Skill 包 | CLI |\r\n|---|---|---|---|\r\n| **适合谁** | 所有 AI 工具用户 | Claw 系列 / 不想配 MCP 的用户 | 命令行 / 自动化脚本用户 |\r\n| **能力** | 58 个工具 + AI 自动调用 | AI 读取指南 + 调用 CLI 命令 | 67 个子命令 |\r\n| **安装** | 一行 npx 命令 | `npm install -g wjx-cli` | `npm install -g wjx-cli` |\r\n| **配置复杂度** | 低 | 最低 | 最低 |\r\n| **适合的 AI 工具** | Claude/Cursor/Windsurf/Cline/... | OpenClaw/KimiClaw/QClaw/... | 任何有终端的环境 |\r\n\r\n**推荐**：\r\n- 如果你的 AI 工具支持 MCP，优先用 MCP Server（能力最强）\r\n- 如果你用 Claw 系列工具或想要最简安装，用 Skill 包\r\n- 如果你主要做自动化脚本，直接用 CLI\r\n\r\n---\r\n\r\n## 快速开始：让 AI 帮你安装\r\n\r\n你已经在 AI 工具里了，直接让 AI 完成安装。复制下面的话发给你的 AI 助手：\r\n\r\n> 请帮我安装问卷星工具：\r\n> 1. 先检查 Node.js 是否已安装（`node --version`），如果没有请帮我安装 Node.js 20+\r\n> 2. 运行 `npm install -g wjx-cli` 安装问卷星 CLI\r\n> 3. 安装完成后，告诉我去这个链接获取 API Key：https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1 ，等我把 Key 发给你\r\n> 4. 拿到我的 Key 后运行 `wjx init --api-key <我的Key>` 完成配置\r\n> 5. 最后运行 `wjx doctor` 验证连接\r\n\r\nAI 会自动执行安装，然后等你提供 API Key。你微信扫码登录后，把 Key 发给 AI（例如\"这是 API Key：sk-wjx-xxx，请继续\"），AI 就能帮你完成配置。\r\n\r\n> **使用自定义域名？** 如果你使用的不是 `www.wjx.cn`（如 `xxx.sojump.cn`），请在提示中告诉 AI 你的域名，AI 会自动替换 API Key 链接并在配置时使用 `--base-url` 参数。\r\n\r\n安装完成后，直接对 AI 说：\r\n\r\n> \"帮我创建一份客户满意度调查，包含 NPS 评分题和 5 个维度的量表题\"\r\n\r\nAI 会自动调用 `wjx` 命令创建问卷，返回编辑链接和填写链接。\r\n\r\n---\r\n\r\n## 手动安装\r\n\r\n### 方式一：npm 安装（推荐）\r\n\r\n```bash\r\n# 安装 CLI\r\nnpm install -g wjx-cli\r\n\r\n# 配置 API Key（交互式，按提示操作）\r\nwjx init\r\n\r\n# 验证连接\r\nwjx doctor\r\n\r\n# 安装 AI 技能包到当前目录\r\nwjx skill install\r\n```\r\n\r\n> **没有 Node.js？** CLI 需要 Node.js 20+ 环境。访问 [nodejs.org](https://nodejs.org) 下载最新 LTS 版本，安装后再执行上述命令。\r\n\r\n安装完成后，根据你的 AI 工具，将 Skill 目录添加到对应位置：\r\n\r\n**OpenClaw / KimiClaw / QClaw / LinClaw / MaxClaw**：\r\n在工具的 Skills/技能 设置中，添加 `skills/wjx-cli-use` 目录路径。\r\n\r\n**Claude Code**：\r\n`wjx skill install` 会自动安装到 `.claude/agents/` 和 `skills/`，无需额外操作。\r\n\r\n**其他工具**：\r\n将 `skills/wjx-cli-use/SKILL.md` 的内容添加到工具的系统提示或 Rules 文件中。\r\n\r\n### 方式二：下载 Skill 包\r\n\r\n1. 下载 [wjx-cli-use-skill-latest.zip](https://pubdz.paperol.cn/wjx-ai-kit/skills/wjx-cli-use-skill-latest.zip)\r\n2. 解压并提取其中的 `wjx-cli-use` 目录到 AI 工具的技能目录（如 `skills/wjx-cli-use/`）\r\n3. 安装 CLI 并配置 API Key——复制以下内容发给你的 AI 助手：\r\n\r\n> 请帮我安装问卷星 CLI：\r\n> 1. 运行 `node --version` 检查 Node.js 版本，如果未安装或低于 20，请帮我安装 Node.js 20+\r\n> 2. 运行 `npm install -g wjx-cli` 安装问卷星 CLI\r\n> 3. 告诉我去这个链接获取 API Key：https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1\r\n> 4. 拿到 Key 后运行 `wjx init --api-key <Key>` 完成配置\r\n> 5. 运行 `wjx doctor` 验证连接\r\n\r\n> **已配置 MCP Server？** 如果你已接入了 wjx-mcp-server，可跳过 CLI 安装。Skill 文档同样适用于 MCP 工具调用。\r\n\r\n---\r\n\r\n## 环境要求\r\n\r\n- **Node.js >= 20**（[下载](https://nodejs.org)）\r\n- **问卷星账号**（微信扫码即可注册登录）\r\n- 支持系统：macOS、Linux、Windows\r\n\r\n---\r\n\r\n## 与 MCP Server 的关系\r\n\r\n```\r\n┌─────────────────────────────────────────┐\r\n│            你的 AI 助手                  │\r\n├───────────────┬─────────────────────────┤\r\n│   Skill 包     │    MCP Server           │\r\n│ (读 SKILL.md   │ (58 个工具直接调用)      │\r\n│  调 wjx 命令)  │                         │\r\n├───────────────┴─────────────────────────┤\r\n│          wjx-cli (67 子命令)             │\r\n├─────────────────────────────────────────┤\r\n│          wjx-api-sdk (基础层)            │\r\n├─────────────────────────────────────────┤\r\n│          问卷星 OpenAPI                  │\r\n└─────────────────────────────────────────┘\r\n```\r\n\r\n- **Skill 包**：AI 读取 SKILL.md 学会用法，通过 `wjx` CLI 命令操作问卷星\r\n- **MCP Server**：AI 通过 MCP 协议直接调用 58 个工具，不需要命令行\r\n\r\n两者底层都走 `wjx-api-sdk`，能力一致。MCP Server 的工具调用更高效，Skill 包的安装更简单。\r\n\r\n---\r\n\r\n## 常见问题\r\n\r\n**Q: 我需要同时装 MCP Server 和 Skill 包吗？**\r\n\r\n不需要。选一种就行。如果你的 AI 工具支持 MCP，推荐用 MCP Server。\r\n\r\n**Q: npm install 报错怎么办？**\r\n\r\n需要 Node.js 20 以上。访问 [nodejs.org](https://nodejs.org) 下载最新 LTS 版本。安装后运行 `node --version` 确认版本号 >= 20。\r\n\r\n**Q: API Key 在哪里找？**\r\n\r\n打开 [这个链接](https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1)，微信扫码登录后直接显示。如果你使用自定义域名，将链接中的 `www.wjx.cn` 替换为你的域名即可。\r\n\r\n**Q: 拿到 API Key 后怎么告诉 AI？**\r\n\r\n直接把 Key 发给 AI 即可，例如\"这是 API Key：sk-wjx-xxx，请继续\"。AI 会自动执行 `wjx init --api-key <你的Key>` 完成配置。\r\n\r\n**Q: 我用的不是 www.wjx.cn 域名怎么办？**\r\n\r\n在让 AI 安装时告诉它你的域名，例如\"我用的域名是 xxx.sojump.cn\"。AI 会自动在 `wjx init` 时加上 `--base-url https://xxx.sojump.cn`，并替换 API Key 获取链接中的域名。\r\n\r\n---\r\n\r\n## 深入了解\r\n\r\n- [MCP Server 入门指南](./mcp-getting-started.md) — 用 MCP 接入更多 AI 工具\r\n- [CLI 入门指南](./cli-getting-started.md) — 命令行完整用法\r\n- [SDK 入门指南](./sdk-getting-started.md) — TypeScript 开发集成\r\n- [总纲](./00-overview.md) — 功能全景和选择引导\r\n"};

// ===== 菜单定义 =====
var MENU = [{"group":"总览","items":[{"key":"00-overview","label":"总纲"}]},{"group":"入门指南","items":[{"key":"mcp-getting-started","label":"MCP Server 入门"},{"key":"cli-getting-started","label":"CLI 入门"},{"key":"sdk-getting-started","label":"SDK 入门"},{"key":"skill-getting-started","label":"Skill 包入门"}]},{"group":"进阶指南","items":[{"key":"mcp-advanced","label":"MCP Server 进阶"},{"key":"cli-advanced","label":"CLI 进阶"},{"key":"sdk-advanced","label":"SDK 进阶"}]},{"group":"AI 工具配置","collapsed":true,"items":[{"key":"setup-claude-code","label":"Claude Code"},{"key":"setup-claude-desktop","label":"Claude Desktop"},{"key":"setup-ide","label":"IDE 插件（7 工具）"},{"key":"setup-claw","label":"Claw 系列"},{"key":"setup-workbench","label":"AI 工作台"}]}];

// ===== 初始化 =====
(function() {
  // marked 配置
  marked.setOptions({
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
      }
      return code;
    },
    breaks: false,
    gfm: true
  });

  // 自定义 renderer：将 md 内部链接转为 hash 路由
  var renderer = new marked.Renderer();
  renderer.link = function(href, title, text) {
    if (typeof href === "object") {
      var token = href;
      href = token.href;
      title = token.title;
      text = token.text;
    }
    if (typeof href === "string") {
      var m = href.match(/^\.?\/?([-\w]+)\.md$/);
      if (m && DOCS[m[1]]) {
        return '<a href="#doc=' + m[1] + '">' + (text || m[1]) + '</a>';
      }
    }
    var titleAttr = title ? ' title="' + title + '"' : '';
    return '<a href="' + href + '"' + titleAttr + ' target="_blank" rel="noopener">' + (text || href) + '</a>';
  };
  marked.setOptions({ renderer: renderer });

  // 构建菜单
  var menuEl = document.getElementById("wjxDocsMenu");
  var menuHtml = "";
  MENU.forEach(function(group) {
    var collapsible = group.collapsed ? " collapsible collapsed" : (group.items.length > 5 ? " collapsible" : "");
    var hidden = group.collapsed ? " hidden" : "";
    var arrow = (collapsible || group.items.length > 5) ? ' <span class="arrow">&#9660;</span>' : "";
    menuHtml += '<div class="wjx-docs-nav-group">';
    menuHtml += '<div class="wjx-docs-nav-group-header' + collapsible + '">' + group.group + arrow + '</div>';
    menuHtml += '<div class="wjx-docs-nav-group-items' + hidden + '">';
    group.items.forEach(function(item) {
      menuHtml += '<a class="wjx-docs-nav-item" data-key="' + item.key + '" href="#doc=' + item.key + '">' + item.label + '</a>';
    });
    menuHtml += '</div></div>';
  });
  menuEl.innerHTML = menuHtml;

  // 折叠/展开
  menuEl.querySelectorAll(".wjx-docs-nav-group-header.collapsible").forEach(function(header) {
    header.addEventListener("click", function() {
      this.classList.toggle("collapsed");
      this.nextElementSibling.classList.toggle("hidden");
    });
  });

  // 渲染文档
  var contentEl = document.getElementById("wjxDocsContent");
  function renderDoc(key) {
    var md = DOCS[key];
    if (!md) {
      contentEl.innerHTML = '<div class="wjx-docs-loading">文档未找到: ' + key + '</div>';
      return;
    }
    contentEl.innerHTML = marked.parse(md);
    menuEl.querySelectorAll(".wjx-docs-nav-item").forEach(function(el) {
      el.classList.toggle("active", el.dataset.key === key);
      if (el.classList.contains("active")) {
        var items = el.closest(".wjx-docs-nav-group-items");
        if (items && items.classList.contains("hidden")) {
          items.classList.remove("hidden");
          items.previousElementSibling.classList.remove("collapsed");
        }
      }
    });
    contentEl.scrollIntoView({ behavior: "smooth", block: "start" });
    document.getElementById("wjxDocsNav").classList.remove("open");
    document.getElementById("wjxDocsOverlay").classList.remove("open");
  }

  function getDocFromHash() {
    var m = location.hash.match(/doc=([-\w]+)/);
    return m ? m[1] : "00-overview";
  }

  window.addEventListener("hashchange", function() { renderDoc(getDocFromHash()); });

  document.getElementById("wjxDocsMenuToggle").addEventListener("click", function() {
    document.getElementById("wjxDocsNav").classList.toggle("open");
    document.getElementById("wjxDocsOverlay").classList.toggle("open");
  });
  document.getElementById("wjxDocsOverlay").addEventListener("click", function() {
    document.getElementById("wjxDocsNav").classList.remove("open");
    this.classList.remove("open");
  });

  renderDoc(getDocFromHash());
})();
</script>
