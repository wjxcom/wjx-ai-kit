用 GitHub Copilot 扩展\n3. **Node.js >= 20** — 运行 `node --version` 确认版本，低于 20 请前往 [nodejs.org](https://nodejs.org) 升级\n4. **获取问卷星 API Key** — 微信扫码登录 [API Key 获取页](https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1)，登录后页面直接显示 API Key\n\n> 注意：Copilot 的 MCP 支持需要 Agent 模式。请确认你的 Copilot 版本已支持此功能。\n\n---\n\n## 第一步：接入 MCP Server\n\n### 方式一：项目级配置（推荐）\n\n在项目根目录创建 `.github/copilot-mcp.json`：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"command\": \"npx\",\n      \"args\": [\"wjx-mcp-server\"],\n      \"env\": {\n        \"WJX_API_KEY\": \"替换为你的 API Key\"\n      }\n    }\n  }\n}\n```\n\n### 方式二：VS Code 设置\n\n在 VS Code 的 `settings.json` 中添加：\n\n```json\n{\n  \"mcp\": {\n    \"servers\": {\n      \"wjx\": {\n        \"command\": \"npx\",\n        \"args\": [\"wjx-mcp-server\"],\n        \"env\": {\n          \"WJX_API_KEY\": \"替换为你的 API Key\"\n        }\n      }\n    }\n  }\n}\n```\n\n### 启用 Agent 模式\n\n确保 VS Code 设置中已启用 Agent 模式：\n\n```json\n{\n  \"github.copilot.chat.agent.enabled\": true\n}\n```\n\n### 企业用户\n\n如需管理通讯录，在 `env` 中额外添加 `\"WJX_CORP_ID\": \"你的企业通讯录 ID\"`。\n\n### HTTP 远程模式\n\n团队部署了远程 MCP 服务时：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"url\": \"http://your-server:3000/mcp\",\n      \"headers\": {\n        \"Authorization\": \"Bearer your-token\"\n      }\n    }\n  }\n}\n```\n\n---\n\n## 第二步：部署 Agent + Skill（推荐）\n\nwjx-ai-kit 提供 2 个专家 Agent 和配套 Skill 参考文档，让 AI 理解问卷领域的专业知识。\n\n### 一键安装\n\n```bash\nnpx wjx-cli skill install\n```\n\n> 也可从 [Vercel Agent Skills](https://skills.sh/wjxcom/wjx-ai-kit) 安装：`npx skills add wjxcom/wjx-ai-kit`，或在 [ClawHub](https://clawhub.ai/skills?q=wjx) 市场搜索 \"wjx\" 安装。\n\n这条命令会自动完成：\n- 创建 `.claude/agents/` 目录，部署 2 个专家 Agent（wjx-mcp-expert、wjx-cli-expert）\n- 复制 `wjx-skills/` 参考文档目录（DSL 语法、题型编码、分析方法等）\n\n安装后的目录结构：\n\n```\nyour-project/\n├── .claude/agents/\n│   ├── wjx-mcp-expert.md    # MCP 工具专家\n│   └── wjx-cli-expert.md    # CLI 命令专家\n└── wjx-skills/\n    ├── wjx-mcp-use/          # MCP 使用技巧\n    │   ├── SKILL.md\n    │   └── references/\n    └── wjx-cli-use/          # CLI 使用技巧\n        ├── SKILL.md\n        └── references/\n```\n\n### copilot-instructions.md 增强\n\nGitHub Copilot 支持通过 `.github/copilot-instructions.md` 文件注入项目级自定义指令。将 Skill 中的关键内容加入其中：\n\n在项目根目录创建 `.github/copilot-instructions.md`：\n\n```markdown\n# 问卷星集成\n\n本项目使用 wjx-ai-kit 管理问卷调研。\n\n## MCP 工具使用规范\n- 创建问卷：优先使用 create_survey_by_text（DSL 文本模式）\n- 数据分析：先用 query_responses 获取数据，再用 calculate_nps / calculate_csat 分析\n- 通讯录操作：使用 add_contacts 批量导入，query_contacts 查询验证\n\n## DSL 语法要点\n- 第一行为问卷标题，=== 分隔描述\n- 题型标签：[单选题] [多选题] [填空题] [量表题] [矩阵量表题] [下拉框]\n- 量表范围：1~5 或 0~10\n```\n\nCopilot 会在 Agent 模式的每次对话中自动加载这些指令。\n\n### Skill zip 手动安装\n\n如果无法使用 npm，可下载 Skill 包手动安装：\n\n1. 下载 [wjx-cli-use-skill-latest.zip](https://pubdz.paperol.cn/wjx-ai-kit/skills/wjx-cli-use-skill-latest.zip)\n2. 解压到 AI 工具的技能目录（或当前项目目录下）\n3. 安装 CLI 并配置 API Key：\n   ```bash\n   npm install -g wjx-cli\n   wjx init\n   ```\n\n详见 [Skill 包入门指南](./skill-getting-started.md)。\n\n---\n\n## 第三步：安装 CLI（可选）\n\nwjx-cli 提供 69 个子命令，适合批量操作和自动化脚本：\n\n```bash\n# 安装\nnpm install -g wjx-cli\n\n# 配置 API Key\nwjx init\n\n# 环境检查\nwjx doctor\n\n# 试试看\nwjx survey list\n```\n\nCLI 输出结构化 JSON，可与 AI 工具配合使用。例如：\n\n```bash\n# 查询答卷并分析 NPS\nwjx response query --vid 12345 --page_size 100\nwjx analytics nps --scores 9,10,7,3,8\n```\n\n---\n\n## 第四步：验证\n\n在 Copilot Chat 中切换到 Agent 模式，输入：\n\n> 帮我创建一份客户满意度调查问卷\n\n如果一切正常，Copilot 会调用问卷星工具，自动创建问卷并返回编辑链接。\n\n---\n\n## 典型场景\n\n### 场景 1: 创建调研问卷\n\n> 你：帮我创建一份员工满意度调查问卷，包含 NPS 评分题、工作环境满意度（5 级量表）和开放反馈\n>\n> AI 自动：读取 DSL 语法 → 生成问卷结构 → 调用 create_survey_by_text → 返回编辑链接\n\n### 场景 2: 分析数据\n\n> 你：分析最近一次客户满意度调查的 NPS 得分\n>\n> AI 自动：query_responses 获取数据 → calculate_nps 计算 → 给出推荐人/中立/贬损分布\n\n### 场景 3: 批量管理\n\n> 你：把这份 Excel 名单导入通讯录的\"市场部\"分组\n>\n> AI 自动：读取文件 → add_contacts 批量导入 → query_contacts 验证\n\n---\n\n## 常见问题\n\n### Copilot Chat 中没有出现 MCP 工具？\n\n1. 确认已启用 Agent 模式（`\"github.copilot.chat.agent.enabled\": true`）\n2. 确认 Copilot 版本支持 MCP（需要较新版本）\n3. 确认聊天面板已切换到 Agent 模式（非普通 Chat 模式）\n\n### MCP 支持是稳定功能吗？\n\nGitHub Copilot 的 MCP 支持可能处于预览阶段，功能和配置方式可能随版本更新变化。建议关注 [GitHub Copilot 官方文档](https://docs.github.com/copilot) 获取最新信息。\n\n---\n\n## 下一步\n\n- [MCP Server 入门指南](./mcp-getting-started.md) — 了解 56 个工具的完整能力\n- [wjx-ai-kit 总览](./00-overview.md) — 了解 SDK、MCP、CLI 三合一架构\n","setup-cursor":"# 在 Cursor 中使用问卷星\n\n> 在 Cursor 中用自然语言创建问卷、分析数据、管理通讯录\n\n---\n\n## 准备工作\n\n1. **安装 Cursor** — 前往 [cursor.com](https://www.cursor.com) 下载并安装\n2. **Node.js >= 20** — 运行 `node --version` 确认版本，低于 20 请前往 [nodejs.org](https://nodejs.org) 升级\n3. **获取问卷星 API Key** — 微信扫码登录 [API Key 获取页](https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1)，登录后页面直接显示 API Key\n\n---\n\n## 第一步：接入 MCP Server\n\n### 方式一：配置文件（推荐）\n\n在项目根目录创建 `.cursor/mcp.json`：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"command\": \"npx\",\n      \"args\": [\"wjx-mcp-server\"],\n      \"env\": {\n        \"WJX_API_KEY\": \"替换为你的 API Key\"\n      }\n    }\n  }\n}\n```\n\n> 也可以放在全局路径 `~/.cursor/mcp.json`，这样所有项目都能使用。\n\n### 方式二：通过 UI 配置\n\n1. 打开 Cursor Settings（`Cmd+,` / `Ctrl+,`）\n2. 进入 **Features** → **MCP**\n3. 点击 **Add Server**\n4. 填入名称 `wjx`，命令 `npx wjx-mcp-server`\n5. 在环境变量中添加 `WJX_API_KEY`\n\n### 企业用户\n\n如需管理通讯录，在 `env` 中额外添加 `\"WJX_CORP_ID\": \"你的企业通讯录 ID\"`。\n\n### HTTP 远程模式\n\n如果你的团队部署了远程 MCP 服务，使用以下配置：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"url\": \"http://your-server:3000/mcp\",\n      \"headers\": {\n        \"Authorization\": \"Bearer your-token\"\n      }\n    }\n  }\n}\n```\n\n---\n\n## 第二步：部署 Agent + Skill（推荐）\n\nwjx-ai-kit 提供 2 个专家 Agent 和配套 Skill 参考文档，让 AI 理解问卷领域的专业知识。\n\n### 一键安装\n\n```bash\nnpx wjx-cli skill install\n```\n\n> 也可从 [Vercel Agent Skills](https://skills.sh/wjxcom/wjx-ai-kit) 安装：`npx skills add wjxcom/wjx-ai-kit`，或在 [ClawHub](https://clawhub.ai/skills?q=wjx) 市场搜索 \"wjx\" 安装。\n\n这条命令会自动完成：\n- 创建 `.claude/agents/` 目录，部署 2 个专家 Agent（wjx-mcp-expert、wjx-cli-expert）\n- 复制 `wjx-skills/` 参考文档目录（DSL 语法、题型编码、分析方法等）\n\n安装后的目录结构：\n\n```\nyour-project/\n├── .claude/agents/\n│   ├── wjx-mcp-expert.md    # MCP 工具专家\n│   └── wjx-cli-expert.md    # CLI 命令专家\n└── wjx-skills/\n    ├── wjx-mcp-use/          # MCP 使用技巧\n    │   ├── SKILL.md\n    │   └── references/\n    └── wjx-cli-use/          # CLI 使用技巧\n        ├── SKILL.md\n        └── references/\n```\n\n### .cursorrules 增强\n\nCursor 支持通过 `.cursorrules` 文件注入项目级上下文。你可以将 Skill 中的关键内容加入其中，让 Cursor 的 AI 更准确地操作问卷星：\n\n在项目根目录创建 `.cursorrules`：\n\n```\n# 问卷星集成\n\n本项目使用 wjx-ai-kit 管理问卷调研。\n\n## MCP 工具使用规范\n- 创建问卷：优先使用 create_survey_by_text（DSL 文本模式）\n- 数据分析：先用 query_responses 获取数据，再用 calculate_nps / calculate_csat 分析\n- 通讯录操作：使用 add_contacts 批量导入，query_contacts 查询验证\n\n## DSL 语法要点\n- 第一行为问卷标题，=== 分隔描述\n- 题型标签：[单选题] [多选题] [填空题] [量表题] [矩阵量表题] [下拉框]\n- 量表范围：1~5 或 0~10\n```\n\n这些规则会在每次 Cursor 对话中自动加载。\n\n### Skill zip 手动安装\n\n如果无法使用 npm，可下载 Skill 包手动安装：\n\n1. 下载 [wjx-cli-use-skill-latest.zip](https://pubdz.paperol.cn/wjx-ai-kit/skills/wjx-cli-use-skill-latest.zip)\n2. 解压到 AI 工具的技能目录（或当前项目目录下）\n3. 安装 CLI 并配置 API Key：\n   ```bash\n   npm install -g wjx-cli\n   wjx init\n   ```\n\n详见 [Skill 包入门指南](./skill-getting-started.md)。\n\n---\n\n## 第三步：安装 CLI（可选）\n\nwjx-cli 提供 69 个子命令，适合批量操作和自动化脚本：\n\n```bash\n# 安装\nnpm install -g wjx-cli\n\n# 配置 API Key\nwjx init\n\n# 环境检查\nwjx doctor\n\n# 试试看\nwjx survey list\n```\n\nCLI 输出结构化 JSON，可与 AI 工具配合使用。例如：\n\n```bash\n# 查询答卷并分析 NPS\nwjx response query --vid 12345 --page_size 100\nwjx analytics nps --scores 9,10,7,3,8\n```\n\n---\n\n## 第四步：验证\n\n在 Cursor 的 AI 对话中输入：\n\n> 帮我创建一份客户满意度调查问卷\n\n如果一切正常，Cursor 会调用问卷星工具，自动创建问卷并返回编辑链接。\n\n---\n\n## 典型场景\n\n### 场景 1: 创建调研问卷\n\n> 你：帮我创建一份员工满意度调查问卷，包含 NPS 评分题、工作环境满意度（5 级量表）和开放反馈\n>\n> AI 自动：读取 DSL 语法 → 生成问卷结构 → 调用 create_survey_by_text → 返回编辑链接\n\n### 场景 2: 分析数据\n\n> 你：分析最近一次客户满意度调查的 NPS 得分\n>\n> AI 自动：query_responses 获取数据 → calculate_nps 计算 → 给出推荐人/中立/贬损分布\n\n### 场景 3: 批量管理\n\n> 你：把这份 Excel 名单导入通讯录的\"市场部\"分组\n>\n> AI 自动：读取文件 → add_contacts 批量导入 → query_contacts 验证\n\n---\n\n## 常见问题\n\n### MCP 工具没有出现在 Cursor 中？\n\n1. 确认 `.cursor/mcp.json` 放在项目根目录下\n2. 重新打开 Cursor 或重新加载窗口（`Cmd+Shift+P` → Reload Window）\n3. 在 Settings → Features → MCP 中确认服务状态为已连接\n\n### Cursor 用的是哪个模型？\n\nCursor 的 Agent 模式支持多种模型。建议使用 Claude 系列模型，与 MCP 工具的兼容性最佳。\n\n### 项目级配置和全局配置有什么区别？\n\n- 项目级（`.cursor/mcp.json`）：只在当前项目中生效，适合不同项目使用不同的 API Key\n- 全局级（`~/.cursor/mcp.json`）：所有项目共享，适合个人开发者\n\n---\n\n## 下一步\n\n- [MCP Server 入门指南](./mcp-getting-started.md) — 了解 56 个工具的完整能力\n- [wjx-ai-kit 总览](./00-overview.md) — 了解 SDK、MCP、CLI 三合一架构\n","setup-gemini":"# 在 Gemini Code Assist 中使用问卷星\n\n> 在 Gemini Code Assist 中用自然语言创建问卷、分析数据、管理通讯录\n\n---\n\n## 准备工作\n\n1. **安装 Gemini Code Assist** — 在 VS Code 或 JetBrains IDE 的扩展市场搜索 \"Gemini Code Assist\" 并安装\n2. **Node.js >= 20** — 运行 `node --version` 确认版本，低于 20 请前往 [nodejs.org](https://nodejs.org) 升级\n3. **获取问卷星 API Key** — 微信扫码登录 [API Key 获取页](https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1)，登录后页面直接显示 API Key\n\n> 注意：Gemini Code Assist 的 MCP 支持可能处于预览阶段，功能和配置方式可能随版本更新变化。\n\n---\n\n## 第一步：接入 MCP Server\n\n### 通过扩展设置配置\n\n在 Gemini Code Assist 扩展设置中找到 MCP 相关配置项，添加以下服务器信息：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"command\": \"npx\",\n      \"args\": [\"wjx-mcp-server\"],\n      \"env\": {\n        \"WJX_API_KEY\": \"替换为你的 API Key\"\n      }\n    }\n  }\n}\n```\n\n### 企业用户\n\n如需管理通讯录，在 `env` 中额外添加 `\"WJX_CORP_ID\": \"你的企业通讯录 ID\"`。\n\n### HTTP 远程模式\n\n团队部署了远程 MCP 服务时：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"url\": \"http://your-server:3000/mcp\",\n      \"headers\": {\n        \"Authorization\": \"Bearer your-token\"\n      }\n    }\n  }\n}\n```\n\n---\n\n## 第二步：部署 Agent + Skill（推荐）\n\nwjx-ai-kit 提供 2 个专家 Agent 和配套 Skill 参考文档，让 AI 理解问卷领域的专业知识。\n\n### 一键安装\n\n```bash\nnpx wjx-cli skill install\n```\n\n> 也可从 [Vercel Agent Skills](https://skills.sh/wjxcom/wjx-ai-kit) 安装：`npx skills add wjxcom/wjx-ai-kit`，或在 [ClawHub](https://clawhub.ai/skills?q=wjx) 市场搜索 \"wjx\" 安装。\n\n这条命令会自动完成：\n- 创建 `.claude/agents/` 目录，部署 2 个专家 Agent（wjx-mcp-expert、wjx-cli-expert）\n- 复制 `wjx-skills/` 参考文档目录（DSL 语法、题型编码、分析方法等）\n\n安装后的目录结构：\n\n```\nyour-project/\n├── .claude/agents/\n│   ├── wjx-mcp-expert.md    # MCP 工具专家\n│   └── wjx-cli-expert.md    # CLI 命令专家\n└── wjx-skills/\n    ├── wjx-mcp-use/          # MCP 使用技巧\n    │   ├── SKILL.md\n    │   └── references/\n    └── wjx-cli-use/          # CLI 使用技巧\n        ├── SKILL.md\n        └── references/\n```\n\nSkill 参考文档可以作为对话上下文的参考素材，帮助 Gemini 更好地理解问卷星的 DSL 语法、题型编码和分析方法。\n\n### Skill zip 手动安装\n\n如果无法使用 npm，可下载 Skill 包手动安装：\n\n1. 下载 [wjx-cli-use-skill-latest.zip](https://pubdz.paperol.cn/wjx-ai-kit/skills/wjx-cli-use-skill-latest.zip)\n2. 解压到 AI 工具的技能目录（或当前项目目录下）\n3. 安装 CLI 并配置 API Key：\n   ```bash\n   npm install -g wjx-cli\n   wjx init\n   ```\n\n详见 [Skill 包入门指南](./skill-getting-started.md)。\n\n---\n\n## 第三步：安装 CLI（可选）\n\nwjx-cli 提供 69 个子命令，适合批量操作和自动化脚本：\n\n```bash\n# 安装\nnpm install -g wjx-cli\n\n# 配置 API Key\nwjx init\n\n# 环境检查\nwjx doctor\n\n# 试试看\nwjx survey list\n```\n\nCLI 输出结构化 JSON，可与 AI 工具配合使用。例如：\n\n```bash\n# 查询答卷并分析 NPS\nwjx response query --vid 12345 --page_size 100\nwjx analytics nps --scores 9,10,7,3,8\n```\n\n---\n\n## 第四步：验证\n\n在 Gemini Code Assist 的对话中输入：\n\n> 帮我创建一份客户满意度调查问卷\n\n如果一切正常，Gemini 会调用问卷星工具，自动创建问卷并返回编辑链接。\n\n---\n\n## 典型场景\n\n### 场景 1: 创建调研问卷\n\n> 你：帮我创建一份员工满意度调查问卷，包含 NPS 评分题、工作环境满意度（5 级量表）和开放反馈\n>\n> AI 自动：读取 DSL 语法 → 生成问卷结构 → 调用 create_survey_by_text → 返回编辑链接\n\n### 场景 2: 分析数据\n\n> 你：分析最近一次客户满意度调查的 NPS 得分\n>\n> AI 自动：query_responses 获取数据 → calculate_nps 计算 → 给出推荐人/中立/贬损分布\n\n---\n\n## 常见问题\n\n### Gemini Code Assist 支持 MCP 吗？\n\nMCP 支持取决于 Gemini Code Assist 的具体版本。建议关注 [Google Cloud 官方文档](https://cloud.google.com/gemini/docs) 获取最新的 MCP 支持信息。\n\n### 工具调用失败？\n\n1. 确认 Node.js 版本 >= 20\n2. 确认 API Key 有效且无多余空格\n3. 检查 Gemini Code Assist 扩展是否为最新版本\n\n---\n\n## 下一步\n\n- [MCP Server 入门指南](./mcp-getting-started.md) — 了解 56 个工具的完整能力\n- [wjx-ai-kit 总览](./00-overview.md) — 了解 SDK、MCP、CLI 三合一架构\n","setup-openclaw":"# 在 OpenClaw 中使用问卷星\n\n> 在 OpenClaw 中用自然语言创建问卷、分析数据、管理通讯录\n\n---\n\n## 什么是 OpenClaw\n\n[OpenClaw](https://openclaw.com) 是开源的 AI 编程助手，支持 VS Code 插件和独立应用两种形态。OpenClaw 支持 MCP 协议和 Skills 系统，可以灵活扩展 AI 能力。\n\n---\n\n## 准备工作\n\n1. **安装 OpenClaw** — 前往 [openclaw.com](https://openclaw.com) 下载，或在 VS Code 扩展市场搜索 \"OpenClaw\" 安装\n2. **Node.js >= 22** — 运行 `node --version` 确认版本（OpenClaw 要求 Node.js 22 或更高）\n3. **获取问卷星 API Key** — 微信扫码登录 [API Key 获取页](https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1)，登录后页面直接显示 API Key\n\n---\n\n## 第一步：接入 MCP Server\n\n编辑 OpenClaw 配置文件 `~/.openclaw/openclaw.json`，在 `acp.mcpServers` 中添加问卷星：\n\n```json\n{\n  \"acp\": {\n    \"mcpServers\": {\n      \"wjx\": {\n        \"command\": \"npx\",\n        \"args\": [\"wjx-mcp-server\"],\n        \"env\": {\n          \"WJX_API_KEY\": \"替换为你的 API Key\"\n        }\n      }\n    }\n  }\n}\n```\n\n> **注意**：OpenClaw 的 MCP 配置路径是 `acp.mcpServers`，与其他工具的 `mcpServers` 不同。\n\n### 企业用户\n\n如需管理通讯录，在 `env` 中额外添加 `\"WJX_CORP_ID\": \"你的企业通讯录 ID\"`。\n\n### HTTP 远程模式\n\n团队部署了远程 MCP 服务时：\n\n```json\n{\n  \"acp\": {\n    \"mcpServers\": {\n      \"wjx\": {\n        \"url\": \"http://your-server:3000/mcp\",\n        \"headers\": {\n          \"Authorization\": \"Bearer your-token\"\n        }\n      }\n    }\n  }\n}\n```\n\n---\n\n## 第二步：部署 Agent + Skill（推荐）\n\nwjx-ai-kit 提供 2 个专家 Agent 和配套 Skill 参考文档，让 AI 理解问卷领域的专业知识。\n\n### 一键安装\n\n```bash\nnpx wjx-cli skill install\n```\n\n> 也可从 [Vercel Agent Skills](https://skills.sh/wjxcom/wjx-ai-kit) 安装：`npx skills add wjxcom/wjx-ai-kit`，或在 [ClawHub](https://clawhub.ai/skills?q=wjx) 市场搜索 \"wjx\" 安装。\n\n这条命令会自动完成：\n- 创建 `.claude/agents/` 目录，部署 2 个专家 Agent（wjx-mcp-expert、wjx-cli-expert）\n- 复制 `wjx-skills/` 参考文档目录（DSL 语法、题型编码、分析方法等）\n\n安装后的目录结构：\n\n```\nyour-project/\n├── .claude/agents/\n│   ├── wjx-mcp-expert.md    # MCP 工具专家\n│   └── wjx-cli-expert.md    # CLI 命令专家\n└── wjx-skills/\n    ├── wjx-mcp-use/          # MCP 使用技巧\n    │   ├── SKILL.md\n    │   └── references/\n    └── wjx-cli-use/          # CLI 使用技巧\n        ├── SKILL.md\n        └── references/\n```\n\n### OpenClaw Skills 增强\n\nOpenClaw 支持 Skills 系统，你可以在配置中启用 npm 作为包管理器来自动安装依赖：\n\n```json\n{\n  \"skills\": {\n    \"install\": {\n      \"nodeManager\": \"npm\"\n    }\n  }\n}\n```\n\n同时，将 `wjx-skills/` 中的参考文档作为项目上下文，OpenClaw 会自动读取并用于增强 AI 的问卷操作能力。\n\n### 从 ClawHub 市场安装\n\nwjx-ai-kit 的 Skill 已上架 [ClawHub 市场](https://clawhub.ai/skills?q=wjx)，你可以直接在 ClawHub 中搜索 \"wjx\" 找到并安装问卷星技能包（wjx-cli-use、wjx-mcp-use）。\n\n也可通过 [Vercel Agent Skills](https://skills.sh/wjxcom/wjx-ai-kit) 安装：\n\n```bash\nnpx skills add wjxcom/wjx-ai-kit\n```\n\n### Skill zip 手动安装\n\n如果无法使用 npm，可下载 Skill 包手动安装：\n\n1. 下载 [wjx-cli-use-skill-latest.zip](https://pubdz.paperol.cn/wjx-ai-kit/skills/wjx-cli-use-skill-latest.zip)\n2. 解压到 AI 工具的技能目录（或当前项目目录下）\n3. 安装 CLI 并配置 API Key：\n   ```bash\n   npm install -g wjx-cli\n   wjx init\n   ```\n\n详见 [Skill 包入门指南](./skill-getting-started.md)。\n\n---\n\n## 第三步：安装 CLI（可选）\n\nwjx-cli 提供 69 个子命令，适合批量操作和自动化脚本：\n\n```bash\n# 安装\nnpm install -g wjx-cli\n\n# 配置 API Key\nwjx init\n\n# 环境检查\nwjx doctor\n\n# 试试看\nwjx survey list\n```\n\nCLI 输出结构化 JSON，可与 AI 工具配合使用。例如：\n\n```bash\n# 查询答卷并分析 NPS\nwjx response query --vid 12345 --page_size 100\nwjx analytics nps --scores 9,10,7,3,8\n```\n\n---\n\n## 第四步：验证\n\n在 OpenClaw 的对话中输入：\n\n> 帮我创建一份客户满意度调查问卷\n\n如果一切正常，OpenClaw 会调用问卷星 MCP 工具，自动创建问卷并返回编辑链接。\n\n---\n\n## 典型场景\n\n### 场景 1: 创建调研问卷\n\n> 你：帮我创建一份员工满意度调查问卷，包含 NPS 评分题、工作环境满意度（5 级量表）和开放反馈\n>\n> AI 自动：读取 DSL 语法 → 生成问卷结构 → 调用 create_survey_by_text → 返回编辑链接\n\n### 场景 2: 分析数据\n\n> 你：分析最近一次客户满意度调查的 NPS 得分\n>\n> AI 自动：query_responses 获取数据 → calculate_nps 计算 → 给出推荐人/中立/贬损分布\n\n### 场景 3: 代码中集成问卷\n\n> 你：帮我在这个 Express 项目中添加一个问卷回调接口，接收问卷星的 Webhook 推送\n>\n> AI 自动：读取 push 解密参考 → 生成 Webhook 处理代码 → 集成到项目中\n\n---\n\n## 常见问题\n\n### OpenClaw 中看不到问卷星工具？\n\n1. 确认配置文件路径是 `~/.openclaw/openclaw.json`\n2. 确认 MCP 配置在 `acp.mcpServers` 下（不是 `mcpServers`）\n3. 确认 Node.js 版本 >= 22\n4. 重启 OpenClaw\n\n### OpenClaw 和其他 Claw 工具有什么区别？\n\nOpenClaw 是开源的，支持更灵活的扩展。其他 Claw 工具（如 KimiClaw、QClaw）各有特色，配置方式类似但可能有细微差异。\n\n---\n\n## 下一步\n\n- [MCP Server 入门指南](./mcp-getting-started.md) — 了解 56 个工具的完整能力\n- [wjx-ai-kit 总览](./00-overview.md) — 了解 SDK、MCP、CLI 三合一架构\n","setup-qoder":"# 在 Qoder 中使用问卷星\n\n> 在 Qoder 中用自然语言创建问卷、分析数据、管理通讯录\n\n---\n\n## 什么是 Qoder\n\n[Qoder](https://qoder.ai) 是阿里巴巴面向全球开发者推出的 Agentic 编程平台，支持 VS Code 插件和 JetBrains 插件两种形态。Qoder 具备仓库级代码理解、智能模型路由、Quest 规格驱动开发等特性，支持 MCP 协议接入外部工具。\n\n---\n\n## 准备工作\n\n1. **安装 Qoder** — 前往 [qoder.ai](https://qoder.ai) 下载，或在 VS Code / JetBrains 扩展市场搜索 \"Qoder\" 安装插件\n2. **Node.js >= 20** — 运行 `node --version` 确认版本，低于 20 请前往 [nodejs.org](https://nodejs.org) 升级\n3. **获取问卷星 API Key** — 微信扫码登录 [API Key 获取页](https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1)，登录后页面直接显示 API Key\n\n---\n\n## 第一步：接入 MCP Server\n\n在 Qoder 的 MCP 配置中添加问卷星服务器：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"command\": \"npx\",\n      \"args\": [\"wjx-mcp-server\"],\n      \"env\": {\n        \"WJX_API_KEY\": \"替换为你的 API Key\"\n      }\n    }\n  }\n}\n```\n\n> Qoder 的 MCP 配置路径请参阅 [Qoder 官方文档](https://qoder.ai/docs)，配置方式可能因版本更新而变化。\n\n### 企业用户\n\n如需管理通讯录，在 `env` 中额外添加 `\"WJX_CORP_ID\": \"你的企业通讯录 ID\"`。\n\n### HTTP 远程模式\n\n团队部署了远程 MCP 服务时：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"url\": \"http://your-server:3000/mcp\",\n      \"headers\": {\n        \"Authorization\": \"Bearer your-token\"\n      }\n    }\n  }\n}\n```\n\n---\n\n## 第二步：部署 Agent + Skill（推荐）\n\nwjx-ai-kit 提供 2 个专家 Agent 和配套 Skill 参考文档，让 AI 理解问卷领域的专业知识。\n\n### 一键安装\n\n```bash\nnpx wjx-cli skill install\n```\n\n> 也可从 [Vercel Agent Skills](https://skills.sh/wjxcom/wjx-ai-kit) 安装：`npx skills add wjxcom/wjx-ai-kit`，或在 [ClawHub](https://clawhub.ai/skills?q=wjx) 市场搜索 \"wjx\" 安装。\n\n这条命令会自动完成：\n- 创建 `.claude/agents/` 目录，部署 2 个专家 Agent（wjx-mcp-expert、wjx-cli-expert）\n- 复制 `wjx-skills/` 参考文档目录（DSL 语法、题型编码、分析方法等）\n\n安装后的目录结构：\n\n```\nyour-project/\n├── .claude/agents/\n│   ├── wjx-mcp-expert.md    # MCP 工具专家\n│   └── wjx-cli-expert.md    # CLI 命令专家\n└── wjx-skills/\n    ├── wjx-mcp-use/          # MCP 使用技巧\n    │   ├── SKILL.md\n    │   └── references/\n    └── wjx-cli-use/          # CLI 使用技巧\n        ├── SKILL.md\n        └── references/\n```\n\n### Qoder 记忆/规则增强\n\nQoder 支持记忆系统和规则文件。将 Skill 中的关键内容加入 Qoder 的上下文配置：\n\n```\n# 问卷星集成\n\n本项目使用 wjx-ai-kit 管理问卷调研。\n\n## MCP 工具使用规范\n- 创建问卷：优先使用 create_survey_by_text（DSL 文本模式）\n- 数据分析：先用 query_responses 获取数据，再用 calculate_nps / calculate_csat 分析\n- 通讯录操作：使用 add_contacts 批量导入，query_contacts 查询验证\n\n## DSL 语法要点\n- 第一行为问卷标题，=== 分隔描述\n- 题型标签：[单选题] [多选题] [填空题] [量表题] [矩阵量表题] [下拉框]\n- 量表范围：1~5 或 0~10\n```\n\n### Skill zip 手动安装\n\n如果无法使用 npm，可下载 Skill 包手动安装：\n\n1. 下载 [wjx-cli-use-skill-latest.zip](https://pubdz.paperol.cn/wjx-ai-kit/skills/wjx-cli-use-skill-latest.zip)\n2. 解压到 AI 工具的技能目录（或当前项目目录下）\n3. 安装 CLI 并配置 API Key：\n   ```bash\n   npm install -g wjx-cli\n   wjx init\n   ```\n\n详见 [Skill 包入门指南](./skill-getting-started.md)。\n\n---\n\n## 第三步：安装 CLI（可选）\n\nwjx-cli 提供 69 个子命令，适合批量操作和自动化脚本：\n\n```bash\n# 安装\nnpm install -g wjx-cli\n\n# 配置 API Key\nwjx init\n\n# 环境检查\nwjx doctor\n\n# 试试看\nwjx survey list\n```\n\nCLI 输出结构化 JSON，可与 AI 工具配合使用。例如：\n\n```bash\n# 查询答卷并分析 NPS\nwjx response query --vid 12345 --page_size 100\nwjx analytics nps --scores 9,10,7,3,8\n```\n\n---\n\n## 第四步：验证\n\n在 Qoder 的对话中输入：\n\n> 帮我创建一份客户满意度调查问卷\n\n如果一切正常，Qoder 会调用问卷星 MCP 工具，自动创建问卷并返回编辑链接。\n\n---\n\n## 典型场景\n\n### 场景 1: 创建调研问卷\n\n> 你：帮我创建一份员工满意度调查问卷，包含 NPS 评分题、工作环境满意度（5 级量表）和开放反馈\n>\n> AI 自动：读取 DSL 语法 → 生成问卷结构 → 调用 create_survey_by_text → 返回编辑链接\n\n### 场景 2: 分析数据\n\n> 你：分析最近一次客户满意度调查的 NPS 得分\n>\n> AI 自动：query_responses 获取数据 → calculate_nps 计算 → 给出推荐人/中立/贬损分布\n\n### 场景 3: Quest 模式 + 问卷\n\n> 你：用 Quest 模式为我的项目规划一套用户调研方案\n>\n> Qoder 先生成调研规格文档 → 拆解为多份问卷任务 → 逐个调用 MCP 工具创建 → 汇总链接\n\n---\n\n## 常见问题\n\n### Qoder 和通义灵码有什么区别？\n\n通义灵码（Lingma）面向国内市场，定位是代码补全和问答助手。Qoder 面向海外市场，定位是 Agentic 编程平台，支持更复杂的自主任务执行。两者都支持 MCP。\n\n### Qoder 的 MCP 配置在哪里？\n\nQoder 的 MCP 配置入口可能随版本更新变化，请参阅 [Qoder 官方文档](https://qoder.ai/docs) 获取最新信息。\n\n---\n\n## 下一步\n\n- [MCP Server 入门指南](./mcp-getting-started.md) — 了解 56 个工具的完整能力\n- [wjx-ai-kit 总览](./00-overview.md) — 了解 SDK、MCP、CLI 三合一架构\n","setup-trae":"# 在 Trae 中使用问卷星\n\n> 在 Trae 中用自然语言创建问卷、分析数据、管理通讯录\n\n---\n\n## 准备工作\n\n1. **安装 Trae** — 前往 [trae.ai](https://trae.ai) 下载并安装（字节跳动出品的 AI IDE，基于 VS Code）\n2. **Node.js >= 20** — 运行 `node --version` 确认版本，低于 20 请前往 [nodejs.org](https://nodejs.org) 升级\n3. **获取问卷星 API Key** — 微信扫码登录 [API Key 获取页](https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1)，登录后页面直接显示 API Key\n\n---\n\n## 第一步：接入 MCP Server\n\n### 通过设置界面配置\n\n1. 打开 Trae Settings\n2. 进入 **AI Features** → **MCP**\n3. 添加新的 MCP Server，填入以下配置：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"command\": \"npx\",\n      \"args\": [\"wjx-mcp-server\"],\n      \"env\": {\n        \"WJX_API_KEY\": \"替换为你的 API Key\"\n      }\n    }\n  }\n}\n```\n\n### 企业用户\n\n如需管理通讯录，在 `env` 中额外添加 `\"WJX_CORP_ID\": \"你的企业通讯录 ID\"`。\n\n### HTTP 远程模式\n\n团队部署了远程 MCP 服务时：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"url\": \"http://your-server:3000/mcp\",\n      \"headers\": {\n        \"Authorization\": \"Bearer your-token\"\n      }\n    }\n  }\n}\n```\n\n---\n\n## 第二步：部署 Agent + Skill（推荐）\n\nwjx-ai-kit 提供 2 个专家 Agent 和配套 Skill 参考文档，让 AI 理解问卷领域的专业知识。\n\n### 一键安装\n\n```bash\nnpx wjx-cli skill install\n```\n\n> 也可从 [Vercel Agent Skills](https://skills.sh/wjxcom/wjx-ai-kit) 安装：`npx skills add wjxcom/wjx-ai-kit`，或在 [ClawHub](https://clawhub.ai/skills?q=wjx) 市场搜索 \"wjx\" 安装。\n\n这条命令会自动完成：\n- 创建 `.claude/agents/` 目录，部署 2 个专家 Agent（wjx-mcp-expert、wjx-cli-expert）\n- 复制 `wjx-skills/` 参考文档目录（DSL 语法、题型编码、分析方法等）\n\n安装后的目录结构：\n\n```\nyour-project/\n├── .claude/agents/\n│   ├── wjx-mcp-expert.md    # MCP 工具专家\n│   └── wjx-cli-expert.md    # CLI 命令专家\n└── wjx-skills/\n    ├── wjx-mcp-use/          # MCP 使用技巧\n    │   ├── SKILL.md\n    │   └── references/\n    └── wjx-cli-use/          # CLI 使用技巧\n        ├── SKILL.md\n        └── references/\n```\n\n### Trae Rules 增强\n\nTrae 支持 Rules 文件注入项目级上下文。将 Skill 中的关键内容写入 Trae Rules：\n\n```\n# 问卷星集成\n\n本项目使用 wjx-ai-kit 管理问卷调研。\n\n## MCP 工具使用规范\n- 创建问卷：优先使用 create_survey_by_text（DSL 文本模式）\n- 数据分析：先用 query_responses 获取数据，再用 calculate_nps / calculate_csat 分析\n- 通讯录操作：使用 add_contacts 批量导入，query_contacts 查询验证\n\n## DSL 语法要点\n- 第一行为问卷标题，=== 分隔描述\n- 题型标签：[单选题] [多选题] [填空题] [量表题] [矩阵量表题] [下拉框]\n- 量表范围：1~5 或 0~10\n```\n\n### Skill zip 手动安装\n\n如果无法使用 npm，可下载 Skill 包手动安装：\n\n1. 下载 [wjx-cli-use-skill-latest.zip](https://pubdz.paperol.cn/wjx-ai-kit/skills/wjx-cli-use-skill-latest.zip)\n2. 解压到 AI 工具的技能目录（或当前项目目录下）\n3. 安装 CLI 并配置 API Key：\n   ```bash\n   npm install -g wjx-cli\n   wjx init\n   ```\n\n详见 [Skill 包入门指南](./skill-getting-started.md)。\n\n---\n\n## 第三步：安装 CLI（可选）\n\nwjx-cli 提供 69 个子命令，适合批量操作和自动化脚本：\n\n```bash\n# 安装\nnpm install -g wjx-cli\n\n# 配置 API Key\nwjx init\n\n# 环境检查\nwjx doctor\n\n# 试试看\nwjx survey list\n```\n\nCLI 输出结构化 JSON，可与 AI 工具配合使用。例如：\n\n```bash\n# 查询答卷并分析 NPS\nwjx response query --vid 12345 --page_size 100\nwjx analytics nps --scores 9,10,7,3,8\n```\n\n---\n\n## 第四步：验证\n\n在 Trae 的 AI 对话中输入：\n\n> 帮我创建一份客户满意度调查问卷\n\n如果一切正常，Trae 会调用问卷星工具，自动创建问卷并返回编辑链接。\n\n---\n\n## 典型场景\n\n### 场景 1: 创建调研问卷\n\n> 你：帮我创建一份员工满意度调查问卷，包含 NPS 评分题、工作环境满意度（5 级量表）和开放反馈\n>\n> AI 自动：读取 DSL 语法 → 生成问卷结构 → 调用 create_survey_by_text → 返回编辑链接\n\n### 场景 2: 分析数据\n\n> 你：分析最近一次客户满意度调查的 NPS 得分\n>\n> AI 自动：query_responses 获取数据 → calculate_nps 计算 → 给出推荐人/中立/贬损分布\n\n### 场景 3: 批量管理\n\n> 你：把这份 Excel 名单导入通讯录的\"市场部\"分组\n>\n> AI 自动：读取文件 → add_contacts 批量导入 → query_contacts 验证\n\n---\n\n## 常见问题\n\n### Trae 中看不到 MCP 工具？\n\n1. 确认已在 AI Features → MCP 中正确配置\n2. 确认 JSON 格式正确（没有尾逗号）\n3. 重启 Trae\n\n### Trae 和 VS Code 的 MCP 配置一样吗？\n\nTrae 基于 VS Code，MCP 配置格式基本一致，但配置入口在 Trae 自己的设置界面中。具体路径请参考 Trae 官方文档。\n\n---\n\n## 下一步\n\n- [MCP Server 入门指南](./mcp-getting-started.md) — 了解 56 个工具的完整能力\n- [wjx-ai-kit 总览](./00-overview.md) — 了解 SDK、MCP、CLI 三合一架构\n","setup-windsurf":"# 在 Windsurf 中使用问卷星\n\n> 在 Windsurf 中用自然语言创建问卷、分析数据、管理通讯录\n\n---\n\n## 准备工作\n\n1. **安装 Windsurf** — 前往 [windsurf.com](https://windsurf.com) 下载并安装（Codeium 出品的 AI IDE）\n2. **Node.js >= 20** — 运行 `node --version` 确认版本，低于 20 请前往 [nodejs.org](https://nodejs.org) 升级\n3. **获取问卷星 API Key** — 微信扫码登录 [API Key 获取页](https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1)，登录后页面直接显示 API Key\n\n---\n\n## 第一步：接入 MCP Server\n\n### 全局配置\n\n编辑全局配置文件 `~/.codeium/windsurf/mcp_config.json`：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"command\": \"npx\",\n      \"args\": [\"wjx-mcp-server\"],\n      \"env\": {\n        \"WJX_API_KEY\": \"替换为你的 API Key\"\n      }\n    }\n  }\n}\n```\n\n### 项目级配置\n\n如果只想在特定项目中启用，在项目根目录创建 `.windsurf/mcp.json`：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"command\": \"npx\",\n      \"args\": [\"wjx-mcp-server\"],\n      \"env\": {\n        \"WJX_API_KEY\": \"替换为你的 API Key\"\n      }\n    }\n  }\n}\n```\n\n### 企业用户\n\n如需管理通讯录，在 `env` 中额外添加 `\"WJX_CORP_ID\": \"你的企业通讯录 ID\"`。\n\n### HTTP 远程模式\n\n团队部署了远程 MCP 服务时：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"url\": \"http://your-server:3000/mcp\",\n      \"headers\": {\n        \"Authorization\": \"Bearer your-token\"\n      }\n    }\n  }\n}\n```\n\n---\n\n## 第二步：部署 Agent + Skill（推荐）\n\nwjx-ai-kit 提供 2 个专家 Agent 和配套 Skill 参考文档，让 AI 理解问卷领域的专业知识。\n\n### 一键安装\n\n```bash\nnpx wjx-cli skill install\n```\n\n> 也可从 [Vercel Agent Skills](https://skills.sh/wjxcom/wjx-ai-kit) 安装：`npx skills add wjxcom/wjx-ai-kit`，或在 [ClawHub](https://clawhub.ai/skills?q=wjx) 市场搜索 \"wjx\" 安装。\n\n这条命令会自动完成：\n- 创建 `.claude/agents/` 目录，部署 2 个专家 Agent（wjx-mcp-expert、wjx-cli-expert）\n- 复制 `wjx-skills/` 参考文档目录（DSL 语法、题型编码、分析方法等）\n\n安装后的目录结构：\n\n```\nyour-project/\n├── .claude/agents/\n│   ├── wjx-mcp-expert.md    # MCP 工具专家\n│   └── wjx-cli-expert.md    # CLI 命令专家\n└── wjx-skills/\n    ├── wjx-mcp-use/          # MCP 使用技巧\n    │   ├── SKILL.md\n    │   └── references/\n    └── wjx-cli-use/          # CLI 使用技巧\n        ├── SKILL.md\n        └── references/\n```\n\n### Windsurf Rules 增强\n\nWindsurf 使用 Cascade AI 作为核心引擎，支持 Rules 文件注入项目级上下文。你可以将 Skill 中的关键内容写入 Windsurf Rules 文件：\n\n在项目中创建 `.windsurf/rules.md`：\n\n```\n# 问卷星集成\n\n本项目使用 wjx-ai-kit 管理问卷调研。\n\n## MCP 工具使用规范\n- 创建问卷：优先使用 create_survey_by_text（DSL 文本模式）\n- 数据分析：先用 query_responses 获取数据，再用 calculate_nps / calculate_csat 分析\n- 通讯录操作：使用 add_contacts 批量导入，query_contacts 查询验证\n\n## DSL 语法要点\n- 第一行为问卷标题，=== 分隔描述\n- 题型标签：[单选题] [多选题] [填空题] [量表题] [矩阵量表题] [下拉框]\n- 量表范围：1~5 或 0~10\n```\n\nCascade 会在每次对话中自动加载这些规则。\n\n### Skill zip 手动安装\n\n如果无法使用 npm，可下载 Skill 包手动安装：\n\n1. 下载 [wjx-cli-use-skill-latest.zip](https://pubdz.paperol.cn/wjx-ai-kit/skills/wjx-cli-use-skill-latest.zip)\n2. 解压到 AI 工具的技能目录（或当前项目目录下）\n3. 安装 CLI 并配置 API Key：\n   ```bash\n   npm install -g wjx-cli\n   wjx init\n   ```\n\n详见 [Skill 包入门指南](./skill-getting-started.md)。\n\n---\n\n## 第三步：安装 CLI（可选）\n\nwjx-cli 提供 69 个子命令，适合批量操作和自动化脚本：\n\n```bash\n# 安装\nnpm install -g wjx-cli\n\n# 配置 API Key\nwjx init\n\n# 环境检查\nwjx doctor\n\n# 试试看\nwjx survey list\n```\n\nCLI 输出结构化 JSON，可与 AI 工具配合使用。例如：\n\n```bash\n# 查询答卷并分析 NPS\nwjx response query --vid 12345 --page_size 100\nwjx analytics nps --scores 9,10,7,3,8\n```\n\n---\n\n## 第四步：验证\n\n在 Windsurf 的 Cascade 对话中输入：\n\n> 帮我创建一份客户满意度调查问卷\n\n如果一切正常，Cascade 会调用问卷星工具，自动创建问卷并返回编辑链接。\n\n---\n\n## 典型场景\n\n### 场景 1: 创建调研问卷\n\n> 你：帮我创建一份员工满意度调查问卷，包含 NPS 评分题、工作环境满意度（5 级量表）和开放反馈\n>\n> AI 自动：读取 DSL 语法 → 生成问卷结构 → 调用 create_survey_by_text → 返回编辑链接\n\n### 场景 2: 分析数据\n\n> 你：分析最近一次客户满意度调查的 NPS 得分\n>\n> AI 自动：query_responses 获取数据 → calculate_nps 计算 → 给出推荐人/中立/贬损分布\n\n### 场景 3: 批量管理\n\n> 你：把这份 Excel 名单导入通讯录的\"市场部\"分组\n>\n> AI 自动：读取文件 → add_contacts 批量导入 → query_contacts 验证\n\n---\n\n## 常见问题\n\n### Cascade 中看不到问卷星工具？\n\n1. 确认配置文件路径正确（全局 `~/.codeium/windsurf/mcp_config.json` 或项目级 `.windsurf/mcp.json`）\n2. 确认 JSON 格式正确\n3. 重启 Windsurf\n\n### 全局配置和项目配置哪个优先？\n\n项目级配置优先于全局配置。如果两处都配置了 `wjx`，以项目级为准。\n\n### Windsurf 和 Cursor 的配置有什么区别？\n\n配置格式基本相同，主要区别在配置文件路径。Windsurf 的全局配置在 `~/.codeium/windsurf/` 目录下。\n\n---\n\n## 下一步\n\n- [MCP Server 入门指南](./mcp-getting-started.md) — 了解 56 个工具的完整能力\n- [wjx-ai-kit 总览](./00-overview.md) — 了解 SDK、MCP、CLI 三合一架构\n","setup-workbench":"# 在 AI 工作台中使用问卷星\n\n> AI 工作台的问卷星配置总览——Manus、WorkBuddy、QoderWork 等桌面智能体平台\n\n---\n\n## 工作台生态概览\n\nAI 工作台是一类桌面级智能体平台，能自主规划并执行多步骤任务。与 IDE 插件型工具不同，工作台更侧重任务交付而非代码编辑，适合非开发者使用。\n\n| 工具 | 厂商 | 特点 | 备注 |\n|------|------|------|------|\n| **Manus** | 蝴蝶效应 (Monica 团队) | 通用 AI Agent，自主交付复杂任务 | 支持 MCP 工具接入 |\n| **WorkBuddy** | 腾讯 | AI Agent 桌面工作台，CodeBuddy 生态 | 支持 MCP 协议 |\n| **QoderWork** | 阿里巴巴 | 桌面级通用智能体助手，Qoder 生态 | 支持 MCP 协议 |\n\n---\n\n## 准备工作\n\n1. **安装你选择的工作台工具** — 前往对应官网下载安装\n   - Manus: [manus.im](https://manus.im)\n   - WorkBuddy: [copilot.tencent.com/work](https://copilot.tencent.com/work)\n   - QoderWork: [qoder.com/zh/qoderwork](https://qoder.com/zh/qoderwork)\n2. **Node.js >= 20** — 运行 `node --version` 确认版本\n3. **获取问卷星 API Key** — 微信扫码登录 [API Key 获取页](https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1)，登录后页面直接显示 API Key\n\n---\n\n## 第一步：接入 MCP Server\n\n在工作台的 MCP / 工具配置中添加问卷星服务器：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"command\": \"npx\",\n      \"args\": [\"wjx-mcp-server\"],\n      \"env\": {\n        \"WJX_API_KEY\": \"替换为你的 API Key\"\n      }\n    }\n  }\n}\n```\n\n> 各工作台的 MCP 配置入口不同，请参阅对应工具的官方文档。\n\n### 各工具配置入口\n\n- **Manus**: 在 Agent Skills / Tools 设置中添加 MCP 服务器\n- **WorkBuddy**: 在工具/插件配置面板中添加 MCP 连接\n- **QoderWork**: 在设置 → MCP 配置中添加（与 Qoder IDE 插件共享配置）\n\n### 企业用户\n\n如需管理通讯录，在 `env` 中额外添加 `\"WJX_CORP_ID\": \"你的企业通讯录 ID\"`。\n\n### HTTP 远程模式\n\n团队部署了远程 MCP 服务时：\n\n```json\n{\n  \"mcpServers\": {\n    \"wjx\": {\n      \"url\": \"http://your-server:3000/mcp\",\n      \"headers\": {\n        \"Authorization\": \"Bearer your-token\"\n      }\n    }\n  }\n}\n```\n\n---\n\n## 第二步：部署 Agent + Skill（推荐）\n\nwjx-ai-kit 提供 2 个专家 Agent 和配套 Skill 参考文档，让 AI 理解问卷领域的专业知识。\n\n### 一键安装\n\n```bash\nnpx wjx-cli skill install\n```\n\n> 也可从 [Vercel Agent Skills](https://skills.sh/wjxcom/wjx-ai-kit) 安装：`npx skills add wjxcom/wjx-ai-kit`，或在 [ClawHub](https://clawhub.ai/skills?q=wjx) 市场搜索 \"wjx\" 安装。\n\n这条命令会自动完成：\n- 创建 `.claude/agents/` 目录，部署 2 个专家 Agent（wjx-mcp-expert、wjx-cli-expert）\n- 复制 `wjx-skills/` 参考文档目录（DSL 语法、题型编码、分析方法等）\n\n安装后的目录结构：\n\n```\nyour-project/\n├── .claude/agents/\n│   ├── wjx-mcp-expert.md    # MCP 工具专家\n│   └── wjx-cli-expert.md    # CLI 命令专家\n└── wjx-skills/\n    ├── wjx-mcp-use/          # MCP 使用技巧\n    │   ├── SKILL.md\n    │   └── references/\n    └── wjx-cli-use/          # CLI 使用技巧\n        ├── SKILL.md\n        └── references/\n```\n\n如果你的工作台支持 Rules 或指令文件，可以将 `wjx-skills/` 中的关键内容写入，提升 AI 操作问卷星的准确度。\n\n### Skill zip 手动安装\n\n如果无法使用 npm，可下载 Skill 包手动安装：\n\n1. 下载 [wjx-cli-use-skill-latest.zip](https://pubdz.paperol.cn/wjx-ai-kit/skills/wjx-cli-use-skill-latest.zip)\n2. 解压到工作台的技能目录（或当前项目目录下）\n3. 安装 CLI 并配置 API Key：\n   ```bash\n   npm install -g wjx-cli\n   wjx init\n   ```\n\n详见 [Skill 包入门指南](./skill-getting-started.md)。\n\n---\n\n## 第三步：安装 CLI（可选）\n\nwjx-cli 提供 69 个子命令，适合批量操作和自动化脚本：\n\n```bash\n# 安装\nnpm install -g wjx-cli\n\n# 配置 API Key\nwjx init\n\n# 环境检查\nwjx doctor\n\n# 试试看\nwjx survey list\n```\n\nCLI 输出结构化 JSON，可与工作台配合使用。例如：\n\n```bash\n# 查询答卷并分析 NPS\nwjx response query --vid 12345 --page_size 100\nwjx analytics nps --scores 9,10,7,3,8\n```\n\n---\n\n## 第四步：验证\n\n在你的工作台中输入：\n\n> 帮我创建一份客户满意度调查问卷\n\n如果一切正常，AI 会调用问卷星 MCP 工具，自动创建问卷并返回编辑链接。\n\n---\n\n## 典型场景\n\n### 场景 1: 创建调研问卷\n\n> 你：帮我创建一份员工满意度调查问卷，包含 NPS 评分题、工作环境满意度（5 级量表）和开放反馈\n>\n> AI 自动：读取 DSL 语法 → 生成问卷结构 → 调用 create_survey_by_text → 返回编辑链接\n\n### 场景 2: 分析数据\n\n> 你：分析最近一次客户满意度调查的 NPS 得分\n>\n> AI 自动：query_responses 获取数据 → calculate_nps 计算 → 给出推荐人/中立/贬损分布\n\n### 场景 3: 自主完成多步骤任务（工作台优势）\n\n> 你：为下周的产品发布会准备调研方案——会前期望调查、会���实时反馈、会后满意度评估\n>\n> AI 自动规划三份问卷 → 逐一设计并创建 → 汇总所有链接和操作说明\n\n---\n\n## 常见问题\n\n### 我用的工作台工具不在列表中？\n\n只要你的工作台支持 MCP 协议，就可以参照上方的标准配置接入问卷星。如遇到问题，请在 [GitHub Issues](https://github.com/wjxcom/wjx-ai-kit/issues) 反馈。\n\n### 工作台和 IDE 插件有什么区别？\n\n- **工作台**（Manus、WorkBuddy、QoderWork）：侧重任务交付，AI 自主规划和执行，适合非开发者\n- **IDE 插件**（Cursor、Windsurf、Cline 等）：侧重代码编写，AI 辅助开发，适合开发者\n\n两者都支持 MCP，问卷星功能一致。\n\n### QoderWork 和 Qoder IDE 插件是什么关系？\n\nQoder IDE 插件面向开发者，嵌入 VS Code / JetBrains。QoderWork 是独立桌面应用，面向更广泛用户。两者同属 Qoder 生态，MCP 配置方式相同。详见 [Qoder 配置指南](./setup-qoder.md)。\n\n---\n\n## 下一步\n\n- [MCP Server 入门指南](./mcp-getting-started.md) — 了解 56 个工具的完整能力\n- [wjx-ai-kit 总览](./00-overview.md) — 了解 SDK、MCP、CLI 三合一架构\n","skill-getting-started":"# Skill 包入门指南\r\n\r\n> 下载一个文件夹，运行一个脚本，你的 AI 助手就能操作问卷星了。\r\n\r\n---\r\n\r\n## 什么是问卷星 Skill\r\n\r\nSkill 是一种让 AI 助手获得特定能力的方式。问卷星 Skill 包含：\r\n\r\n- **SKILL.md** -- AI 读取的使用指南，告诉它怎么操作问卷星\r\n- **references/** -- 详细参考文档，AI 按需查阅\r\n- **setup.sh** -- 一键安装脚本\r\n- **examples/** -- DSL 示例文件，可直接用于创建问卷\r\n\r\n安装后，你对 AI 说 \"帮我创建一份问卷\"，它就知道该怎么做了。\r\n\r\n---\r\n\r\n## 三种接入方式对比\r\n\r\n| | MCP Server | Skill 包 | CLI |\r\n|---|---|---|---|\r\n| **适合谁** | 所有 AI 工具用户 | Claw 系列 / 不想配 MCP 的用户 | 命令行 / 自动化脚本用户 |\r\n| **能力** | 56 个工具 + AI 自动调用 | AI 读取指南 + 调用 CLI 命令 | 69 个子命令 |\r\n| **安装** | 一行 npx 命令 | 下载 zip + `setup.sh` | `npm install -g wjx-cli` |\r\n| **配置复杂度** | 低 | 最低 | 最低 |\r\n| **适合的 AI 工具** | Claude/Cursor/Windsurf/Cline/... | OpenClaw/KimiClaw/QClaw/... | 任何有终端的环境 |\r\n\r\n**推荐**：\r\n- 如果你的 AI 工具支持 MCP，优先用 MCP Server（能力最强）\r\n- 如果你用 Claw 系列工具或想要最简安装，用 Skill 包\r\n- 如果你主要做自动化脚本，直接用 CLI\r\n\r\n---\r\n\r\n## 快速开始：安装 Skill 包\r\n\r\n### 第一步：下载\r\n\r\n下载最新 Skill 包并解压：\r\n\r\n```bash\r\n# 下载最新版\r\ncurl -L -o wjx-cli-use-skill-latest.zip https://pubdz.paperol.cn/wjx-ai-kit/skills/wjx-cli-use-skill-latest.zip\r\nunzip wjx-cli-use-skill-latest.zip\r\n```\r\n\r\n也可以直接在浏览器打开 [下载链接](https://pubdz.paperol.cn/wjx-ai-kit/skills/wjx-cli-use-skill-latest.zip) 下载。\r\n\r\n如果已安装 wjx-cli，也可用命令安装：\r\n\r\n```bash\r\nwjx skill install\r\n```\r\n\r\n### 第二步：安装\r\n\r\n```bash\r\ncd wjx-cli-use\r\nbash setup.sh -y\r\n```\r\n\r\n脚本会自动完成 5 步：\r\n1. 检测 Node.js 20+（未安装会提示安装指引）\r\n2. 安装 wjx-cli 命令行工具\r\n3. 打开浏览器，微信扫码登录问卷星获取 API Key\r\n4. 运行 `wjx init` 粘贴 API Key\r\n5. 运行 `wjx doctor` 验证连接\r\n\r\n### 第三步：在 AI 工具中启用\r\n\r\n根据你使用的 AI 工具，将 Skill 目录添加到对应位置：\r\n\r\n**OpenClaw / KimiClaw / QClaw / LinClaw**：\r\n在工具的 Skills/技能 设置中，添加 `wjx-cli-use` 目录路径。\r\n\r\n**Claude Code**：\r\n```bash\r\nwjx skill install   # 自动安装到 .claude/agents/\r\n```\r\n\r\n**其他工具**：\r\n将 `SKILL.md` 的内容添加到工具的系统提示或 Rules 文件中。\r\n\r\n### 第四步：开始使用\r\n\r\n对 AI 说：\r\n\r\n> \"帮我创建一份客户满意度调查，包含 NPS 评分题和 5 个维度的量表题\"\r\n\r\n或者更简单：\r\n\r\n> \"帮我做个问卷\"\r\n\r\nAI 会自动调用 `wjx` 命令创建问卷，返回编辑链接和填写链接。\r\n\r\n---\r\n\r\n## 其他安装选项\r\n\r\n```bash\r\nbash setup.sh          # 交互式安装（逐步确认）\r\nbash setup.sh -c       # 仅检查环境，不安装\r\nbash setup.sh -v       # 验证已有安装是否完整\r\nbash setup.sh -h       # 显示帮助\r\n```\r\n\r\n---\r\n\r\n## 环境要求\r\n\r\n- **Node.js >= 20**（[下载](https://nodejs.org)）\r\n- **问卷星账号**（微信扫码即可注册登录）\r\n- 支持系统：macOS、Linux、Windows\r\n\r\n---\r\n\r\n## 与 MCP Server 的关系\r\n\r\n```\r\n┌──────────────────────────────────────┐\r\n│          你的 AI 助手                 │\r\n├──────────┬───────────────────────────┤\r\n│ Skill 包  │     MCP Server           │\r\n│ (读 SKILL.md │  (56 个工具直接调用)     │\r\n│  调 wjx 命令) │                        │\r\n├──────────┴───────────────────────────┤\r\n│           wjx-cli (69 子命令)         │\r\n├──────────────────────────────────────┤\r\n│           wjx-api-sdk (基础层)        │\r\n├──────────────────────────────────────┤\r\n│           问卷星 OpenAPI              │\r\n└──────────────────────────────────────┘\r\n```\r\n\r\n- **Skill 包**：AI 读取 SKILL.md 学会用法，通过 `wjx` CLI 命令操作问卷星\r\n- **MCP Server**：AI 通过 MCP 协议直接调用 56 个工具，不需要命令行\r\n\r\n两者底层都走 `wjx-api-sdk`，能力一致。MCP Server 的工具调用更高效，Skill 包的安装更简单。\r\n\r\n---\r\n\r\n## 常见问题\r\n\r\n**Q: 我需要同时装 MCP Server 和 Skill 包吗？**\r\n\r\n不需要。选一种就行。如果你的 AI 工具支持 MCP，推荐用 MCP Server。\r\n\r\n**Q: setup.sh 报错 \"Node.js 版本过低\" 怎么办？**\r\n\r\n需要 Node.js 20 以上。访问 [nodejs.org](https://nodejs.org) 下载最新 LTS 版本，或用包管理器升级：\r\n```bash\r\n# macOS\r\nbrew install node\r\n# Ubuntu\r\ncurl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - && sudo apt-get install -y nodejs\r\n```\r\n\r\n**Q: 无法打开浏览器获取 API Key 怎么办？**\r\n\r\n在没有桌面环境的服务器上，脚本会打印链接。复制链接到本机浏览器打开，微信扫码登录后获取 API Key。\r\n\r\n**Q: API Key 在哪里找？**\r\n\r\n打开 [这个链接](https://www.wjx.cn/weixinlogin.aspx?redirecturl=%2Fnewwjx%2Fmanage%2Fuserinfo.aspx%3FshowApiKey%3D1)，微信扫码登录后直接显示。\r\n\r\n---\r\n\r\n## 深入了解\r\n\r\n- [MCP Server 入门指南](./mcp-getting-started.md) -- 用 MCP 接入更多 AI 工具\r\n- [CLI 入门指南](./cli-getting-started.md) -- 命令行完整用法\r\n- [SDK 入门指南](./sdk-getting-started.md) -- TypeScript 开发集成\r\n- [总纲](./00-overview.md) -- 功能全景和选择引导\r\n"};

// ===== 菜单定义 =====
var MENU = [{"group":"总览","items":[{"key":"00-overview","label":"总纲"}]},{"group":"入门指南","items":[{"key":"mcp-getting-started","label":"MCP Server 入门"},{"key":"cli-getting-started","label":"CLI 入门"},{"key":"sdk-getting-started","label":"SDK 入门"},{"key":"skill-getting-started","label":"Skill 包入门"}]},{"group":"进阶指南","items":[{"key":"mcp-advanced","label":"MCP Server 进阶"},{"key":"cli-advanced","label":"CLI 进阶"},{"key":"sdk-advanced","label":"SDK 进阶"}]},{"group":"AI 工具配置","collapsed":true,"items":[{"key":"setup-claude-code","label":"Claude Code"},{"key":"setup-claude-desktop","label":"Claude Desktop"},{"key":"setup-cursor","label":"Cursor"},{"key":"setup-windsurf","label":"Windsurf"},{"key":"setup-cline","label":"Cline"},{"key":"setup-copilot","label":"GitHub Copilot"},{"key":"setup-trae","label":"Trae"},{"key":"setup-gemini","label":"Gemini Code Assist"},{"key":"setup-claw","label":"Claw 系列"},{"key":"setup-openclaw","label":"OpenClaw"},{"key":"setup-qoder","label":"Qoder"},{"key":"setup-workbench","label":"AI 工作台"}]}];

// ===== 初始化 =====
(function() {
  // marked 配置
  marked.setOptions({
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
      }
      return code;
    },
    breaks: false,
    gfm: true
  });

  // 自定义 renderer：将 md 内部链接转为 hash 路由
  var renderer = new marked.Renderer();
  renderer.link = function(href, title, text) {
    if (typeof href === "object") {
      var token = href;
      href = token.href;
      title = token.title;
      text = token.text;
    }
    if (typeof href === "string") {
      var m = href.match(/^\.?\/?([-\w]+)\.md$/);
      if (m && DOCS[m[1]]) {
        return '<a href="#doc=' + m[1] + '">' + (text || m[1]) + '</a>';
      }
    }
    var titleAttr = title ? ' title="' + title + '"' : '';
    return '<a href="' + href + '"' + titleAttr + ' target="_blank" rel="noopener">' + (text || href) + '</a>';
  };
  marked.setOptions({ renderer: renderer });

  // 构建菜单
  var menuEl = document.getElementById("wjxDocsMenu");
  var menuHtml = "";
  MENU.forEach(function(group) {
    var collapsible = group.collapsed ? " collapsible collapsed" : (group.items.length > 5 ? " collapsible" : "");
    var hidden = group.collapsed ? " hidden" : "";
    var arrow = (collapsible || group.items.length > 5) ? ' <span class="arrow">&#9660;</span>' : "";
    menuHtml += '<div class="wjx-docs-nav-group">';
    menuHtml += '<div class="wjx-docs-nav-group-header' + collapsible + '">' + group.group + arrow + '</div>';
    menuHtml += '<div class="wjx-docs-nav-group-items' + hidden + '">';
    group.items.forEach(function(item) {
      menuHtml += '<a class="wjx-docs-nav-item" data-key="' + item.key + '" href="#doc=' + item.key + '">' + item.label + '</a>';
    });
    menuHtml += '</div></div>';
  });
  menuEl.innerHTML = menuHtml;

  // 折叠/展开
  menuEl.querySelectorAll(".wjx-docs-nav-group-header.collapsible").forEach(function(header) {
    header.addEventListener("click", function() {
      this.classList.toggle("collapsed");
      this.nextElementSibling.classList.toggle("hidden");
    });
  });

  // 渲染文档
  var contentEl = document.getElementById("wjxDocsContent");
  function renderDoc(key) {
    var md = DOCS[key];
    if (!md) {
      contentEl.innerHTML = '<div class="wjx-docs-loading">文档未找到: ' + key + '</div>';
      return;
    }
    contentEl.innerHTML = marked.parse(md);
    menuEl.querySelectorAll(".wjx-docs-nav-item").forEach(function(el) {
      el.classList.toggle("active", el.dataset.key === key);
      if (el.classList.contains("active")) {
        var items = el.closest(".wjx-docs-nav-group-items");
        if (items && items.classList.contains("hidden")) {
          items.classList.remove("hidden");
          items.previousElementSibling.classList.remove("collapsed");
        }
      }
    });
    contentEl.scrollIntoView({ behavior: "smooth", block: "start" });
    document.getElementById("wjxDocsNav").classList.remove("open");
    document.getElementById("wjxDocsOverlay").classList.remove("open");
  }

  function getDocFromHash() {
    var m = location.hash.match(/doc=([-\w]+)/);
    return m ? m[1] : "00-overview";
  }

  window.addEventListener("hashchange", function() { renderDoc(getDocFromHash()); });

  document.getElementById("wjxDocsMenuToggle").addEventListener("click", function() {
    document.getElementById("wjxDocsNav").classList.toggle("open");
    document.getElementById("wjxDocsOverlay").classList.toggle("open");
  });
  document.getElementById("wjxDocsOverlay").addEventListener("click", function() {
    document.getElementById("wjxDocsNav").classList.remove("open");
    this.classList.remove("open");
  });

  renderDoc(getDocFromHash());
})();
</script>

</body>
</html>
