<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    
    </defs>

  <rect width="1280" height="720" fill="#FAFAFA"/>

  <rect x="0" y="0" width="1280" height="80" fill="#1F1F1F"/>
  <rect x="80" y="34" width="48" height="3" fill="#C04A3C"/>
  <text x="80" y="62" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="500" fill="#A0A0A0" letter-spacing="3">
    SAMPLE OVERVIEW
  </text>
  <text x="1200" y="62" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#A0A0A0">
    03 / 10
  </text>

  <text x="80" y="170" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="44" font-weight="700" fill="#1F1F1F">
    {{TITLE}}
  </text>
  <text x="80" y="210" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" fill="#6B6B6B">
    数据回收情况一览
  </text>

  <line x1="80" y1="250" x2="1200" y2="250" stroke="#1F1F1F" stroke-opacity="0.12" stroke-width="1"/>

  <g transform="translate(80, 300)">
    <rect width="340" height="220" rx="8" fill="#FAFAFA" stroke="#E0E0E0"/>
    <circle cx="50" cy="50" r="18" fill="#C04A3C" fill-opacity="0.12"/>
    <circle cx="50" cy="50" r="6" fill="#C04A3C"/>
    <text x="90" y="58" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#6B6B6B" letter-spacing="1">回收总量</text>
    <text x="50" y="140" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="64" font-weight="800" fill="#1F1F1F">{{TOTAL}}</text>
    <text x="50" y="185" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" fill="#888888">份答卷</text>
  </g>

  <g transform="translate(470, 300)">
    <rect width="340" height="220" rx="8" fill="#FAFAFA" stroke="#E0E0E0"/>
    <circle cx="50" cy="50" r="18" fill="#2F2F2F" fill-opacity="0.14"/>
    <circle cx="50" cy="50" r="6" fill="#2F2F2F"/>
    <text x="90" y="58" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#6B6B6B" letter-spacing="1">完成率</text>
    <text x="50" y="140" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="64" font-weight="800" fill="#1F1F1F">{{COMPLETION_RATE}}<tspan font-size="36" fill="#2F2F2F">%</tspan></text>
    <text x="50" y="185" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" fill="#888888">{{COMPLETED}} / {{TOTAL}}</text>
  </g>

  <g transform="translate(860, 300)">
    <rect width="340" height="220" rx="8" fill="#FAFAFA" stroke="#E0E0E0"/>
    <circle cx="50" cy="50" r="18" fill="#4A6B5A" fill-opacity="0.16"/>
    <circle cx="50" cy="50" r="6" fill="#4A6B5A"/>
    <text x="90" y="58" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#6B6B6B" letter-spacing="1">平均答题时长</text>
    <text x="50" y="140" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="64" font-weight="800" fill="#1F1F1F">{{AVG_TIME}}</text>
    <text x="50" y="185" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" fill="#888888">秒 / 人</text>
  </g>

  <text x="80" y="600" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#888888" letter-spacing="1">
    数据说明：完成率=有效完成答卷数 / 进入问卷总人数；平均时长仅统计完成答卷的耗时。
  </text>

  <text x="80" y="690" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="13" fill="#888888" letter-spacing="1">
    问卷星 · AI 智能分析报告
  </text>
</svg>
