<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    
    </defs>

  <rect width="1280" height="720" fill="#0F1419"/>

  <rect x="0" y="0" width="1280" height="80" fill="#0F1419"/>
  <rect x="80" y="34" width="48" height="3" fill="#06B6D4"/>
  <text x="80" y="62" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="500" fill="#6B7A95" letter-spacing="3">
    SAMPLE OVERVIEW
  </text>
  <text x="1200" y="62" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#6B7A95">
    03 / 10
  </text>

  <text x="80" y="170" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="44" font-weight="700" fill="#E8ECF1">
    {{TITLE}}
  </text>
  <text x="80" y="210" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" fill="#8896A8">
    数据回收情况一览
  </text>

  <line x1="80" y1="250" x2="1200" y2="250" stroke="#E8ECF1" stroke-opacity="0.12" stroke-width="1"/>

  <g transform="translate(80, 300)">
    <rect width="340" height="220" rx="8" fill="#0F1419" stroke="#2A3142"/>
    <circle cx="50" cy="50" r="18" fill="#06B6D4" fill-opacity="0.12"/>
    <circle cx="50" cy="50" r="6" fill="#06B6D4"/>
    <text x="90" y="58" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#8896A8" letter-spacing="1">回收总量</text>
    <text x="50" y="140" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="64" font-weight="800" fill="#E8ECF1">{{TOTAL}}</text>
    <text x="50" y="185" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" fill="#6B7A95">份答卷</text>
  </g>

  <g transform="translate(470, 300)">
    <rect width="340" height="220" rx="8" fill="#0F1419" stroke="#2A3142"/>
    <circle cx="50" cy="50" r="18" fill="#06B6D4" fill-opacity="0.14"/>
    <circle cx="50" cy="50" r="6" fill="#06B6D4"/>
    <text x="90" y="58" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#8896A8" letter-spacing="1">完成率</text>
    <text x="50" y="140" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="64" font-weight="800" fill="#E8ECF1">{{COMPLETION_RATE}}<tspan font-size="36" fill="#06B6D4">%</tspan></text>
    <text x="50" y="185" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" fill="#6B7A95">{{COMPLETED}} / {{TOTAL}}</text>
  </g>

  <g transform="translate(860, 300)">
    <rect width="340" height="220" rx="8" fill="#0F1419" stroke="#2A3142"/>
    <circle cx="50" cy="50" r="18" fill="#6FB8A1" fill-opacity="0.16"/>
    <circle cx="50" cy="50" r="6" fill="#6FB8A1"/>
    <text x="90" y="58" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#8896A8" letter-spacing="1">平均答题时长</text>
    <text x="50" y="140" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="64" font-weight="800" fill="#E8ECF1">{{AVG_TIME}}</text>
    <text x="50" y="185" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" fill="#6B7A95">秒 / 人</text>
  </g>

  <text x="80" y="600" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#6B7A95" letter-spacing="1">
    数据说明：完成率=有效完成答卷数 / 进入问卷总人数；平均时长仅统计完成答卷的耗时。
  </text>

  <text x="80" y="690" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="13" fill="#6B7A95" letter-spacing="1">
    问卷星 · AI 智能分析报告
  </text>
</svg>
