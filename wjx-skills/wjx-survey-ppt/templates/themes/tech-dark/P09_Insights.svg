<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    
    </defs>

  <rect width="1280" height="720" fill="#0F1419"/>
  <ellipse cx="1100" cy="120" rx="320" ry="200" fill="#0F1419"/>

  <g stroke="#1A2030" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="540" x2="1280" y2="540"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
  </g>

  <rect x="80" y="60" width="48" height="3" fill="#06B6D4"/>
  <text x="80" y="92" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="500" fill="#6B7A95" letter-spacing="3">
    KEY INSIGHTS
  </text>
  <text x="1200" y="92" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#6B7A95">
