    </text>
    <text x="120" y="76" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="500" fill="#1A2030">
      {{TEXT}}
    </text>
  </g>
  {{/INSIGHTS}}

  <text x="80" y="690" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="13" fill="#6A86A8" letter-spacing="1">
