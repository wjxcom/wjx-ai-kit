  </text>

  <text x="80" y="180" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="48" font-weight="700" fill="#1A2030">
    {{TITLE}}
  </text>
  <text x="80" y="220" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" fill="#C9D6EA" opacity="0.85">
