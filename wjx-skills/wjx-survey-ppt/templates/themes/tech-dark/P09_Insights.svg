  </text>

  {{#INSIGHTS}}
  <g transform="translate(80, {{Y_OFFSET}})">
    <rect width="1120" height="100" rx="6" fill="#0F1419" stroke="#1A2030" stroke-opacity="0.12"/>
    <text x="40" y="60" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="42" font-weight="800" fill="#06B6D4" opacity="0.95">
