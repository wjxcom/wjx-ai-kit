<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#FBF6F0"/>

  <!-- 装饰：低透明度浅蓝点缀线 + 圆点（不抢戏） -->
  <g stroke="#C8956D" stroke-opacity="0.20" stroke-width="1" fill="none">
    <path d="M80,220 Q230,170 330,240"/>
    <path d="M950,500 Q1050,440 1160,500"/>
  </g>
  <g fill="#C8956D" fill-opacity="0.40">
    <circle cx="80" cy="220" r="4"/>
    <circle cx="330" cy="240" r="5"/>
    <circle cx="950" cy="500" r="5"/>
    <circle cx="1160" cy="500" r="4"/>
  </g>

  <!-- 顶部 accent 短色块 + 副标 -->
  <rect x="80" y="88" width="96" height="4" fill="#F4A261"/>
  <text x="80" y="132" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="500" fill="#7A5440" letter-spacing="4">
    SURVEY INSIGHTS REPORT
  </text>

  <!-- 大标题 -->
  <text x="80" y="320" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="64" font-weight="700" fill="#3D1F14">
    {{TITLE}}
  </text>

  <!-- 副标 -->
  <text x="80" y="400" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="28" font-weight="400" fill="#7A5440">
    基于 {{TOTAL}} 份有效答卷的数据分析
  </text>

  <!-- 分割线 -->
  <line x1="80" y1="470" x2="1200" y2="470" stroke="#3D1F14" stroke-opacity="0.15" stroke-width="1"/>

  <!-- 元数据三栏 -->
  <g font-family="Microsoft YaHei, PingFang SC, sans-serif" fill="#3D1F14">
    <text x="80" y="540" font-size="16" fill="#7A5440" letter-spacing="2">样本量</text>
    <text x="80" y="590" font-size="36" font-weight="700" fill="#3D1F14">{{TOTAL}}</text>

    <text x="380" y="540" font-size="16" fill="#7A5440" letter-spacing="2">问卷编号</text>
    <text x="380" y="590" font-size="28" font-weight="500" fill="#3D1F14">{{VID}}</text>

    <text x="780" y="540" font-size="16" fill="#7A5440" letter-spacing="2">报告日期</text>
    <text x="780" y="590" font-size="28" font-weight="500" fill="#3D1F14">{{DATE}}</text>
  </g>

  <!-- 底部 footer -->
  <text x="80" y="680" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#9C7A5F" letter-spacing="1">
    问卷星 · AI 智能分析
  </text>
  <text x="1200" y="680" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#9C7A5F">
    01
  </text>
</svg>
