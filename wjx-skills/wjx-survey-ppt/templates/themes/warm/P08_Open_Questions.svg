<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    </defs>

  <rect width="1280" height="720" fill="#FBF6F0"/>

  <rect x="0" y="0" width="1280" height="80" fill="#3D1F14"/>
  <rect x="80" y="34" width="48" height="3" fill="#F4A261"/>
  <text x="80" y="62" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="500" fill="#A68B6F" letter-spacing="3">
    OPEN ANSWERS · WORD CLOUD
  </text>
  <text x="1200" y="62" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#A68B6F">
    08 / 10
  </text>

  <text x="80" y="170" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="40" font-weight="700" fill="#3D1F14">
    {{TITLE}}
  </text>
  <text x="80" y="208" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" fill="#7A5440">
    基于 {{SAMPLE_N}} 条开放回答，提取 Top {{WORD_N}} 高频词，字号反映词频排名
  </text>

  <line x1="80" y1="240" x2="1200" y2="240" stroke="#3D1F14" stroke-opacity="0.12" stroke-width="1"/>

  <!-- 词云本体（4 档分层） -->
  {{#WORDS}}
  <text x="{{X}}" y="{{Y}}" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="{{SIZE}}" font-weight="600" fill="#3D1F14" fill-opacity="{{OPACITY}}">{{TEXT}}</text>
  {{/WORDS}}

  <text x="80" y="690" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="13" fill="#7A5440" letter-spacing="1">
    词云采用 jieba 分词（若已安装）或 N-gram 回退；停用词与单字已过滤
  </text>
</svg>
