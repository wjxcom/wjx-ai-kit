  </text>

  <line x1="80" y1="250" x2="1200" y2="250" stroke="#0F2847" stroke-opacity="0.12" stroke-width="1"/>

  {{#ANSWERS}}
  <g transform="translate(80, {{Y_OFFSET}})">
    <rect width="1120" height="70" rx="6" fill="#F7F9FC" stroke="#D8E0EC"/>
    <rect width="6" height="70" fill="#4A90D9"/>
    <text x="32" y="32" font-family="Georgia, serif" font-size="44" fill="#4A90D9" opacity="0.4">"</text>
    <text x="74" y="46" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" fill="#0F2847">{{TEXT}}</text>
  </g>
  {{/ANSWERS}}

  <text x="80" y="690" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="13" fill="#8A9BB5" letter-spacing="1">
