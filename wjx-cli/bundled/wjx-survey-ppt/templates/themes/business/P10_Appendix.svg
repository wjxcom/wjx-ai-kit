<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    
  </defs>

  <rect width="1280" height="720" fill="#F7F9FC"/>

  <rect x="0" y="0" width="1280" height="80" fill="#0F2847"/>
  <rect x="80" y="34" width="48" height="3" fill="#F5A623"/>
  <text x="80" y="62" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="500" fill="#8FB4E0" letter-spacing="3">
    APPENDIX
  </text>
  <text x="1200" y="62" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="14" fill="#8FB4E0">
    10 / 10
  </text>

  <text x="80" y="180" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="44" font-weight="700" fill="#0F2847">
    {{TITLE}}
  </text>
  <text x="80" y="220" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" fill="#5A7090">
    报告参考与数据来源
  </text>

  <line x1="80" y1="260" x2="1200" y2="260" stroke="#0F2847" stroke-opacity="0.12" stroke-width="1"/>

  <g transform="translate(80, 310)">
    <text x="0" y="0" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#8A9BB5" letter-spacing="2">问卷编号</text>
    <text x="0" y="42" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="28" font-weight="500" fill="#0F2847">{{VID}}</text>
  </g>

  <g transform="translate(80, 410)">
    <text x="0" y="0" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#8A9BB5" letter-spacing="2">问卷链接</text>
    <text x="0" y="42" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="22" fill="#4A90D9">{{URL}}</text>
  </g>

  <g transform="translate(80, 510)">
    <text x="0" y="0" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="16" fill="#8A9BB5" letter-spacing="2">报告生成日期</text>
    <text x="0" y="42" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="28" font-weight="500" fill="#0F2847">{{DATE}}</text>
  </g>

<text x="80" y="690" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="13" fill="#8A9BB5" letter-spacing="1">
    问卷星 · https://www.wjx.cn
  </text>
</svg>
