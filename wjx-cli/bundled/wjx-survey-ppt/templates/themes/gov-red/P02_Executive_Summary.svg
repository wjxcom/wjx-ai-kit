    </text>
    <text x="140" y="78" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="20" font-weight="500" fill="#5A0F1B">
      {{TEXT}}
    </text>
  </g>
  {{/FINDINGS}}

  <text x="80" y="690" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="13" fill="#A88D5E" letter-spacing="1">
