    <rect width="1120" height="110" rx="6" fill="#F5EFE6" stroke="#E0D5C0" stroke-width="1"/>
    <rect width="6" height="110" fill="#B7410E"/>
    <text x="48" y="72" font-family="Source Han Serif SC, Noto Serif CJK SC, SimSun, serif" font-size="44" font-weight="800" fill="#B7410E" opacity="0.85">
