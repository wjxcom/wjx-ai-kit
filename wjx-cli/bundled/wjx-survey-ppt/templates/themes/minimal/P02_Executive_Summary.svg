  </text>

  <line x1="80" y1="250" x2="1200" y2="250" stroke="#1A1A1A" stroke-opacity="0.12" stroke-width="1"/>

  {{#FINDINGS}}
  <g transform="translate(80, {{Y_OFFSET}})">
    <rect width="1120" height="110" rx="6" fill="#FFFFFF" stroke="#D0D0D0" stroke-width="1"/>
    <rect width="6" height="110" fill="#1A1A1A"/>
    <text x="48" y="72" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="44" font-weight="800" fill="#1A1A1A" opacity="0.85">
